<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MSTC방역 통합 관리시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const STAFF = ["이원식", "강현준"];

        function App() {
            const [data, setData] = useState([]);
            const [selected, setSelected] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);

            const addClient = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newClient = {
                    id: Date.now(),
                    name: fd.get("name"),
                    manager: fd.get("manager"),
                    history: []
                };
                setData([...data, newClient]);
                setIsModalOpen(false);
            };

            return (
                <div class="max-w-2xl mx-auto">
                    <button onClick={() => setIsModalOpen(true)} class="bg-emerald-700 text-white p-3 rounded-xl mb-4">+ 신규 등록</button>
                    
                    <div class="bg-white rounded-2xl border p-4 shadow-sm">
                        {data.map(item => (
                            <div key={item.id} onClick={() => setSelected(item)} class="p-4 border-b cursor-pointer hover:bg-gray-50">
                                <p class="font-bold">{item.name}</p>
                                <p class="text-xs text-gray-400">담당: {item.manager}</p>
                            </div>
                        ))}
                    </div>

                    {selected && (
                        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
                            <div class="bg-white p-6 rounded-3xl w-full max-w-lg">
                                <h2 class="font-bold text-lg mb-4">{selected.name}</h2>
                                <button onClick={() => setSelected(null)} class="text-xs bg-gray-200 px-3 py-1 rounded-lg">닫기</button>
                                {/* 여기에 기존의 상세 이력/삭제/증명서 로직이 연결됩니다 */}
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <form onSubmit={addClient} class="fixed inset-0 bg-white p-6">
                            <input name="name" placeholder="상호명" class="w-full p-2 border mb-2" required />
                            <select name="manager" class="w-full p-2 border mb-2">{STAFF.map(s => <option key={s}>{s}</option>)}</select>
                            <button type="submit" class="bg-green-700 text-white p-2">등록</button>
                            <button type="button" onClick={() => setIsModalOpen(false)} class="ml-2">취소</button>
                        </form>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
