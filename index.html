<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 실시간 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAF6; color: #16241E; margin: 0; padding: 0; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4 portrait; margin: 0mm; }
            body { background-color: white; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJUCIKiumzq3QbFjZzSQq6mKWdw03AXCja8oH2mClGwUN6cv8CKJehdJLlkNHACqEY/exec"; 

        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = new Date().toISOString().split('T')[0];
        const CURRENT_MONTH = TODAY.slice(0, 7);
        const CURRENT_MONTH_NUM = parseInt(CURRENT_MONTH.split('-')[1], 10);
        const STAFF = ["이원식", "강현준"];
        const CYCLES = ["월1회", "3개월1회", "단기"];
        const CHEMICALS_BY_TYPE = { "살균": ["마이크로켐 골드", "키니아 비실드"], "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤", "다발이끔 살서제"] };
        const REGIONS = { 
            "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구"],
            "창원": ["의창구", "성산구", "마산합포구", "마산회원구", "진해구"],
            "경남": ["양산시", "김해시"] 
        };

        const COMPANY_SEAL_URL = "https://mstcare0-creator.github.io/mstc-crm/seal.png"; 

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(fetchedData => {
                        if (Array.isArray(fetchedData) && fetchedData.length > 0) {
                            setData(fetchedData);
                            localStorage.setItem("mstc_crm_data_v39", JSON.stringify(fetchedData));
                        } else {
                            const local = localStorage.getItem("mstc_crm_data_v39");
                            if(local) setData(JSON.parse(local));
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        const local = localStorage.getItem("mstc_crm_data_v39");
                        if(local) setData(JSON.parse(local));
                        setLoading(false);
                    });
            }, []);

            const updateDataAndSync = (newData) => {
                setData(newData);
                localStorage.setItem("mstc_crm_data_v39", JSON.stringify(newData)); 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: newData })
                }).catch(err => console.log("전송 지연"));
            };

            const [currentTab, setCurrentTab] = useState("active");
            const [search, setSearch] = useState("");
            const [filterCity, setFilterCity] = useState("");
            const [filterDistrict, setFilterDistrict] = useState("");
            const [filterServiceType, setFilterServiceType] = useState(""); 
            const [filterCollection, setFilterCollection] = useState("");
            const [filterCompletion, setFilterCompletion] = useState(""); 
            const [chartManager, setChartManager] = useState("전체 담당자");
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [detailTab, setDetailTab] = useState("info");
            const [historyYearFilter, setHistoryYearFilter] = useState("all");
            const [paymentYearFilter, setPaymentYearFilter] = useState("all");

            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [regCity, setRegCity] = useState("부산");

            const [regError, setRegError] = useState("");
            const [editError, setEditError] = useState("");

            const [showHistoryForm, setShowHistoryForm] = useState(false);
            const [historyForm, setHistoryForm] = useState({ date: TODAY, time: "", type: "방역", methods: ["살충"], chemicals: ["롱다운플러스"], note: "", author: "이원식" });
            const [editingHistoryId, setEditingHistoryId] = useState(null);

            const [showPayForm, setShowPayForm] = useState(false);
            const [payForm, setPayForm] = useState({ month: CURRENT_MONTH, amount: "30000", status: "수금완료", method: "계좌이체", note: "" });
            const [editingPayId, setEditingPayId] = useState(null);

            const [customMethodInput, setCustomMethodInput] = useState("");
            const [customMethodsList, setCustomMethodsList] = useState(() => {
                const saved = localStorage.getItem("mstc_custom_methods_v1");
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => { localStorage.setItem("mstc_custom_methods_v1", JSON.stringify(customMethodsList)); }, [customMethodsList]);

            const [customChemInput, setCustomChemInput] = useState({ "살균": "", "살충": "", "기타": "" });
            const [customChemsList, setCustomChemsList] = useState(() => {
                const savedChems = localStorage.getItem("mstc_custom_chems_v2");
                if (savedChems) {
                    const parsed = JSON.parse(savedChems);
                    if (!parsed["기타"]) parsed["기타"] = [];
                    return parsed;
                }
                return { "살균": [], "살충": [], "기타": [] };
            });
            useEffect(() => { localStorage.setItem("mstc_custom_chems_v2", JSON.stringify(customChemsList)); }, [customChemsList]);

            const [isCertOpen, setIsCertOpen] = useState(false);
            const [certEntry, setCertEntry] = useState(null);
            const [certNumber, setCertNumber] = useState("");
            const [sealImgFailed, setSealImgFailed] = useState(false); 

            const handleSelectItem = (item) => {
                setSelectedItem(item);
                setIsEditing(false);
                setShowHistoryForm(false);
                setShowPayForm(false);
                setEditingPayId(null);
                setDetailTab("info"); 
                setHistoryYearFilter("all");
                setPaymentYearFilter("all");
            };

            const handleAddCustomMethod = () => {
                const val = customMethodInput.trim();
                if (val && !["살균", "살충"].includes(val) && !customMethodsList.includes(val)) setCustomMethodsList([...customMethodsList, val]);
                setCustomMethodInput("");
            };
            const handleDeleteCustomMethod = (methodToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomMethodsList(prev => prev.filter(m => m !== methodToRemove));
                setHistoryForm(prev => ({...prev, methods: prev.methods.filter(m => m !== methodToRemove)}));
            };

            const handleAddCustomChem = (type) => {
                const val = customChemInput[type].trim();
                if (val) {
                    if (!customChemsList[type].includes(val) && !(CHEMICALS_BY_TYPE[type] || []).includes(val)) setCustomChemsList(prev => ({...prev, [type]: [...prev[type], val]}));
                    if (!historyForm.chemicals.includes(val)) setHistoryForm(prev => ({...prev, chemicals: [...prev.chemicals, val]}));
                    setCustomChemInput(prev => ({...prev, [type]: ""}));
                }
            };
            const handleDeleteCustomChem = (type, chemToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomChemsList(prev => ({ ...prev, [type]: prev[type].filter(c => c !== chemToRemove) }));
                setHistoryForm(prev => ({ ...prev, chemicals: prev.chemicals.filter(c => c !== chemToRemove) }));
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                
                const name = fd.get("name");
                const phone = fd.get("phone");
                const address = fd.get("address");

                if (!name || name.trim() === "") { setRegError("🚨 [상호명]을 입력해주세요!"); return; }
                if (!phone || phone.trim() === "") { setRegError("🚨 [연락처]를 입력해주세요!"); return; }
                if (!address || address.trim() === "") { setRegError("🚨 [상세주소]를 입력해주세요!"); return; }

                setRegError(""); 

                let regTab = fd.get("tab");
                const payStat = fd.get("payStatus");
                if (payStat === "일시중지") regTab = "paused";
                else if (payStat === "해지") regTab = "terminated";

                const safeData = {
                    id: "AC" + Date.now(), tab: regTab,
                    name: name, manager: fd.get("manager"), phone: phone,
                    bizNumber: fd.get("bizNumber") || "", 
                    clientRepName: fd.get("clientRepName") || "", 
                    clientTitle: fd.get("clientTitle") || "대표",
                    clientName: fd.get("clientName") || "",     
                    gu: fd.get("gu"), dong: fd.get("dong"), address: address, area: fd.get("area"),
                    contractStart: fd.get("contractStart") || TODAY, serviceType: fd.get("serviceType"), payStatus: payStat,
                    cycle: fd.get("cycle"), fee: fd.get("fee") || "30000", 
                    payMethod: fd.get("payMethod") || "계좌이체",
                    providedService: fd.get("providedService") || "",
                    
                    parking: fd.get("parking") || "O",
                    photoReq: fd.get("photoReq") || "X",
                    bugZapper: fd.get("bugZapper") || "없음",
                    trapReq: fd.get("trapReq") || "X",
                    keyInfo: fd.get("keyInfo") || "",

                    etcInfo: fd.get("etcInfo") || "",
                    collectionStatus: fd.get("collectionStatus") || "수금완료", uncollectedAmount: fd.get("uncollectedAmount") || "0",
                    history: [{id: Date.now(), date: TODAY, time: "", type: "상담", content: "신규 등록 완료", author: fd.get("manager")}], paymentHistory: []
                };
                updateDataAndSync([safeData, ...data]); 
                setIsModalOpen(false); setCurrentTab(regTab);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editForm.name || editForm.name.trim() === "") { setEditError("🚨 상호명을 비울 수 없습니다!"); return; }
                
                setEditError("");
                let newTab = editForm.tab;
                if (editForm.payStatus === "일시중지") newTab = "paused";
                else if (editForm.payStatus === "해지") newTab = "terminated";
                else if (editForm.payStatus === "유료" || editForm.payStatus === "무료") { if (newTab !== "prospect") newTab = "active"; }
                const updated = { ...editForm, tab: newTab };
                updateDataAndSync(data.map(d => d.id === updated.id ? updated : d)); 
                setSelectedItem(updated); setIsEditing(false); setCurrentTab(newTab);
            };

            const handleDeleteClient = () => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                updateDataAndSync(data.filter(d => d.id !== selectedItem.id)); setSelectedItem(null);
            };

            const convertToActive = () => {
                if(!confirm("전환하시겠습니까?")) return;
                const updated = { ...selectedItem, tab: 'active', payStatus: '유료', contractStart: TODAY };
                updateDataAndSync(data.map(item => item.id === updated.id ? updated : item)); setSelectedItem(updated); setCurrentTab('active');
            };

            const handleAddHistory = (e) => {
                e.preventDefault();
                const contentStr = historyForm.type === "방역" ? "정기 방역 완료" : historyForm.note;
                let updatedHistoryList;
                if (editingHistoryId) {
                    updatedHistoryList = selectedItem.history.map(h => 
                        h.id === editingHistoryId ? { ...h, date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] } : h
                    );
                } else {
                    const newLog = { id: Date.now(), date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] };
                    updatedHistoryList = [newLog, ...(selectedItem.history || [])];
                }
                const updatedItem = { ...selectedItem, history: updatedHistoryList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowHistoryForm(false); setEditingHistoryId(null);
            };

            const handleEditHistoryInit = (h) => {
                setHistoryForm({ date: h.date, time: h.time || h.startTime || "", type: h.type, author: h.author || "이원식", methods: h.methods || [], chemicals: h.chemicals || [], note: h.type === "방역" ? "" : h.content });
                setEditingHistoryId(h.id); setShowHistoryForm(true); setShowPayForm(false); setIsEditing(false);
            };

            const handleDeleteHistory = (logId) => {
                if(!confirm("해당 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, history: selectedItem.history.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                let updatedPayList;
                if (editingPayId) {
                    updatedPayList = selectedItem.paymentHistory.map(p => 
                        p.id === editingPayId ? { ...p, month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note } : p
                    );
                } else {
                    const newPay = { id: Date.now(), month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note };
                    updatedPayList = [newPay, ...(selectedItem.paymentHistory || [])];
                }
                const updatedItem = { ...selectedItem, paymentHistory: updatedPayList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowPayForm(false); setEditingPayId(null);
                setPayForm({ month: CURRENT_MONTH, amount: selectedItem.fee || "30000", status: "수금완료", method: "계좌이체", note: "" });
            };

            const handleEditPayInit = (p) => {
                setPayForm({ month: p.month, amount: p.amount, status: p.status, method: p.method || "계좌이체", note: p.note || "" });
                setEditingPayId(p.id); setShowPayForm(true); setShowHistoryForm(false); setIsEditing(false);
            };

            const handleDeletePayment = (logId) => {
                if(!confirm("해당 수금 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, paymentHistory: selectedItem.paymentHistory.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const enrichedData = useMemo(() => {
                return data.map(item => {
                    let itemDebt = 0;
                    if (item.collectionStatus === "미수금") {
                        itemDebt += parseInt(String(item.uncollectedAmount || "0").replace(/,/g, ''), 10) || 0;
                    }
                    if (item.paymentHistory && item.paymentHistory.length > 0) {
                        item.paymentHistory.forEach(p => {
                            if (p.status === "미수금") {
                                itemDebt += parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0;
                            }
                        });
                    }
                    return { ...item, computedDebt: itemDebt };
                });
            }, [data]);

            const totalUncollected = enrichedData.reduce((sum, item) => sum + (item.computedDebt || 0), 0);
            const uncollectedClientsCount = enrichedData.filter(item => (item.computedDebt || 0) > 0).length;

            const selectedItemDebt = selectedItem ? enrichedData.find(d => d.id === selectedItem.id)?.computedDebt || 0 : 0;
            const selectedItemTotalPaid = useMemo(() => {
                if (!selectedItem || !selectedItem.paymentHistory) return 0;
                return selectedItem.paymentHistory
                    .filter(p => p.status === "수금완료" || p.status === "무료") 
                    .reduce((sum, p) => sum + (parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0), 0);
            }, [selectedItem]);

            const selectedItemPestCount = selectedItem ? (selectedItem.history || []).filter(h => h.type === '방역').length : 0;
            const selectedItemPayCount = selectedItem ? (selectedItem.paymentHistory || []).filter(p => p.status === "수금완료" || p.status === "무료").length : 0;

            const currentList = useMemo(() => {
                return enrichedData.filter(r => {
                    if (r.tab !== currentTab) return false;
                    const matchSearch = (r.name || "").includes(search) || (r.manager || "").includes(search) || (r.address || "").includes(search);
                    const matchCity = !filterCity || r.gu === filterCity;
                    const matchDistrict = !filterDistrict || r.dong === filterDistrict;
                    const matchServiceType = !filterServiceType || r.serviceType === filterServiceType || (filterServiceType === '무료' && r.payStatus === '무료');
                    const matchCollection = !filterCollection || (filterCollection === '미수금' ? r.computedDebt > 0 : r.computedDebt === 0);
                    const isCompletedThisMonth = r.history && r.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH));
                    const matchCompletion = !filterCompletion || (filterCompletion === 'completed' ? isCompletedThisMonth : !isCompletedThisMonth);
                    return matchSearch && matchCity && matchDistrict && matchServiceType && matchCollection && matchCompletion;
                });
            }, [enrichedData, currentTab, search, filterCity, filterDistrict, filterServiceType, filterCollection, filterCompletion]);

            const activeData = enrichedData.filter(d => d.tab === 'active');
            const leeCount = activeData.filter(d => d.manager === '이원식').length;
            const kangCount = activeData.filter(d => d.manager === '강현준').length;
            const completedThisMonth = activeData.filter(c => c.history && c.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH))).length;
            const delayedThisMonth = activeData.length - completedThisMonth;
            const activeLikeCount = enrichedData.filter(d => d.tab === 'active' || d.tab === 'paused').length;
            const termCount = enrichedData.filter(d => d.tab === 'terminated').length;
            const totalEver = activeLikeCount + termCount;
            const cancelRate = totalEver === 0 ? "0.0" : ((termCount / totalEver) * 100).toFixed(1);

            const chartStats = useMemo(() => {
                const cy = parseInt(CURRENT_MONTH.split('-')[0], 10); const cm = parseInt(CURRENT_MONTH.split('-')[1], 10);
                const months = Array.from({length: 6}, (_, i) => {
                    let m = cm - (5 - i); let y = cy;
                    if (m <= 0) { m += 12; y -= 1; }
                    return `${y}-${String(m).padStart(2, '0')}`;
                });
                const chartDataToUse = chartManager === "전체 담당자" ? data : data.filter(d => d.manager === chartManager);
                return months.map(monthStr => {
                    const mLabel = parseInt(monthStr.split('-')[1], 10) + '월';
                    const newCount = chartDataToUse.filter(d => d.contractStart && d.contractStart.startsWith(monthStr)).length;
                    const termCountData = chartDataToUse.filter(d => {
                        if (d.tab !== 'terminated') return false;
                        if (d.history && d.history.length > 0 && d.history[0].date) return d.history[0].date.startsWith(monthStr);
                        return d.contractStart && d.contractStart.startsWith(monthStr);
                    }).length;
                    return { month: monthStr, label: mLabel, newCount, termCount: termCountData, netCount: newCount - termCountData };
                });
            }, [data, chartManager]);

            const maxChartVal = Math.max(1, ...chartStats.map(s => Math.max(s.newCount, s.termCount, Math.abs(s.netCount))));

            if (loading) return <div className="flex items-center justify-center min-h-screen font-bold text-emerald-800">데이터 로드 중... 잠시만 기다려주세요!</div>;

            const availableHistoryYears = selectedItem && selectedItem.history ? [...new Set(selectedItem.history.map(h => h.date ? h.date.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredHistory = selectedItem && selectedItem.history ? [...selectedItem.history]
                .filter(h => historyYearFilter === 'all' || (h.date && h.date.startsWith(historyYearFilter)))
                .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)) : [];

            const availablePaymentYears = selectedItem && selectedItem.paymentHistory ? [...new Set(selectedItem.paymentHistory.map(p => p.month ? p.month.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredPayment = selectedItem && selectedItem.paymentHistory ? [...selectedItem.paymentHistory]
                .filter(p => paymentYearFilter === 'all' || (p.month && p.month.startsWith(paymentYearFilter)))
                .sort((a, b) => new Date((b.month || '') + '-01') - new Date((a.month || '') + '-01')) : [];

            return (
                <div>
                    <div className={`max-w-7xl mx-auto space-y-6 ${isCertOpen ? 'hidden print:hidden' : 'block'}`}>
                        <div className="flex justify-between items-end mb-4 pt-2 px-2">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2 text-[#0B5E4D]">
                                    <span className="bg-[#0B5E4D] text-white p-1.5 rounded-lg text-sm shadow-md">🛡️</span> MSTC방역
                                </h1>
                                <p className="text-xs text-gray-500 mt-1 font-bold">거래처 및 영업 관리 시스템</p>
                            </div>
                            <div className="text-sm text-gray-400 font-mono font-bold tracking-wider">{TODAY.replace(/-/g, '.')} 기준</div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-[#E3F2EC] rounded-xl text-[#0B5E4D] text-2xl">👤</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">운영중 거래처</p><p className="text-2xl font-black text-gray-800 leading-none">{activeData.length}</p><p className="text-[11px] text-gray-500 mt-1.5">이원식 {leeCount} · 강현준 {kangCount}</p></div>
                            </div>

                                    <div className="mt-28 pt-10 border-t border-black text-[13px] space-y-3 relative">
                                        <p className="flex justify-between"><span><b>소독 실시자 상호(명칭)</b></span> <span className="font-bold text-right text-[14px]">{CERT_ISSUER.name}</span></p>
                                        <p className="flex justify-between"><span><b>소재지</b></span> <span className="text-right text-gray-700 text-[13px]">{CERT_ISSUER.address}</span></p>
                                        <p className="flex justify-between relative">
                                            <span><b>성명(대표자)</b></span> <span className="font-bold text-right mr-24 text-[14px]">{CERT_ISSUER.reps}</span>
                                            <span className="absolute right-12 top-[-15px]">
                                                {COMPANY_SEAL_URL && !sealImgFailed ? (
                                                    <img src={COMPANY_SEAL_URL} alt="직인" className="w-[65px] h-[65px] object-contain" onError={() => setSealImgFailed(true)} />
                                                ) : (
                                                    <span className="text-red-600 font-bold border-2 border-red-600 rounded-full w-[65px] h-[65px] flex items-center justify-center text-[11px] transform rotate-[-6deg] bg-white/40">법인인장</span>
                                                )}
                                            </span>
                                        </p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6 border-t pt-4 print:hidden">
                                    <button onClick={() => setIsCertOpen(false)} className="px-5 py-3 border rounded-xl text-xs bg-gray-100 font-bold">창 닫기</button>
                                    <button onClick={() => window.print()} className="px-8 py-3 bg-[#0B5E4D] text-white rounded-xl text-xs font-bold shadow-md hover:opacity-90">🖨️ 정식 A4 서식 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
