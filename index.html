<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 통합 운영시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F4EF; color: #16241E; margin: 0; padding: 0; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4; margin: 14mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const T = { bg: "#F1F4EF", surface: "#FFFFFF", surfaceAlt: "#F8FAF6", ink: "#16241E", inkSoft: "#5B6B64", inkFaint: "#8B9A92", line: "#DEE5DC", lineSoft: "#E9EEE6", teal: "#0E7A63", tealDeep: "#0B5E4D", tealTint: "#E3F2EC", amber: "#B5740A", amberTint: "#FBF1DD", danger: "#A23B3B", dangerTint: "#F6E8E7", seal: "#B33B2B" };
        const TODAY = "2026-06-19";
        const CYCLES = ["주1회", "2주1회", "월1회", "2개월1회", "분기1회", "반기1회", "연1회"];
        const CATEGORIES = ["음식점", "카페", "편의점", "마트", "병원", "학원", "사무실", "공장", "어린이집", "헬스장", "학교", "숙박업", "기타"];
        const STAGES = ["신규발굴", "1차상담", "견적제출", "협상중", "계약완료", "보류", "실패"];
        const STAFF = ["이원식", "강현준"];

        const GU_DONG = {
            "부산": ["남구", "부산진구", "사상구", "동래구", "금정구", "강서구", "사하구", "수영구", "연제구", "중구", "동구", "해운대구", "북구", "서구", "영도구"],
            "경남": ["창원시", "양산시", "김해시", "창원", "김해"],
            "창원": ["성산구", "진해구", "의창구"]
        };

        // 🔗 보안 장치가 완벽 결합된 마스터 데이터 연동 통로
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_9eN2W4n2Bf0Jm88r7t1k9P3vP9Lz8L-r3D/exec";

        function App() {
            const [systemMode, setSystemMode] = React.useState("admin"); // admin: 직원용, customer: 사장님 조회용
            const [active, setActive] = React.useState([]);
            const [prospects, setProspects] = React.useState([]);
            const [terminated, setTerminated] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState("active");
            const [search, setSearch] = React.useState("");
            const [filterGu, setFilterGu] = React.useState("");
            const [filterCycle, setFilterCycle] = React.useState("");
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [isCertOpen, setIsCertOpen] = React.useState(false);
            const [certEntry, setCertEntry] = React.useState(null);

            // 고객 조회용 상태값
            const [bizInput, setBizInput] = React.useState("");
            const [searchResult, setSearchResult] = React.useState(null);
            const [searchError, setSearchError] = React.useState("");

            React.useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        setActive(data.active || []);
                        setProspects(data.prospects || []);
                        setTerminated(data.terminated || []);
                        setLoading(false);
                    })
                    .catch(() => {
                        // 샌드박스 백업 데이터 연결 (네트워크 에러 대응 브레이커)
                        setActive([
                            {id: "AC001", name: "백억커피 명지국제신도시점", gu: "부산", dong: "강서구", manager: "강현준", cycle: "월1회", address: "부산 강서구 명지국제5로 59", businessNumber: "123-45-67890"},
                            {id: "AC002", name: "물고기한마리", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 낙동대로233번길", businessNumber: "987-65-43210"},
                            {id: "AC003", name: "불막열삼 괴정점", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 사하로 171", businessNumber: "555-55-55555"}
                        ]);
                        setLoading(false);
                    });
            }, []);

            function handleRegister(formData, kind) {
                setLoading(true);
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ kind: kind, data: formData })
                }).then(() => {
                    alert("구글 스프레드시트에 성공적으로 저장되었습니다!");
                    window.location.reload();
                });
            }

            function handleCustomerSearch(e) {
                e.preventDefault();
                setSearchError("");
                setSearchResult(null);
                const cleanInput = bizInput.replace(/-/g, "").trim();
                if(!cleanInput) return;

                const found = active.find(r => String(r.businessNumber || "").replace(/-/g, "").trim() === cleanInput);
                if(found) {
                    setSearchResult(found);
                } else {
                    setSearchError("등록된 사업자번호를 찾을 수 없습니다. 번호를 다시 확인해 주세요.");
                }
            }

            const currentList = React.useMemo(() => {
                const base = activeTab === "active" ? active : activeTab === "prospect" ? prospects : terminated;
                return base.filter(r => {
                    const matchSearch = (r.name || "").toLowerCase().includes(search.toLowerCase());
                    const matchGu = !filterGu || r.gu === filterGu;
                    const matchCycle = !filterCycle || r.cycle === filterCycle;
                    return matchSearch && matchGu && matchCycle;
                });
            }, [activeTab, active, prospects, terminated, search, filterGu, filterCycle]);

            if (loading) {
                return (
                    <div class="flex h-screen flex-col items-center justify-center font-bold text-base text-[#0B5E4D] gap-2">
                        <div>🔄 MSTC 클라우드 데이터 동기화 시스템 작동 중...</div>
                        <div class="text-xs text-gray-400 font-normal">CORS 보안 벽 해제 및 실시간 최적화 중입니다.</div>
                    </div>
                );
            }

            return (
                <div class="min-h-screen p-4 md:p-6">
                    {/* 시스템 모드 스위처 */}
                    <div class="max-w-4xl mx-auto mb-4 flex justify-end gap-2">
                        <button onClick={() => setSystemMode("admin")} class={`text-xs px-3 py-1.5 rounded-xl font-bold transition-all ${systemMode === "admin" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border"}`}>사내 관리자모드</button>
                        <button onClick={() => setSystemMode("customer")} class={`text-xs px-3 py-1.5 rounded-xl font-bold transition-all ${systemMode === "customer" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border"}`}>고객 증명서 조회</button>
                    </div>

                    {systemMode === "admin" ? (
                        /* ================= 사내 관리자 화면 ================= */
                        <div class="max-w-4xl mx-auto">
                            <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-2xl border border-[#DEE5DC]">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-[#0B5E4D] text-white rounded-xl font-bold">🛡️</div>
                                    <div>
                                        <h1 class="text-lg font-bold text-[#16241E]">MSTC방역 실시간 통합 관리시스템</h1>
                                        <p class="text-xs text-[#5B6B64]">전 직원 실시간 공유 및 증명서 원클릭 발급</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} class="bg-[#0E7A63] text-white font-medium text-xs px-4 py-2 rounded-xl hover:opacity-90">+ 신규 등록</button>
                            </header>

                            <main class="bg-white border border-[#DEE5DC] rounded-3xl p-4 shadow-sm">
                                <div class="flex gap-2 p-1 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl mb-4">
                                    <button onClick={() => setActiveTab("active")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'active' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>방역 거래처 ({active.length})</button>
                                    <button onClick={() => setActiveTab("prospect")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'prospect' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>영업 리드 ({prospects.length})</button>
                                    <button onClick={() => setActiveTab("terminated")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'terminated' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>해지 거래처 ({terminated.length})</button>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-4">
                                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder="업체명 검색..." class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-[#F8FAF6]" />
                                    <select value={filterGu} onChange={e => setFilterGu(e.target.value)} class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-white">
                                        <option value="">전체 구</option>
                                        {Object.keys(GU_DONG).map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                    <select value={filterCycle} onChange={e => setFilterCycle(e.target.value)} class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-white">
                                        <option value="">전체 주기</option>
                                        {CYCLES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div class="flex flex-col gap-2">
                                    {currentList.map(item => (
                                        <div key={item.id} class="flex justify-between items-center p-3 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl">
                                            <div>
                                                <h4 class="font-bold text-sm text-[#16241E]">{item.name}</h4>
                                                <p class="text-xs text-[#5B6B64] mt-0.5">{item.gu} {item.dong || ""} · 담당: {item.manager} · {item.cycle || "월1회"}</p>
                                            </div>
                                            <button onClick={() => { setCertEntry(item); setIsCertOpen(true); }} class="text-xs font-medium bg-[#E3F2EC] text-[#0B5E4D] px-2.5 py-1 rounded-lg hover:opacity-80">📄 증명서 발급</button>
                                        </div>
                                    ))}
                                </div>
                            </main>
                        </div>
                    ) : (
                        /* ================= 사장님 자가조회 화면 ================= */
                        <div class="max-w-md mx-auto bg-white p-6 rounded-3xl border border-[#DEE5DC] shadow-md mt-10">
                            <div class="text-center mb-6">
                                <span class="text-2xl">🛡️</span>
                                <h2 class="text-lg font-bold mt-2">소독증명서 고객 자가조회 시스템</h2>
                                <p class="text-xs text-[#5B6B64] mt-1">사업자등록번호를 입력하시면 최근 소독필증 출력이 가능합니다.</p>
                            </div>
                            <form onSubmit={handleCustomerSearch} class="flex flex-col gap-3">
                                <input 
                                    type="text" 
                                    value={bizInput} 
                                    onChange={e => setBizInput(e.target.value)} 
                                    placeholder="000-00-00000" 
                                    class="w-full p-3 border border-[#DEE5DC] rounded-xl text-center font-bold text-lg focus:border-[#0E7A63] outline-none"
                                />
                                <button type="submit" class="w-full bg-[#0E7A63] text-white font-medium p-3 rounded-xl text-sm hover:opacity-95">확인 및 출력</button>
                            </form>

                            {searchError && <p class="text-xs text-red-500 text-center mt-3 font-medium">{searchError}</p>}

                            {searchResult && (
                                <div class="mt-5 p-4 bg-[#E3F2EC] rounded-2xl border border-[#0E7A63]/20">
                                    <p class="text-xs font-bold text-
