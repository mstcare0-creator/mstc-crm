<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 실시간 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAF6; color: #16241E; margin: 0; padding: 0; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4 portrait; margin: 0mm; }
            body { background-color: white; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // 💡 구글 시트 연동 URL
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJUCIKiumzq3QbFjZzSQq6mKWdw03AXCja8oH2mClGwUN6cv8CKJehdJLlkNHACqEY/exec"; 

        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = new Date().toISOString().split('T')[0];
        const CURRENT_MONTH = TODAY.slice(0, 7);
        const STAFF = ["이원식", "강현준"];
        const CYCLES = ["월1회", "3개월1회", "단기"];
        const CHEMICALS_BY_TYPE = { "살균": ["마이크로켐 골드", "키니아 비실드"], "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤", "다발이끔 살서제"] };
        const REGIONS = { 
            "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구"],
            "창원": ["의창구", "성산구", "마산합포구", "마산회원구", "진해구"],
            "경남": ["양산시", "김해시"] 
        };

        // 💡 (선택) 여기에 실제 법인 인감 도장 이미지 주소를 넣으면 자동으로 쾅 찍힙니다!
        const COMPANY_SEAL_URL = ""; 

        function App() {
            // 🛡️ 로그인 상태 관리 (새로고침 버그 완벽 해결)
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem("mstc_auth") === "true");
            const [pinInput, setPinInput] = useState("");
            
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!isAuth) return;
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(fetchedData => {
                        if (Array.isArray(fetchedData) && fetchedData.length > 0) {
                            setData(fetchedData);
                            localStorage.setItem("mstc_crm_data_v15", JSON.stringify(fetchedData));
                        } else {
                            const local = localStorage.getItem("mstc_crm_data_v15");
                            if(local) setData(JSON.parse(local));
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        const local = localStorage.getItem("mstc_crm_data_v15");
                        if(local) setData(JSON.parse(local));
                        setLoading(false);
                    });
            }, [isAuth]);

            const updateDataAndSync = (newData) => {
                setData(newData);
                localStorage.setItem("mstc_crm_data_v15", JSON.stringify(newData)); 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: newData })
                }).catch(err => console.log("전송 지연"));
            };

            const [currentTab, setCurrentTab] = useState("active");
            const [search, setSearch] = useState("");
            const [filterCity, setFilterCity] = useState("");
            const [filterDistrict, setFilterDistrict] = useState("");
            const [filterServiceType, setFilterServiceType] = useState(""); 
            const [filterCollection, setFilterCollection] = useState("");
            const [chartManager, setChartManager] = useState("전체 담당자");
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [regCity, setRegCity] = useState("부산");

            const [showHistoryForm, setShowHistoryForm] = useState(false);
            const [historyForm, setHistoryForm] = useState({ date: TODAY, type: "방역", methods: ["살충"], chemicals: ["롱다운플러스"], note: "", author: "이원식" });
            const [showPayForm, setShowPayForm] = useState(false);
            const [payForm, setPayForm] = useState({ month: CURRENT_MONTH, amount: "30000", status: "수금완료", note: "" });

            const [customChemInput, setCustomChemInput] = useState({ "살균": "", "살충": "" });
            const [customChemsList, setCustomChemsList] = useState(() => {
                const savedChems = localStorage.getItem("mstc_custom_chems_v1");
                return savedChems ? JSON.parse(savedChems) : { "살균": [], "살충": [] };
            });
            useEffect(() => { localStorage.setItem("mstc_custom_chems_v1", JSON.stringify(customChemsList)); }, [customChemsList]);

            // 💡 증명서 관련 상태 (자동 생성 번호 추가)
            const [isCertOpen, setIsCertOpen] = useState(false);
            const [certEntry, setCertEntry] = useState(null);
            const [sealImage, setSealImage] = useState(null);
            const [certNumber, setCertNumber] = useState("");

            // 🛡️ [로그인 처리 함수 - 폼 제출 충돌 해결]
            const handleLogin = () => {
                if (pinInput === "0571") {
                    sessionStorage.setItem("mstc_auth", "true");
                    setIsAuth(true); // 창 전환 충돌 없이 즉시 상태 변경
                } else {
                    alert("비밀번호 오류"); setPinInput("");
                }
            };

            if (!isAuth) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-[#F8FAF6]">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 flex flex-col items-center animate-fade-in w-full max-w-sm">
                            <div className="bg-[#E3F2EC] p-4 rounded-2xl mb-4 text-4xl shadow-inner">🛡️</div>
                            <h2 className="text-xl font-bold text-gray-800 mb-1">MSTC 관리자 시스템</h2>
                            <p className="text-xs text-gray-500 mb-8 font-medium">관계자 외 접근을 엄격히 금지합니다.</p>
                            
                            <input 
                                type="password" 
                                value={pinInput} 
                                onChange={e => setPinInput(e.target.value)} 
                                onKeyDown={e => { if(e.key === 'Enter') handleLogin(); }}
                                placeholder="관리자 PIN 번호 입력" 
                                className="w-full p-4 border rounded-xl text-center tracking-[0.5em] font-bold outline-none focus:border-[#0B5E4D] mb-6 bg-gray-50" 
                                autoFocus 
                            />
                            
                            <button onClick={handleLogin} className="w-full bg-[#0B5E4D] text-white py-4 rounded-xl font-bold hover:bg-[#084b3e] shadow-md text-sm">
                                시스템 접속하기
                            </button>
                        </div>
                    </div>
                );
            }

            const handleAddCustomChem = (type) => {
                const val = customChemInput[type].trim();
                if (val) {
                    if (!customChemsList[type].includes(val) && !CHEMICALS_BY_TYPE[type].includes(val)) setCustomChemsList(prev => ({...prev, [type]: [...prev[type], val]}));
                    if (!historyForm.chemicals.includes(val)) setHistoryForm(prev => ({...prev, chemicals: [...prev.chemicals, val]}));
                    setCustomChemInput(prev => ({...prev, [type]: ""}));
                }
            };
            const handleDeleteCustomChem = (type, chemToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomChemsList(prev => ({ ...prev, [type]: prev[type].filter(c => c !== chemToRemove) }));
                setHistoryForm(prev => ({ ...prev, chemicals: prev.chemicals.filter(c => c !== chemToRemove) }));
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                let regTab = fd.get("tab");
                const payStat = fd.get("payStatus");
                if (payStat === "일시중지") regTab = "paused";
                else if (payStat === "해지") regTab = "terminated";

                const safeData = {
                    id: "AC" + Date.now(), tab: regTab,
                    name: fd.get("name"), manager: fd.get("manager"), phone: fd.get("phone"),
                    bizNumber: fd.get("bizNumber") || "", 
                    gu: fd.get("gu"), dong: fd.get("dong"), address: fd.get("address"), area: fd.get("area"),
                    contractStart: fd.get("contractStart"), serviceType: fd.get("serviceType"), payStatus: payStat,
                    cycle: fd.get("cycle"), fee: fd.get("fee"), etcInfo: fd.get("etcInfo") || "",
                    collectionStatus: fd.get("collectionStatus") || "수금완료", uncollectedAmount: fd.get("uncollectedAmount") || "0",
                    history: [{id: Date.now(), date: TODAY, type: "상담", content: "신규 등록 완료", author: fd.get("manager")}], paymentHistory: []
                };
                updateDataAndSync([safeData, ...data]); 
                setIsModalOpen(false); setCurrentTab(regTab);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                let newTab = editForm.tab;
                if (editForm.payStatus === "일시중지") newTab = "paused";
                else if (editForm.payStatus === "해지") newTab = "terminated";
                else if (editForm.payStatus === "유료" || editForm.payStatus === "무료") { if (newTab !== "prospect") newTab = "active"; }
                const updated = { ...editForm, tab: newTab };
                updateDataAndSync(data.map(d => d.id === updated.id ? updated : d)); 
                setSelectedItem(updated); setIsEditing(false); setCurrentTab(newTab);
            };

            const handleDeleteClient = () => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                updateDataAndSync(data.filter(d => d.id !== selectedItem.id)); setSelectedItem(null);
            };

            const convertToActive = () => {
                if(!confirm("전환하시겠습니까?")) return;
                const updated = { ...selectedItem, tab: 'active', payStatus: '유료', contractStart: TODAY };
                updateDataAndSync(data.map(d => d.id === updated.id ? updated : d)); setSelectedItem(updated); setCurrentTab('active');
            };

            const handleAddHistory = (e) => {
                e.preventDefault();
                const newLog = { id: Date.now(), date: historyForm.date, type: historyForm.type, author: historyForm.author, content: historyForm.type === "방역" ? "정기 방역 완료" : historyForm.note, methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] };
                const updatedItem = { ...selectedItem, history: [newLog, ...(selectedItem.history || [])] };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowHistoryForm(false);
            };
            const handleDeleteHistory = (logId) => {
                if(!confirm("삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, history: selectedItem.history.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                const newPay = { id: Date.now(), month: payForm.month, amount: payForm.amount, status: payForm.status, note: payForm.note };
                const updatedItem = { ...selectedItem, paymentHistory: [newPay, ...(selectedItem.paymentHistory || [])] };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowPayForm(false);
                setPayForm({ month: CURRENT_MONTH, amount: selectedItem.fee || "30000", status: "수금완료", note: "" });
            };
            const handleDeletePayment = (logId) => {
                if(!confirm("삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, paymentHistory: selectedItem.paymentHistory.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const handleSealUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader(); reader.onload = (ev) => { setSealImage(ev.target.result); }; reader.readAsDataURL(file);
            };

            const currentList = useMemo(() => {
                return data.filter(r => {
                    if (r.tab !== currentTab) return false;
                    const matchSearch = r.name.includes(search) || r.manager.includes(search) || r.address.includes(search);
                    const matchCity = !filterCity || r.gu === filterCity;
                    const matchDistrict = !filterDistrict || r.dong === filterDistrict;
                    const matchServiceType = !filterServiceType || r.serviceType === filterServiceType || (filterServiceType === '무료' && r.payStatus === '무료');
                    const matchCollection = !filterCollection || r.collectionStatus === filterCollection;
                    return matchSearch && matchCity && matchDistrict && matchServiceType && matchCollection;
                });
            }, [data, currentTab, search, filterCity, filterDistrict, filterServiceType, filterCollection]);

            const activeData = data.filter(d => d.tab === 'active');
            const leeCount = activeData.filter(d => d.manager === '이원식').length;
            const kangCount = activeData.filter(d => d.manager === '강현준').length;
            const completedThisMonth = activeData.filter(c => c.history && c.history.some(h => h.type === '방역' && h.date.startsWith(CURRENT_MONTH))).length;
            const delayedThisMonth = activeData.length - completedThisMonth;
            const activeLikeCount = data.filter(d => d.tab === 'active' || d.tab === 'paused').length;
            const termCount = data.filter(d => d.tab === 'terminated').length;
            const totalEver = activeLikeCount + termCount;
            const cancelRate = totalEver === 0 ? "0.0" : ((termCount / totalEver) * 100).toFixed(1);
            const uncollectedClients = data.filter(d => d.collectionStatus === "미수금");
            const totalUncollected = uncollectedClients.reduce((sum, item) => sum + parseInt(String(item.uncollectedAmount || "0").replace(/,/g, ''), 10), 0);

            const chartStats = useMemo(() => {
                const cy = parseInt(CURRENT_MONTH.split('-')[0], 10); const cm = parseInt(CURRENT_MONTH.split('-')[1], 10);
                const months = Array.from({length: 6}, (_, i) => {
                    let m = cm - (5 - i); let y = cy;
                    if (m <= 0) { m += 12; y -= 1; }
                    return `${y}-${String(m).padStart(2, '0')}`;
                });
                const chartDataToUse = chartManager === "전체 담당자" ? data : data.filter(d => d.manager === chartManager);
                return months.map(monthStr => {
                    const mLabel = parseInt(monthStr.split('-')[1], 10) + '월';
                    const newCount = chartDataToUse.filter(d => d.contractStart && d.contractStart.startsWith(monthStr)).length;
                    const termCountData = chartDataToUse.filter(d => {
                        if (d.tab !== 'terminated') return false;
                        if (d.history && d.history.length > 0) return d.history[0].date.startsWith(monthStr);
                        return d.contractStart && d.contractStart.startsWith(monthStr);
                    }).length;
                    return { month: monthStr, label: mLabel, newCount, termCount: termCountData, netCount: newCount - termCountData };
                });
            }, [data, chartManager]);

            const maxChartVal = Math.max(1, ...chartStats.map(s => Math.max(s.newCount, s.termCount, Math.abs(s.netCount))));

            if (loading) return <div className="flex items-center justify-center min-h-screen font-bold text-emerald-800">데이터 로드 중... 잠시만 기다려주세요!</div>;

            return (
                <div>
                    <div className={`max-w-7xl mx-auto space-y-6 ${isCertOpen ? 'hidden print:hidden' : 'block'}`}>
                        <div className="flex justify-between items-end mb-4 pt-2 px-2">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2 text-[#0B5E4D]">
                                    <span className="bg-[#0B5E4D] text-white p-1.5 rounded-lg text-sm shadow-md">🛡️</span> MSTC방역
                                </h1>
                                <p className="text-xs text-gray-500 mt-1 font-bold">거래처 및 영업 관리 시스템</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-gray-400 font-mono font-bold tracking-wider">{TODAY.replace(/-/g, '.')} 기준</span>
                                <button onClick={() => {sessionStorage.removeItem("mstc_auth"); setIsAuth(false);}} className="text-[11px] font-bold text-gray-400 hover:text-gray-700 bg-gray-100 px-3 py-1 rounded-full transition-all">로그아웃</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-[#E3F2EC] rounded-xl text-[#0B5E4D] text-2xl">👤</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">운영중 거래처</p><p className="text-2xl font-black text-gray-800 leading-none">{activeData.length}</p><p className="text-[11px] text-gray-500 mt-1.5">이원식 {leeCount} · 강현준 {kangCount}</p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-rose-50 rounded-xl text-rose-700 text-2xl">📅</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">이번 달 방역 현황</p><p className="text-2xl font-black text-gray-800 leading-none">{activeData.length}</p><p className="text-[11px] text-gray-500 font-bold mt-1.5">완료 {completedThisMonth}건 <span className="text-rose-600">· 지연 {delayedThisMonth}건</span></p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-gray-50 rounded-xl text-gray-700 text-2xl">📉</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">총 누적 해지율</p><p className="text-2xl font-black text-gray-800 leading-none">{cancelRate}%</p><p className="text-[11px] text-gray-500 mt-1.5">해지 {termCount}건</p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-rose-50 rounded-xl text-rose-700 text-2xl">💰</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">총 미수금 현황</p><p className="text-xl font-black text-red-600 leading-none">₩{totalUncollected.toLocaleString()}</p><p className="text-[11px] text-gray-500 mt-1.5">현재 미납 {uncollectedClients.length}곳</p></div>
                            </div>
                        </div>

                        <div className="bg-white border border-gray-100 p-6 rounded-3xl shadow-sm relative overflow-hidden">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <h3 className="text-sm font-bold text-gray-800">📊 월별 순증 추이 (신규 및 해지)</h3>
                                    <select value={chartManager} onChange={e => setChartManager(e.target.value)} className="text-xs p-1.5 border rounded-lg bg-gray-50 text-gray-600 font-bold outline-none cursor-pointer hover:bg-gray-100 transition-all"><option>전체 담당자</option><option>이원식</option><option>강현준</option></select>
                                </div>
                                <div className="flex gap-3 text-[11px] font-bold text-gray-500">
                                    <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-[#0B5E4D] rounded-sm"></span> 신규</span><span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-rose-700 rounded-sm"></span> 해지</span>
                                </div>
                            </div>
                            <div className="h-32 flex items-end justify-around px-4 border-b border-gray-200 relative pb-2">
                                {chartStats.map(chart => (
                                    <div key={chart.month} className="flex flex-col items-center gap-2 relative z-10 w-16 group">
                                        <div className="flex items-end gap-1 h-28 w-full justify-center relative">
                                            <div className="bg-[#0B5E4D] rounded-t-sm shadow-sm transition-all duration-500 w-3.5" style={{ height: `${(chart.newCount / maxChartVal) * 100}%`, minHeight: chart.newCount > 0 ? '4px' : '0' }}></div>
                                            <div className="bg-rose-700 rounded-t-sm shadow-sm transition-all duration-500 w-3.5" style={{ height: `${(chart.termCount / maxChartVal) * 100}%`, minHeight: chart.termCount > 0 ? '4px' : '0' }}></div>
                                            <div className="absolute -top-10 bg-gray-800 text-white text-[11px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-20 shadow-lg font-bold">순증 {chart.netCount > 0 ? `+${chart.netCount}` : chart.netCount}건</div>
                                        </div>
                                        <span className="text-[10px] text-gray-400 font-bold">{chart.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-6">
                            <div className="flex-1 bg-white p-6 rounded-3xl border shadow-sm h-fit">
                                <div className="flex gap-2 p-1 bg-gray-50 border rounded-xl mb-4 overflow-x-auto">

                            {selectedItem && (

                                                <div className="grid grid-cols-2 gap-3 text-xs">

                                                    <label className="col-span-2"><b>사업자등록번호 (숫자만입력)</b><input value={editForm.bizNumber || ""} onChange={e=>setEditForm({...editForm, bizNumber: e.target.value})} className="border p-2 w-full rounded outline-none" placeholder="예: 1234567890" /></label>

                                                </div>
                                            </form>

                                                    <div><p className="text-gray-400">방역주기</p><p className="font-bold mt-1 text-gray-800">{selectedItem.cycle || "월1회"}</p></div>
                                                    <div><p className="text-gray-400">방역구분</p><p className="font-bold mt-1 text-blue-800">{selectedItem.serviceType}</p></div>
                                                    <div><p className="text-gray-400">결제상태</p><p className="font-bold mt-1 text-[#0B5E4D]">{selectedItem.payStatus}</p></div>
                                                    <div><p className="text-gray-400">계약금액</p><p className="font-mono font-bold mt-1">₩{Number(String(selectedItem.fee).replace(/,/g, '') || 0).toLocaleString()}</p></div>

                                                </div>

                                                <button onClick={() => { setEditForm(selectedItem); setIsEditing(true); setShowHistoryForm(false); setShowPayForm(false); }} className="flex-1 bg-gray-100 text-gray-700 text-xs py-2.5 rounded-xl border font-bold">✏️ 수정</button>

                                                    <label className="block"><b>출동대원</b><select value={historyForm.author} onChange={e => setHistoryForm({...historyForm, author: e.target.value})} className="w-full mt-1 p-2 border rounded-lg outline-none">{STAFF.map(s => <option key={s}>{s}</option>)}</select></label>

                                                                const nMeth = isSel ? historyForm.methods.filter(x => x !== m) : [...historyForm.methods, m];

                                                                    const tabChems = [...CHEMICALS_BY_TYPE[m], ...customChemsList[m]];
                                                                    nChem = nChem.filter(c => !tabChems.includes(c));

                                                                setHistoryForm({...historyForm, methods: nMeth, chemicals: nChem});

                                                        })}
                                                    </div>
                                                </div>
                                                {/* 살균 약품 */}
                                                {historyForm.methods.includes("살균") && (
                                                    <div className="p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl">
                                                        <p className="font-bold text-emerald-800 mb-2">🦠 살균 약품 선택 및 직접 입력</p>
                                                        <div className="flex flex-wrap gap-1.5 mb-3">
                                                            {CHEMICALS_BY_TYPE["살균"].map(c => {
                                                                const hasChem = historyForm.chemicals.includes(c);

                                                            })}
                                                            {customChemsList["살균"].map(c => {
                                                                const hasChem = historyForm.chemicals.includes(c);
                                                                return (
                                                                    <div key={c} className={`flex items-center rounded-lg border transition-all overflow-hidden ${hasChem ? 'bg-emerald-600 text-white border-emerald-700 font-bold' : 'bg-white text-gray-500 hover:bg-emerald-50'}`}>
                                                                        <button type="button" onClick={() => setHistoryForm({...historyForm, chemicals: hasChem ? historyForm.chemicals.filter(x => x !== c) : [...historyForm.chemicals, c]})} className="px-2.5 py-1.5 text-[11px] font-medium">{c}</button>
                                                                        <button type="button" onClick={(e) => { e.stopPropagation(); handleDeleteCustomChem("살균", c); }} className={`px-1.5 py-1.5 text-[10px] border-l hover:bg-red-500 hover:text-white transition-all ${hasChem ? 'border-emerald-500 text-emerald-200' : 'border-gray-200 text-gray-400'}`}>✕</button>

                                                        <p className="font-bold text-amber-800 mb-2">🪳 살충 약품 선택 및 직접 입력</p>
                                                        <div className="flex flex-wrap gap-1.5 mb-3">
                                                            {CHEMICALS_BY_TYPE["살충"].map(c => {
                                                                const hasChem = historyForm.chemicals.includes(c);
                                                                return <button type="button" key={c} onClick={() => setHistoryForm({...historyForm, chemicals: hasChem ? historyForm.chemicals.filter(x => x !== c) : [...historyForm.chemicals, c]})} className={`px-2.5 py-1.5 rounded-lg border text-[11px] font-medium transition-all ${hasChem ? 'bg-amber-600 text-white border-amber-700 font-bold' : 'bg-white text-gray-500 hover:bg-amber-50'}`}>{c}</button>
                                                            })}
                                                            {customChemsList["살충"].map(c => {
                                                                const hasChem = historyForm.chemicals.includes(c);
                                                                return (
                                                                    <div key={c} className={`flex items-center rounded-lg border transition-all overflow-hidden ${hasChem ? 'bg-amber-600 text-white border-amber-700 font-bold' : 'bg-white text-gray-500 hover:bg-amber-50'}`}>
                                                                        <button type="button" onClick={() => setHistoryForm({...historyForm, chemicals: hasChem ? historyForm.chemicals.filter(x => x !== c) : [...historyForm.chemicals, c]})} className="px-2.5 py-1.5 text-[11px] font-medium">{c}</button>
                                                                        <button type="button" onClick={(e) => { e.stopPropagation(); handleDeleteCustomChem("살충", c); }} className={`px-1.5 py-1.5 text-[10px] border-l hover:bg-red-500 hover:text-white transition-all ${hasChem ? 'border-amber-500 text-amber-200' : 'border-gray-200 text-gray-400'}`}>✕</button>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                        <div className="flex gap-1.5">
                                                            <input type="text" value={customChemInput["살충"]} onChange={e => setCustomChemInput({...customChemInput, "살충": e.target.value})} onKeyDown={e => {if(e.key === 'Enter') { e.preventDefault(); handleAddCustomChem("살충"); }}} placeholder="기타 살충 약품 직접 입력 후 추가 버튼 클릭" className="flex-1 p-2 border rounded-lg text-[11px] outline-none shadow-sm" />
                                                            <button type="button" onClick={() => handleAddCustomChem("살충")} className="px-3 py-1.5 bg-amber-700 text-white rounded-lg text-[11px] font-bold shadow-sm hover:opacity-90">추가</button>
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                <div className="flex gap-2 justify-end pt-2">
                                                    <button type="button" onClick={() => setShowHistoryForm(false)} className="px-4 py-2 border rounded-xl bg-white font-bold">취소</button>
                                                    <button type="submit" className="px-5 py-2 bg-[#0B5E4D] text-white rounded-xl font-bold">기록 추가</button>
                                                </div>
                                            </form>
                                        )}

                                        {/* 과거 히스토리 */}
                                        <div className="space-y-3 pt-4 border-t">
                                            <h4 className="text-xs font-bold text-gray-500">📋 가맹점 통합 히스토리 (방역 / 수금)</h4>
                                            
                                            {(selectedItem.paymentHistory || []).map((p) => (
                                                <div key={p.id} className="p-4 bg-amber-50/30 border border-amber-100 rounded-2xl text-xs space-y-1 relative group">
                                                    <button onClick={() => handleDeletePayment(p.id)} className="absolute top-3 right-3 text-gray-400 hover:text-red-600 text-[10px] font-bold bg-white px-2 py-1 rounded shadow-sm">🗑️ 삭제</button>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className={`font-bold text-sm ${p.status === '미수금' ? 'text-red-600' : 'text-blue-600'}`}>💰 {p.status}</span>
                                                        <span className="font-mono text-gray-400 text-[11px] mr-12">{p.month}</span>
                                                    </div>
                                                    <p className="text-[12px] font-bold text-gray-800">금액: ₩{Number(p.amount).toLocaleString()}</p>
                                                    {p.note && <p className="text-[11px] text-gray-500 pt-1">메모: {p.note}</p>}
                                                </div>
                                            ))}

                                            {(selectedItem.history || []).map((h) => (
                                                <div key={h.id} className="p-4 bg-gray-50 border rounded-2xl text-xs space-y-1 relative group">
                                                    <button onClick={() => handleDeleteHistory(h.id)} className="absolute top-3 right-3 text-gray-400 hover:text-red-600 text-[10px] font-bold bg-white px-2 py-1 rounded shadow-sm">🗑️ 삭제</button>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-bold text-emerald-800 text-sm">✅ {h.type} 완료</span>
                                                        <span className="font-mono text-gray-400 text-[11px] mr-12">{h.date}</span>
                                                    </div>
                                                    {h.chemicals && h.chemicals.length > 0 && <p className="text-[11px] text-gray-600 font-medium">💊 약품: {h.chemicals.join(", ")}</p>}
                                                    <p className="text-[10px] text-gray-400 pt-1">출동대원: {h.author}</p>
                                                    {h.type === "방역" && (
                                                        <button onClick={() => { 
                                                            setCertEntry(h); 
                                                            
                                                            // 💡 자동 증명서 번호 생성
                                                            const yy = h.date.split('-')[0].slice(2);
                                                            const mm = h.date.split('-')[1];
                                                            const rnd = Math.floor(Math.random() * 9000 + 1000);
                                                            setCertNumber(`제 ${yy}-${mm}-${rnd} 호`);
                                                            
                                                            setIsCertOpen(true); 
                                                        }} className="mt-3 w-full bg-white border border-emerald-200 text-emerald-800 text-xs py-2 rounded-xl font-bold shadow-sm hover:bg-emerald-50 transition-all">📄 이 날짜로 소독증명서 발급</button>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            {(!selectedItem.history || selectedItem.history.length === 0) && (!selectedItem.paymentHistory || selectedItem.paymentHistory.length === 0) && (
                                                <p className="text-center text-xs text-gray-400 py-4">저장된 히스토리가 없습니다.</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 신규 등록 모달 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
                            <form onSubmit={handleRegister} className="bg-white rounded-3xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2">신규 업체 등록</h3>
                                <div className="grid grid-cols-2 gap-3 text-xs">
                                    <label className="col-span-2"><b>등록 탭 구분 *</b>
                                        <select name="tab" className="w-full p-2 border rounded-lg mt-1 bg-gray-50"><option value="active">방역 거래처 (운영)</option><option value="prospect">영업처 (대기)</option></select>
                                    </label>
                                    <label className="col-span-2"><b>상호명 *</b><input name="name" required className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label className="col-span-2"><b>사업자등록번호 (선택)</b><input name="bizNumber" className="w-full p-2 border rounded-lg mt-1" placeholder="고객 증명서 조회용 (숫자만 입력)" /></label>
                                    <label><b>담당 대원 *</b><select name="manager" className="w-full p-2 border rounded-lg mt-1">{STAFF.map(s=><option key={s}>{s}</option>)}</select></label>
                                    <label><b>연락처 *</b><input name="phone" required className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label className="col-span-2 flex gap-2">
                                        <div className="flex-1"><b>시/도 *</b><select name="gu" value={regCity} onChange={e=>setRegCity(e.target.value)} className="border p-2 w-full rounded-lg mt-1 bg-white">{Object.keys(REGIONS).map(r=><option key={r} value={r}>{r}</option>)}</select></div>
                                        <div className="flex-1"><b>구/군 *</b><select name="dong" className="border p-2 w-full rounded-lg mt-1 bg-white">{REGIONS[regCity].map(d=><option key={d} value={d}>{d}</option>)}</select></div>
                                    </label>
                                    <label className="col-span-2"><b>상세주소 *</b><input name="address" required className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label className="col-span-2 text-emerald-800 font-bold border-t pt-2 mt-2">필수 관리 항목</label>
                                    <label><b>방역시작일 *</b><input type="date" name="contractStart" defaultValue={TODAY} required className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label><b>평수 (면적) *</b><input name="area" defaultValue="30" className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label><b>계약 금액 *</b><input type="number" name="fee" defaultValue="30000" className="w-full p-2 border rounded-lg mt-1" /></label>
                                    <label><b>방역 주기 *</b><select name="cycle" className="w-full p-2 border rounded-lg mt-1">{CYCLES.map(c=><option key={c}>{c}</option>)}</select></label>
                                    <label><b>방역 구분 *</b><select name="serviceType" className="w-full p-2 border rounded-lg mt-1"><option>정기</option><option>분기</option><option>무료</option></select></label>
                                    <label><b>결제 상태 *</b><select name="payStatus" className="w-full p-2 border rounded-lg mt-1"><option>유료</option><option>무료</option><option>일시중지</option><option>해지</option></select></label>
                                    <label className="col-span-2 mt-2"><b>기타 (추가 정보)</b><textarea name="etcInfo" className="w-full p-2 border rounded-lg mt-1 h-16" placeholder="특이사항 등 자유롭게 입력"></textarea></label>
                                </div>
                                <div className="flex gap-2 justify-end mt-6">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2 border rounded-xl bg-gray-100 font-bold text-xs">취소</button>
                                    <button type="submit" className="px-6 py-2 bg-[#0B5E4D] text-white rounded-xl font-bold text-xs">등록 완료</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* 소독증명서 출력 모달 */}
                    {isCertOpen && selectedItem && (
                        <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 overflow-y-auto print:absolute print:inset-0 print:bg-white print:p-0">
                            <div className="bg-white rounded-3xl p-8 max-w-3xl w-full max-h-[96vh] overflow-y-auto my-auto shadow-2xl print:shadow-none print:w-full print:h-auto print:max-h-none print:overflow-visible">
                                <div className="bg-gray-50 border p-4 rounded-2xl mb-6 text-xs flex justify-between items-center print:hidden">
                                    <div><p className="font-bold text-emerald-800 mb-1">🖨️ 법인 인감 도장 첨부 (옵션)</p><input type="file" accept="image/*" onChange={handleSealUpload} className="text-[11px]" /></div>
                                    <button onClick={() => setSealImage(null)} className="text-gray-400 underline hover:text-red-500">업로드 도장 지우기</button>
                                </div>

                                <div id="cert-print-area" className="border border-black p-12 bg-white text-black text-[13px] leading-relaxed relative mx-auto print:p-0" style={{ width: "210mm", minHeight: "297mm", boxSizing: "border-box" }}>
                                    
                                    {/* 💡 자동 생성 번호 표시 */}
                                    <div className="flex justify-between items-start mb-2">
                                        <p className="text-[10px] text-gray-500 font-medium">■ 감염병의 예방 및 관리에 관한 법률 시행규칙 [별지 제28호서식]</p>
                                        <p className="font-bold text-[13px]">{certNumber}</p>
                                    </div>
                                    
                                    <h2 className="text-center text-3xl font-black tracking-[0.6em] my-10 pt-4">소 독 증 명 서</h2>
                                    <table className="w-full border-collapse border border-black text-left my-10">
                                        <tbody>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center w-28 text-[14px]" rowSpan="2">대상 시설</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold w-28 text-[14px]">상호(명칭)</td>
                                                <td className="border border-black p-5 font-bold text-[15px]">{selectedItem.name}</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold w-36 text-[14px]">실시 면적(용적)</td>
                                                <td className="border border-black p-5 font-mono text-[14px]">({selectedItem.area || "30"}평 ㎡²)</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">소재지</td>
                                                <td className="border border-black p-5 text-[14px]" colSpan="3">{selectedItem.gu} {selectedItem.dong} {selectedItem.address}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">관리(운영)자 확인</td>
                                                <td className="border border-black p-5 text-[14px]" colSpan="3">직위 : 매니저 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 성명 : {certEntry?.author || "이원식"}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">소독기간</td>
                                                <td className="border border-black p-5 text-center font-mono text-[14px]" colSpan="3">{certEntry?.date || TODAY} ~ {certEntry?.date || TODAY}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" rowSpan="2">소독 내용</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">종류</td>
                                                <td className="border border-black p-5 text-[14px]" colSpan="3">{(certEntry?.methods && certEntry.methods.length > 0) ? certEntry.methods.map(m=>m+" 잔류 분무").join(", ") : "살충 잔류 분무"}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">약품 사용 내용</td>
                                                <td className="border border-black p-5 font-medium text-[14px]" colSpan="3">{(certEntry?.chemicals && certEntry.chemicals.length > 0) ? certEntry.chemicals.join(", ") : "롱다운플러스"}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <p className="my-20 text-[14px] text-justify leading-loose text-gray-900 px-3">&nbsp;&nbsp;&nbsp;「감염병의 예방 및 관리에 관한 법률」 제54조제1항 및 같은 법 시행규칙 제40조제2항에 따라 위와 같이 소독을 실시하였음을 증명합니다.</p>
                                    <h3 className="text-center font-bold text-[15px] my-16 tracking-widest">2026 년 &nbsp;&nbsp;&nbsp;&nbsp; {certEntry?.date ? certEntry.date.split('-')[1] : '5'} 월 &nbsp;&nbsp;&nbsp;&nbsp; {certEntry?.date ? certEntry.date.split('-')[2] : '27'} 일</h3>
                                    <div className="mt-28 pt-10 border-t border-black text-[13px] space-y-3 relative">
                                        <p className="flex justify-between"><span><b>소독 실시자 상호(명칭)</b></span> <span className="font-bold text-right text-[14px]">{CERT_ISSUER.name}</span></p>
                                        <p className="flex justify-between"><span><b>소재지</b></span> <span className="text-right text-gray-700 text-[13px]">{CERT_ISSUER.address}</span></p>
                                        <p className="flex justify-between relative">
                                            <span><b>성명(대표자)</b></span> <span className="font-bold text-right mr-20 text-[14px]">{CERT_ISSUER.reps}</span>
                                            <span className="absolute right-4 top-[-14px]">
                                                {/* 💡 기본 내장 도장 또는 업로드된 도장 표시 */}
                                                {sealImage ? <img src={sealImage} alt="직인" className="w-16 h-16 object-contain rounded-full" /> : 
                                                (COMPANY_SEAL_URL ? <img src={COMPANY_SEAL_URL} alt="직인" className="w-16 h-16 object-contain rounded-full" /> : 
                                                <span className="text-red-600 font-bold border-2 border-red-600 rounded-full w-12 h-12 flex items-center justify-center text-[10px] transform rotate-[-6deg] bg-white/40">법인인장</span>)}
                                            </span>
                                        </p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6 border-t pt-4 print:hidden">
                                    <button onClick={() => setIsCertOpen(false)} className="px-5 py-3 border rounded-xl text-xs bg-gray-100 font-bold">창 닫기</button>
                                    <button onClick={() => window.print()} className="px-8 py-3 bg-[#0B5E4D] text-white rounded-xl text-xs font-bold shadow-md hover:opacity-90">🖨️ 정식 A4 서식 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
