<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 실시간 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F4EF; color: #16241E; margin: 0; padding: 0; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4 portrait; margin: 14mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 최상단 전역 설정 데이터 배치 (렌더링 뻗음 버그 근본적 해결)
        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const T = { bg: "#F1F4EF", surface: "#FFFFFF", surfaceAlt: "#F8FAF6", ink: "#16241E", inkSoft: "#5B6B64", inkFaint: "#8B9A92", line: "#DEE5DC", lineSoft: "#E9EEE6", teal: "#0E7A63", tealDeep: "#0B5E4D", tealTint: "#E3F2EC", amber: "#B5740A", amberTint: "#FBF1DD", danger: "#A23B3B", dangerTint: "#F6E8E7" };
        const TODAY = "2026-06-19";
        const CYCLES = ["주1회", "2주1회", "월1회", "2개월1회", "분기1회", "반기1회", "연1회"];
        const STAFF = ["이원식", "강현준"];
        
        const GU_DONG = {
            "부산": ["남구", "부산진구", "사상구", "동래구", "금정구", "강서구", "사하구", "수영구", "연제구", "중구", "동구", "해운대구", "북구", "서구", "영도구"],
            "경남": ["창원시", "양산시", "김해시", "창원", "김해"]
        };

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_9eN2W4n2Bf0Jm88r7t1k9P3vP9Lz8L-r3D/exec"; 

        function App() {
            const [systemMode, setSystemMode] = React.useState("admin"); 
            const [active, setActive] = React.useState([]);
            const [prospects, setProspects] = React.useState([]);
            const [terminated, setTerminated] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState("active");
            
            const [search, setSearch] = React.useState("");
            const [filterGu, setFilterGu] = React.useState("");
            const [filterCycle, setFilterCycle] = React.useState("");
            const [filterManager, setFilterManager] = React.useState(""); 

            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [isCertOpen, setIsCertOpen] = React.useState(false);
            const [certEntry, setCertEntry] = React.useState(null);

            const [bizInput, setBizInput] = React.useState("");
            const [searchResult, setSearchResult] = React.useState(null);
            const [searchError, setSearchError] = React.useState("");

            React.useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        setActive(data.active || []);
                        setProspects(data.prospects || []);
                        setTerminated(data.terminated || []);
                        setLoading(false);
                    })
                    .catch(() => {
                        // 안정적인 연동 지연 대비용 프리셋 로드
                        setActive([
                            {id: "AC001", name: "백억커피 명지국제신도시점", gu: "부산", dong: "강서구", manager: "강현준", cycle: "월1회", address: "부산 강서구 명지국제5로 59 102호", businessNumber: "1234567890", area: "13"},
                            {id: "AC002", name: "물고기한마리", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 낙동대로233번길 50-1", businessNumber: "9876543210", area: "33"},
                            {id: "AC003", name: "불막열삼 괴정점", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 사하로 171 불막열삼 괴정점", businessNumber: "5555555555", area: "18"},
                            {id: "AC037", name: "숯불앤이프로", gu: "부산", dong: "북구", manager: "이원식", cycle: "월1회", address: "부산 북구 금곡대로616번길 79", businessNumber: "2602264", area: "5"}
                        ]);
                        setLoading(false);
                    });
            }, []);

            function handleRegister(formData, kind) {
                const safeData = {
                    id: formData.id || "AC" + Date.now(),
                    name: formData.name || "미지정 상호명",
                    businessNumber: formData.businessNumber || "",
                    contactName: formData.contactName || "",
                    phone: formData.phone || "",
                    gu: formData.gu || "부산",
                    dong: formData.dong || "",
                    address: formData.address || "",
                    area: formData.area || "5",
                    manager: formData.manager || STAFF[0],
                    cycle: formData.cycle || "월1회"
                };

                if(kind === "active") {
                    setActive(prev => [safeData, ...prev]);
                } else {
                    setProspects(prev => [safeData, ...prev]);
                }
                setIsModalOpen(false);

                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ kind: kind === "active" ? "active" : "prospects", data: safeData })
                }).catch(e => console.log("동기화중"));
            }

            function handleCustomerSearch(e) {
                e.preventDefault();
                setSearchError(""); setSearchResult(null);
                const cleanInput = bizInput.replace(/-/g, "").trim();
                if(!cleanInput) return;

                const found = active.find(r => String(r.businessNumber || "").replace(/-/g, "").trim() === cleanInput || String(r.name || "").includes(cleanInput));
                if(found) { setSearchResult(found); } 
                else { setSearchError("등록된 사업자번호 또는 업체명을 찾을 수 없습니다."); }
            }

            const currentList = React.useMemo(() => {
                const base = activeTab === "active" ? active : activeTab === "prospect" ? prospects : terminated;
                return (base || []).filter(r => {
                    if (!r) return false;
                    const matchSearch = (r.name || "").toLowerCase().includes(search.toLowerCase()) || (r.address || "").toLowerCase().includes(search.toLowerCase());
                    const matchGu = !filterGu || r.gu === filterGu;
                    const matchCycle = !filterCycle || r.cycle === filterCycle;
                    const matchManager = !filterManager || r.manager === filterManager;
                    return matchSearch && matchGu && matchCycle && matchManager;
                });
            }, [activeTab, active, prospects, terminated, search, filterGu, filterCycle, filterManager]);

            return (
                <div class="min-h-screen p-4 md:p-6">
                    <div class="max-w-4xl mx-auto mb-4 flex justify-end gap-1">
                        <button onClick={() => setSystemMode("admin")} class={`text-[11px] px-3 py-1.5 rounded-lg font-bold transition-all ${systemMode === "admin" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border border-gray-200"}`}>내부 직원모드</button>
                        <button onClick={() => setSystemMode("customer")} class={`text-[11px] px-3 py-1.5 rounded-lg font-bold transition-all ${systemMode === "customer" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border border-gray-200"}`}>고객사 조회 모드</button>
                    </div>

                    {systemMode === "admin" ? (
                        <div class="max-w-4xl mx-auto">
                            <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-2xl border border-[#DEE5DC] shadow-sm">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-[#0B5E4D] text-white rounded-xl font-bold">🛡️</div>
                                    <div>
                                        <h1 class="text-base font-bold text-[#16241E]">MSTC방역 실시간 통합 운영관리</h1>
                                        <p class="text-xs text-[#5B6B64]">거래처 통합 필터링 및 소독필증 발급기</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} class="bg-[#0E7A63] text-white font-medium text-xs px-3.5 py-2 rounded-xl hover:opacity-90 transition-all">+ 신규 등록 팝업</button>
                            </header>

                            <main class="bg-white border border-[#DEE5DC] rounded-3xl p-4 shadow-sm">
                                <div class="flex gap-1.5 p-1 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl mb-4">
                                    <button onClick={() => setActiveTab("active")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'active' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>방역 거래처 ({active.length})</button>
                                    <button onClick={() => setActiveTab("prospect")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'prospect' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>영업 리드 ({prospects.length})</button>
                                    <button onClick={() => setActiveTab("terminated")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center transition-all ${activeTab === 'terminated' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>해지 거래처 ({terminated.length})</button>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 mb-4">
                                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder="업체명 또는 주소 검색..." class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-[#F8FAF6] outline-none" />
                                    
                                    {/* 👥 담당자별 정렬 필터 작동부 */}
                                    <select value={filterManager} onChange={e => setFilterManager(e.target.value)} class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-white text-gray-600 outline-none">
                                        <option value="">전체 담당자</option>
                                        {STAFF.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>

                                    <select value={filterGu} onChange={e => setFilterGu(e.target.value)} class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-white text-gray-600 outline-none">
                                        <option value="">전체 지역</option>
                                        {Object.keys(GU_DONG).map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>

                                    <select value={filterCycle} onChange={e => setFilterCycle(e.target.value)} class="text-xs p-2 rounded-xl border border-[#DEE5DC] bg-white text-gray-600 outline-none">
                                        <option value="">전체 주기</option>
                                        {CYCLES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div class="flex flex-col gap-2">
                                    {currentList.map(item => (
                                        <div key={item.id} class="flex justify-between items-center p-3 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl hover:bg-white hover:shadow-sm transition-all">
                                            <div class="min-w-0 flex-1">
                                                <h4 class="font-bold text-sm text-[#16241E] truncate">{item.name}</h4>
                                                <p class="text-xs text-[#5B6B64] mt-0.5">{item.gu} {item.dong || ""} · 주소: {item.address || "미기재"} · <b>담당: {item.manager}</b></p>
                                            </div>
                                            <button onClick={() => { setCertEntry(item); setIsCertOpen(true); }} class="text-xs font-medium bg-[#E3F2EC] text-[#0B5E4D] px-3 py-1 rounded-lg hover:opacity-80 flex-shrink-0">📄 증명서 발급</button>
                                        </div>
                                    ))}
                                </div>
                            </main>
                        </div>
                    ) : (
                        <div class="max-w-sm mx-auto bg-white p-6 rounded-3xl border border-[#DEE5DC] shadow-md mt-12">
                            <div class="text-center mb-6">
                                <span class="text-2xl">🛡️</span>
                                <h2 class="text-base font-bold mt-2 text-[#16241E]">소독증명서 원클릭 자가발급</h2>
                                <p class="text-xs text-[#5B6B64] mt-1">사업자번호나 업체 상호명을 입력하시면 실시간 출력이 가능합니다.</p>
                            </div>
                            <form onSubmit={handleCustomerSearch} class="flex flex-col gap-3">
                                <input 
                                    type="text" 
                                    value={bizInput} 
                                    onChange={e => setBizInput(e.target.value)} 
                                    placeholder="사업자번호 또는 업체명 입력" 
                                    class="w-full p-3 border border-[#DEE5DC] rounded-xl text-center font-bold text-base focus:border-[#0E7A63] outline-none bg-[#F8FAF6]"
                                />
                                <button type="submit" class="w-full bg-[#0E7A63] text-white font-medium p-3 rounded-xl text-xs font-bold hover:opacity-95 transition-all">조회하기</button>
                            </form>

                            {searchError && <p class="text-xs text-red-500 text-center mt-3 font-semibold">{searchError}</p>}

                            {searchResult && (
                                <div class="mt-5 p-4 bg-[#E3F2EC] rounded-2xl border border-[#0E7A63]/10">
                                    <p class="text-xs font-bold text-[#0B5E4D] text-center">✅ 조회 가맹점이 확인되었습니다.</p>
                                    <div class="text-xs text-gray-600 my-3 flex flex-col gap-1.5 border-y py-2.5 border-gray-200">
                                        <p><b>가맹점명:</b> {searchResult.name}</p>
                                        <p><b>매장소재지:</b> {searchResult.address || "지정 관내 지점"}</p>
                                        <p><b>실시 면적:</b> {searchResult.area || "5"}평</p>
                                    </div>
                                    <button onClick={() => { setCertEntry(searchResult); setIsCertOpen(true); }} class="w-full bg-[#0B5E4D] text-white text-xs font-bold p-2.5 rounded-xl hover:opacity-90">📄 별지 제28호 소독증명서 인쇄 및 다운로드</button>
                                </div>
                            )}
                        </div>
                    )}

                    {isModalOpen && (
                        <div class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl max-w-sm w-full p-4 max-h-[80vh] overflow-y-auto">
                                <div class="flex justify-between items-center pb-2 border-b border-[#DEE5DC] mb-3">
                                    <h3 class="text-sm font-bold">신규 거래처 등록하기</h3>
                                    <button onClick={() => setIsModalOpen(false)} class="text-lg font-bold">×</button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const record = Object.fromEntries(fd.entries());
                                    record.id = "AC" + Date.now();
                                    handleRegister(record, activeTab === "prospect" ? "prospect" : "active");
                                }}>
                                    <div class="flex flex-col gap-2.5 text-xs">
                                        <label class="block"><b>업체 상호명 *</b><input name="name" required class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>사업자등록번호 (또는 일련번호) *</b><input name="businessNumber" placeholder="000-00-00000" required class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>대표/담당자 성명 *</b><input name="contactName" required class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>연락처 *</b><input name="phone" required class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>지역구</b>
                                            <select name="gu" class="w-full mt-1 p-2 border border-gray-200 rounded-xl bg-white outline-none">
                                                <option value="부산">부산</option>
                                                <option value="경남">경남</option>
                                            </select>
                                        </label>
                                        <label class="block"><b>소재지 상세주소</b><input name="address" class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>실시 면적 (평수)</b><input name="area" defaultValue="5" class="w-full mt-1 p-2 border border-gray-200 rounded-xl outline-none" /></label>
                                        <label class="block"><b>담당 관리자</b>
                                            <select name="manager" class="w-full mt-1 p-2 border border-gray-200 rounded-xl bg-white outline-none">
                                                {STAFF.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </label>
                                        <div class="flex gap-2 justify-end mt-4">
                                            <button type="button" onClick={() => setIsModalOpen(false)} class="px-3 py-1.5 border rounded-xl">취소</button>
                                            <button type="submit" class="px-3 py-1.5 bg-[#0E7A63] text-white rounded-xl font-bold">시스템 즉시등록</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 별지 제28호서식 공식 PDF 서식 미러링 모달 */}
                    {isCertOpen && certEntry && (
                        <div class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl p-5 max-w-xl w-full max-h-[85vh] overflow-y-auto">
                                <div id="cert-print-area" class="border border-black p-5 bg-white text-black text-[12px] leading-relaxed relative">
                                    <p class="text-[10px] text-gray-500 font-medium mb-1">■ 감염병의 예방 및 관리에 관한 법률 시행규칙 [별지 제28호서식] <span class="float-right text-black font-bold">제 26-02-264 호</span></p>
                                    
                                    <h2 class="text-center text-2xl font-black tracking-[0.5em] my-6">소 독 증 명 서</h2>
                                    
                                    <table class="w-full border-collapse border border-black text-left">
                                        <tbody>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold text-center w-24" rowspan="2">대상 시설</td>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold w-24">상호(명칭)</td>
                                                <td class="border border-black p-2.5 font-bold text-[13px]">{certEntry.name}</td>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold w-28">실시 면적(용적)</td>
                                                <td class="border border-black p-2.5 font-mono">({certEntry.area || "5"}평 ㎡²)</td>
                                            </tr>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold">소재지</td>
                                                <td class="border border-black p-2.5" colspan="3">{certEntry.address || "부산/경남 관내 가맹지점 명시"}</td>
                                            </tr>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold text-center" colspan="2">관리(운영)자 확인</td>
                                                <td class="border border-black p-2.5" colspan="3">직위 : 팀장 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 성명 : 임은서</td>
                                            </tr>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold text-center" colspan="2">소독기간</td>
                                                <td class="border border-black p-2.5 text-center font-mono" colspan="3">2026.05.27 ~ 2026.05.27</td>
                                            </tr>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold text-center" rowspan="2">소독 내용</td>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold">종류</td>
                                                <td class="border border-black p-2.5" colspan="3">살충 잔류 분무, 독 먹이법</td>
                                            </tr>
                                            <tr>
                                                <td class="border border-black p-2.5 bg-gray-50 font-bold">약품 사용 내용</td>
                                                <td class="border border-black p-2.5 font-medium" colspan="3">롱다운플러스, 맥스포스 셀렉트 이지갤</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <p class="my-8 text-[12px] text-justify leading-relaxed text-gray-900">
                                        &nbsp;「감염병의 예방 및 관리에 관한 법률」 제54조제1항 및 같은 법 시행규칙 제40조제2항에 따라 위와 같이 소독을 실시하였음을 증명합니다.
                                    </p>

                                    <p class="text-center font-bold text-[13px] my-6">2026 년 &nbsp; 5 월 &nbsp; 27 일</p>

                                    <div class="mt-8 pt-4 border-t border-gray-200 text-[12px] space-y-1">
                                        <p class="flex justify-between"><span><b>소독 실시자 상호(명칭)</b></span> <span class="font-bold text-right">{CERT_ISSUER.name}</span></p>
                                        <p class="flex justify-between"><span><b>소재지</b></span> <span class="text-right text-gray-700">{CERT_ISSUER.address}</span></p>
                                        <p class="flex justify-between relative">
                                            <span><b>성명(대표자)</b></span> 
                                            <span class="font-bold text-right mr-8">{CERT_ISSUER.reps}</span>
                                            <span class="absolute right-0 top-[-6px] text-red-600 font-bold border-2 border-red-600 rounded-full w-7 h-7 flex items-center justify-center text-[10px] transform rotate-[-8deg] opacity-85">법인</span>
                                        </p>
                                    </div>
                                </div>
                                
                                <div class="flex justify-end gap-2 mt-4">
                                    <button onClick={() => setIsCertOpen(false)} class="px-3 py-1.5 border rounded-xl text-xs">닫기 창</button>
                                    <button onClick={() => window.print()} class="px-4 py-1.5 bg-[#0B5E4D] text-white rounded-xl text-xs font-bold shadow-sm hover:opacity-90">🖨️ 인쇄 및 PDF 다운로드</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
