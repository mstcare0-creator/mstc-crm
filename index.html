        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAF6; color: #16241E; margin: 0; padding: 0; }

            body * { visibility: hidden !important; }

            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }

<body class="p-4 md:p-6">

        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = new Date().toISOString().split('T')[0];
        const CURRENT_MONTH = TODAY.slice(0, 7);
        const STAFF = ["이원식", "강현준"];
        const CYCLES = ["월1회", "3개월1회", "단기"];
        const CHEMICALS_BY_TYPE = { "살균": ["마이크로켐 골드", "키니아 비실드"], "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤", "다발이끔 살서제"] };
        const REGIONS = { 
            "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구"],
            "창원": ["의창구", "성산구", "마산합포구", "마산회원구", "진해구"],
            "경남": ["양산시", "김해시"] 
        };
        const COMPANY_SEAL_URL = "https://mstcare0-creator.github.io/mstc-crm/seal.png"; 

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(fetchedData => {
                        setData(fetchedData);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const updateDataAndSync = (newData) => {
                setData(newData);
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: newData })
                });
            };

            const [currentTab, setCurrentTab] = useState("active");
            const [search, setSearch] = useState("");
            const [selectedItem, setSelectedItem] = useState(null);
            const [detailTab, setDetailTab] = useState("info");
            const [historyYearFilter, setHistoryYearFilter] = useState("all");
            const [paymentYearFilter, setPaymentYearFilter] = useState("all");

            // 💡 정렬 로직 추가 (날짜 내림차순 정렬)
            const sortedHistory = useMemo(() => {
                if (!selectedItem || !selectedItem.history) return [];
                return [...selectedItem.history]
                    .filter(h => historyYearFilter === 'all' || (h.date && h.date.startsWith(historyYearFilter)))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [selectedItem, historyYearFilter]);

            const sortedPayments = useMemo(() => {
                if (!selectedItem || !selectedItem.paymentHistory) return [];
                return [...selectedItem.paymentHistory]
                    .filter(p => paymentYearFilter === 'all' || (p.month && p.month.startsWith(paymentYearFilter)))
                    .sort((a, b) => new Date(b.month + '-01') - new Date(a.month + '-01')).reverse();
            }, [selectedItem, paymentYearFilter]);

            // ... 나머지 코드는 기존과 동일하되, 히스토리/수금 렌더링 부분만 아래와 같이 수정

            // {sortedHistory.map((h) => ...)}

            // 위에서 정의한 sortedHistory, sortedPayments로 교체하여 사용

        }
