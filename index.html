<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 실시간 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F4EF; color: #16241E; margin: 0; padding: 0; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4 portrait; margin: 0mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = "2026-06-19";
        const CYCLES = ["주1회", "2주1회", "월1회", "2개월1회", "분기1회", "반기1회", "연1회"];
        const STAFF = ["이원식", "강현준"];
        
        // 💊 [기능정밀화] 살균 약품과 살충 약품의 데이터 완벽 분리 구축
        const CHEMICALS_BY_TYPE = {
            "살균": ["마이크로켐 골드", "키니아 비실드"],
            "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤", "다발이끔 살서제"]
        };
        const ALL_CHEMICALS = [...CHEMICALS_BY_TYPE["살균"], ...CHEMICALS_BY_TYPE["살충"]];
        
        const GU_DONG = {
            "부산": ["남구", "부산진구", "사상구", "동래구", "금정구", "강서구", "사하구", "수영구", "연제구", "중구", "동구", "해운대구", "북구", "서구", "영도구"],
            "경남": ["창원시", "양산시", "김해시", "창원", "김해"]
        };

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_9eN2W4n2Bf0Jm88r7t1k9P3vP9Lz8L-r3D/exec"; 

        function App() {
            const [systemMode, setSystemMode] = React.useState("admin"); 
            const [active, setActive] = React.useState([]);
            const [prospects, setProspects] = React.useState([]);
            const [terminated, setTerminated] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState("active");
            
            const [search, setSearch] = React.useState("");
            const [filterGu, setFilterGu] = React.useState("");
            const [filterCycle, setFilterCycle] = React.useState("");

            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [isCertOpen, setIsCertOpen] = React.useState(false);
            const [certRecord, setCertRecord] = React.useState(null);
            const [certEntry, setCertEntry] = React.useState(null);
            
            const [selectedItem, setSelectedItem] = React.useState(null);
            const [showHistoryForm, setShowHistoryForm] = React.useState(false);
            
            // 🛠️ 처리 종류의 기본 선택값을 배열로 두고 관리
            const [historyForm, setHistoryForm] = React.useState({ 
                date: TODAY, 
                type: "방역", 
                methods: ["살충"], // 기본 선택값 살충으로 세팅
                chemicals: ["롱다운플러스", "맥스포스 셀렉트 이지갤"], 
                note: "", 
                author: "이원식" 
            });
            const [sealImage, setSealImage] = React.useState(null);

            const [bizInput, setBizInput] = React.useState("");
            const [searchResult, setSearchResult] = React.useState(null);
            const [searchError, setSearchError] = React.useState("");

            React.useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        setActive(data.active || []);
                        setProspects(data.prospects || []);
                        setTerminated(data.terminated || []);
                        setLoading(false);
                    })
                    .catch(() => {
                        setActive([
                            {id: "AC001", name: "춘향이보쌈왕족발(민 푸드)", gu: "부산", dong: "동래구", manager: "강현준", cycle: "월1회", address: "부산 동래구 명륜로 112", businessNumber: "123-45-67890", area: "15", contractStart: "2024-10-02", status: "정상", phone: "010.4812.9805", fee: "30000", history: [{id: "H1", date: "2024-10-02", type: "상담", content: "신규 계약 체결", author: "강현준"}]},
                            {id: "AC002", name: "고구려 짬뽕 가야밀면", gu: "부산", dong: "부산진구", manager: "강현준", cycle: "월1회", address: "부산 부산진구 가야대로 502", businessNumber: "987-65-43210", area: "15", contractStart: "2024-10-17", status: "정상", phone: "010.2541.3180", fee: "30000", history: [{id: "H2", date: "2024-10-17", type: "상담", content: "신규 계약 체결", author: "강현준"}]},
                            {id: "AC003", name: "담락참치일잔 진해용원점", gu: "부산", dong: "강서구", manager: "강현준", cycle: "월1회", address: "부산 강서구 용원서로 32", businessNumber: "555-55-55555", area: "15", contractStart: "2024-11-28", status: "정상", phone: "010.8121.9820", fee: "30000", history: [{id: "H3", date: "2024-11-28", type: "상담", content: "신규 계약 체결", author: "강현준"}]},
                            {id: "AC004", name: "30년 불멸의 닭발", gu: "부산", dong: "동래구", manager: "이원식", cycle: "월1회", address: "부산 동래구 충렬대로 182", businessNumber: "214-11-89732", area: "8", contractStart: "2025-06-20", status: "정상", phone: "010.2674.3095", fee: "30000", payStatus: "일시중단", history: [{id: "H4", date: "2025-06-20", type: "상담", content: "신규 계약 체결", author: "이원식"}, {id: "H5", date: "2026-05-22", type: "방역", content: "정기 방역 실시 완료", author: "이원식", methods: ["살충 잔류 분무", "독 먹이법"], chemicals: ["롱다운플러스", "맥스포스 셀렉트 이지갤"]}]},
                            {id: "AC005", name: "전주명품콩나물국밥", gu: "창원", dong: "진해구", manager: "강현준", cycle: "월1회", address: "창원 진해구 충장로 405", businessNumber: "105-09-88732", area: "70", contractStart: "2025-05-14", status: "정상", phone: "010.7272.0512", fee: "40000", history: [{id: "H6", date: "2026-06-09", type: "방역", content: "정기 방역 실시 완료", author: "강현준", methods: ["살충 잔류 분무"], chemicals: ["롱다운플러스"]}]},
                            {id: "AC006", name: "영커피 창원상남점", gu: "창원", dong: "성산구", manager: "강현준", cycle: "월1회", address: "창원 성산구 마디미로 28", businessNumber: "402-11-50231", area: "17", contractStart: "2025-07-11", status: "정상", phone: "010-9921-4412", fee: "30000", history: []},
                            {id: "AC007", name: "김밥일번지 진해장천점", gu: "창원", dong: "진해구", manager: "강현준", cycle: "월1회", address: "창원 진해구 장천동 412", businessNumber: "882-12-00234", area: "38", contractStart: "2025-08-02", status: "정상", phone: "010-2345-6671", fee: "35000", history: []},
                            {id: "AC008", name: "명품달인김밥 용원점", gu: "창원", dong: "진해구", manager: "강현준", cycle: "월1회", address: "창원 진해구 용원동 123", businessNumber: "260-02-264", area: "13", contractStart: "2025-05-27", status: "정상", phone: "010-2492-4172", fee: "30000", history: []}
                        ]);
                        setLoading(false);
                    });
            }, []);

            function handleRegister(formData, kind) {
                const safeData = {
                    id: "AC" + Date.now(),
                    name: formData.name || "미지정 상호명",
                    businessNumber: formData.businessNumber || "",
                    contactName: formData.contactName || "",
                    phone: formData.phone || "",
                    gu: formData.gu || "부산",
                    dong: formData.dong || "",
                    address: formData.address || "",
                    area: formData.area || "30",
                    manager: formData.manager || STAFF[0],
                    cycle: formData.cycle || "월1회",
                    contractStart: formData.contractStart || TODAY,
                    status: "정상",
                    fee: formData.fee || "30000",
                    history: [{id: "H" + Date.now(), date: TODAY, type: "상담", content: "신규 등록 완료", author: formData.manager || STAFF[0]}]
                };

                if(kind === "active") { setActive(prev => [safeData, ...prev]); } 
                else { setProspects(prev => [safeData, ...prev]); }
                setIsModalOpen(false);
            }

            function handleAddHistory(e) {
                e.preventDefault();
                if(!selectedItem) return;

                const newLog = {
                    id: "H" + Date.now(),
                    date: historyForm.date,
                    type: historyForm.type,
                    content: historyForm.type === "방역" ? "정기 방역 실시 완료" : historyForm.note,
                    author: historyForm.author,
                    methods: historyForm.type === "방역" ? historyForm.methods.map(m => m + " 잔류 분무") : [],
                    chemicals: historyForm.type === "방역" ? historyForm.chemicals : []
                };

                const updatedItem = { ...selectedItem, history: [newLog, ...(selectedItem.history || [])] };
                setActive(prev => prev.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem);
                setShowHistoryForm(false);
                setHistoryForm({ date: TODAY, type: "방역", methods: ["살충"], chemicals: ["롱다운플러스", "맥스포스 셀렉트 이지갤"], note: "", author: "이원식" });
            }

            function handleDeleteHistory(logId) {
                if(!selectedItem || !confirm("해당 방역 기록을 정말로 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, history: (selectedItem.history || []).filter(h => h.id !== logId) };
                setActive(prev => prev.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem);
            }

            function handleCustomerSearch(e) {
                e.preventDefault();
                setSearchError(""); setSearchResult(null);
                const cleanInput = bizInput.replace(/-/g, "").trim();
                const found = active.find(r => String(r.businessNumber || "").replace(/-/g, "").trim() === cleanInput || String(r.name || "").includes(cleanInput));
                if(found) { setSearchResult(found); } 
                else { setSearchError("등록된 가맹점 정보를 찾을 수 없습니다."); }
            }

            function handleSealUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { setSealImage(event.target.result); };
                reader.readAsDataURL(file);
            }

            const currentList = React.useMemo(() => {
                const base = activeTab === "active" ? active : activeTab === "prospect" ? prospects : terminated;
                return (base || []).filter(r => {
                    if (!r) return false;
                    const matchSearch = (r.name || "").toLowerCase().includes(search.toLowerCase()) || 
                                        (r.address || "").toLowerCase().includes(search.toLowerCase()) ||
                                        (r.manager || "").toLowerCase().includes(search.toLowerCase());
                    const matchGu = !filterGu || r.gu === filterGu;
                    const matchCycle = !filterCycle || r.cycle === filterCycle;
                    return matchSearch && matchGu && matchCycle;
                });
            }, [activeTab, active, prospects, terminated, search, filterGu, filterCycle]);

            return (
                <div class="min-h-screen flex flex-col bg-[#F8FAF6]">
                    {/* 상단 탭 제어바 */}
                    <div class="bg-white p-3 border-b flex justify-between items-center px-6 shadow-sm">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-[#0B5E4D] rounded-lg flex items-center justify-center text-white font-bold">🛡️</div>
                            <div>
                                <h1 class="text-sm font-bold">MSTC방역 통합 관리시스템</h1>
                                <p class="text-[10px] text-gray-400">살균/살충 약품 전용 탭 분리 매칭 버전</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onClick={() => setSystemMode("admin")} class={`text-[11px] px-3 py-1.5 rounded-lg font-bold transition-all ${systemMode === "admin" ? "bg-[#0B5E4D] text-white" : "bg-gray-100 text-gray-400"}`}>사내 관리자모드</button>
                            <button onClick={() => setSystemMode("customer")} class={`text-[11px] px-3 py-1.5 rounded-lg font-bold transition-all ${systemMode === "customer" ? "bg-[#0B5E4D] text-white" : "bg-gray-100 text-gray-400"}`}>고객 자가조회</button>
                        </div>
                    </div>

                    {systemMode === "admin" ? (
                        /* ================= [사내 관리자 화면 모드] ================= */
                        <div class="flex-1 flex relative overflow-hidden">
                            <div class="flex-1 p-4 md:p-6 overflow-y-auto max-w-5xl mx-auto w-full space-y-5">
                                
                                {/* 상단 4대 지표 요약 카드 */}
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div class="bg-white p-4 rounded-2xl border border-gray-200/80 shadow-sm flex items-center gap-3">
                                        <div class="p-3 bg-emerald-50 rounded-xl text-emerald-700 text-lg">👥</div>
                                        <div><p class="text-[11px] text-gray-400 font-medium">전체 거래처 수</p><p class="text-xl font-bold text-gray-800">121 <span class="text-xs text-gray-400 font-normal">이원식 63 · 강현준 58</span></p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-2xl border border-gray-200/80 shadow-sm flex items-center gap-3">
                                        <div class="p-3 bg-red-50 rounded-xl text-red-700 text-lg">📅</div>
                                        <div><p class="text-[11px] text-gray-400 font-medium">이번 달 방역 예정</p><p class="text-xl font-bold text-gray-800">70 <span class="text-xs text-red-500 font-bold">지연 77건</span></p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-2xl border border-gray-200/80 shadow-sm flex items-center gap-3">
                                        <div class="p-3 bg-amber-50 rounded-xl text-amber-700 text-lg">📈</div>
                                        <div><p class="text-[11px] text-gray-400 font-medium">영업 진행 건수</p><p class="text-xl font-bold text-gray-800">43 <span class="text-xs text-gray-400 font-normal">전체 73건 중</span></p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-2xl border border-gray-200/80 shadow-sm flex items-center gap-3">
                                        <div class="p-3 bg-gray-50 rounded-xl text-gray-700 text-lg">📉</div>
                                        <div><p class="text-[11px] text-gray-400 font-medium">해지율</p><p class="text-xl font-bold text-gray-800">33.1% <span class="text-xs text-gray-400 font-normal">해지 60건</span></p></div>
                                    </div>
                                </div>

                                {/* 월별 순증 추이 차트 */}
                                <div class="bg-white border p-4 rounded-2xl shadow-sm">
                                    <div class="flex justify-between items-center mb-3">
                                        <h3 class="text-xs font-bold text-gray-700 flex items-center gap-1.5">📊 월별 순증 추이</h3>
                                        <select class="text-[11px] p-1.5 border rounded-lg bg-gray-50 text-gray-500 outline-none"><option>전체 담당자</option></select>
                                    </div>
                                    <div class="h-28 flex items-end justify-between pt-4 px-2 border-b border-gray-100">
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-16 bg-emerald-700 rounded-t"></div><span class="text-[10px] text-gray-400">1월</span></div>
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-12 bg-emerald-700 rounded-t"></div><span class="text-[10px] text-gray-400">2월</span></div>
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-6 bg-emerald-700 rounded-t"></div><span class="text-[10px] text-gray-400">3월</span></div>
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-10 bg-emerald-800 rounded-t"></div><span class="text-[10px] text-gray-400">4월</span></div>
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-14 bg-red-700 rounded-t"></div><span class="text-[10px] text-gray-400">5월</span></div>
                                        <div class="w-12 flex flex-col items-center gap-1"><div class="w-2.5 h-12 bg-emerald-700 rounded-t"></div><span class="text-[10px] text-gray-400">6월</span></div>
                                    </div>
                                </div>

                                {/* 메인 컨트롤 대시보드 리스트 테이블 */}
                                <div class="bg-white border rounded-3xl p-4 shadow-sm">
                                    <div class="flex gap-1.5 p-1 bg-gray-50 border rounded-xl mb-4">
                                        <button onClick={() => { setActiveTab("active"); setSelectedItem(null); }} class={`flex-1 py-2 text-xs font-semibold rounded-lg text-center transition-all ${activeTab === 'active' ? 'bg-white text-[#0B5E4D] shadow-sm' : 'text-gray-500'}`}>방역 거래처 ({active.length})</button>
                                        <button onClick={() => { setActiveTab("prospect"); setSelectedItem(null); }} class={`flex-1 py-2 text-xs font-semibold rounded-lg text-center transition-all ${activeTab === 'prospect' ? 'bg-white text-[#0B5E4D] shadow-sm' : 'text-gray-500'}`}>영업처 ({prospects.length})</button>
                                    </div>

                                    <div class="grid grid-cols-1 sm:grid-cols-5 gap-2 mb-4">
                                        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="업체 상호명, 주소, 담당자명 입력..." class="text-xs p-2 rounded-xl border bg-gray-50 outline-none sm:col-span-2 font-medium text-gray-700" />
                                        <select value={filterGu} onChange={e => setFilterGu(e.target.value)} class="text-xs p-2 rounded-xl border bg-white text-gray-600 outline-none">
                                            <option value="">전체 구</option>
                                            {GU_DONG["부산"].map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <select value={filterCycle} onChange={e => setFilterCycle(e.target.value)} class="text-xs p-2 rounded-xl border bg-white text-gray-600 outline-none">
                                            <option value="">전체 주기</option>
                                            {CYCLES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <button onClick={() => setIsModalOpen(true)} class="bg-[#0E7A63] text-white font-bold text-xs py-2 rounded-xl hover:opacity-95 transition-all">+ 신규 등록</button>
                                    </div>

                                    <div class="flex flex-col gap-2">
                                        {currentList.map(item => (
                                            <div key={item.id} onClick={() => { setSelectedItem(item); setShowHistoryForm(false); }} class={`flex justify-between items-center p-3.5 border rounded-xl cursor-pointer transition-all ${selectedItem?.id === item.id ? 'bg-emerald-50/50 border-[#0E7A63] shadow-sm' : 'bg-gray-50/50 hover:bg-white'}`}>
                                                <div class="min-w-0 flex-1">
                                                    <span class="text-sm font-bold text-gray-800">{item.name}</span>
                                                    <p class="text-xs text-gray-400 mt-1">📍 {item.gu} {item.dong || ""} · 담당: <b>{item.manager}</b> · {item.cycle || "월1회"} · {item.area || "30"}평</p>

                                        <p class="flex justify-between"><span><b>소재지</b></span> <span class="text-right text-gray-700 text-[13px]">{CERT_ISSUER.address}</span></p>
                                        <p class="flex justify-between relative">
                                            <span><b>성명(대표자)</b></span> <span class="font-bold text-right mr-20 text-[14px]">{CERT_ISSUER.reps}</span>
                                            <span class="absolute right-4 top-[-14px]">
                                                {sealImage ? <img src={sealImage} alt="직인" class="w-16 h-16 object-contain rounded-full" /> : <span class="text-red-600 font-bold border-2 border-red-600 rounded-full w-12 h-12 flex items-center justify-center text-[10px] transform rotate-[-6deg] bg-white/40">법인인장</span>}
                                            </span>
                                        </p>
                                    </div>
                                </div>
                                <div class="flex justify-end gap-2 mt-4 border-t pt-3">
                                    <button type="button" onClick={() => setIsCertOpen(false)} class="px-4 py-2 border rounded-xl text-xs bg-white text-gray-500">창 닫기</button>
                                    <button type="button" onClick={() => window.print()} class="px-6 py-2 bg-[#0B5E4D] text-white rounded-xl text-xs font-bold shadow-md hover:opacity-90 transition-all">🖨️ 정식 A4 서식 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
