<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrimCut — 투명 배경 자동 크롭</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181b24; --surface-2: #1e2130; --surface-3: #252a3a;
      --border: rgba(255,255,255,0.07); --border-md: rgba(255,255,255,0.13);
      --text-primary: #eeeef0; --text-secondary: #8b8fa8; --text-tertiary: #555870;
      --indigo: #6C63FF; --indigo-dim: rgba(108,99,255,0.15); --indigo-border: rgba(108,99,255,0.4);
      --teal: #2DD4BF; --teal-dim: rgba(45,212,191,0.12);
      --green: #34d399; --green-dim: rgba(52,211,153,0.13);
      --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.13);
      --red: #f87171; --red-dim: rgba(248,113,113,0.13);
      --bar-h: 72px;
    }
    body {
      background: var(--bg); color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      font-size: 14px; line-height: 1.55; min-height: 100vh;
      padding-bottom: calc(var(--bar-h) + 24px);
    }

    /* ── 상단 헤더 ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 30px; height: 30px; background: var(--indigo); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff;
    }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); }
    .brand-name span { color: var(--indigo); }
    .topbar-right { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; }

    /* ── 저장 폴더 배너 ── */
    .folder-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .folder-banner-left { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .folder-banner-left i { font-size: 15px; }
    .folder-path {
      color: var(--teal); font-weight: 600; max-width: 340px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      border-radius: 7px; border: 1px solid var(--border-md);
      background: var(--surface-3); color: var(--text-primary);
      cursor: pointer; transition: background 0.1s; white-space: nowrap;
    }
    .folder-btn:hover { background: rgba(255,255,255,0.06); }
    .folder-api-warn {
      font-size: 11px; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 6px; padding: 8px 16px;
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .folder-api-warn i { color: var(--amber); }

    /* ── 메인 ── */
    .main { max-width: 940px; margin: 0 auto; padding: 24px 20px 0; }

    /* ── 드롭존 ── */
    .dropzone {
      border: 1.5px dashed var(--indigo-border); border-radius: 16px;
      background: var(--indigo-dim); padding: 36px 24px; text-align: center;
      cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 20px;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--indigo); background: rgba(108,99,255,.22); }
    .dropzone input { display: none; }
    .dz-icon-wrap {
      width: 52px; height: 52px; background: var(--surface-3); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--indigo); margin-bottom: 14px;
    }
    .dz-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .dz-sub { font-size: 12px; color: var(--text-secondary); }
    .dz-tags { margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .dz-tag {
      font-size: 11px; color: var(--text-tertiary); background: var(--surface-3);
      border: 1px solid var(--border-md); padding: 3px 10px; border-radius: 99px;
    }

    /* ── 패널 ── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
    }
    .panel-head-left { display: flex; align-items: center; gap: 8px; }
    .panel-head-left .label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .count-pill { background: var(--indigo); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 99px; }
    .panel-head-right { display: flex; gap: 6px; align-items: center; }
    .ghost-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      background: var(--surface-2); border: 1px solid var(--border-md);
      border-radius: 8px; padding: 5px 11px; cursor: pointer; transition: background .1s, color .1s;
    }
    .ghost-btn:hover { background: var(--surface-3); color: var(--text-primary); }
    .ghost-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 선택 컨트롤 바 */
    .select-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: rgba(108,99,255,0.08);
      border-bottom: 1px solid var(--indigo-border);
      font-size: 12px; color: var(--text-secondary);
    }
    .select-bar-left { display: flex; align-items: center; gap: 10px; }
    .select-bar-right { display: flex; gap: 6px; }
    .sel-count { font-weight: 700; color: var(--indigo); }

    /* ── 진행 바 ── */
    .prog-wrap { height: 3px; background: var(--surface-3); overflow: hidden; }
    .prog-bar { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--teal)); transition: width .3s ease; }

    /* ── 그리드 ── */
    .img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px; background: var(--border);
    }

    /* ── 셀 ── */
    .img-cell { background: var(--surface); display: flex; flex-direction: column; position: relative; cursor: pointer; }
    .img-cell.selected { outline: 2px solid var(--indigo); outline-offset: -2px; }
    .img-cell.selected .cell-thumb::after {
      content: ''; position: absolute; inset: 0; background: rgba(108,99,255,0.15); z-index: 1;
    }

    /* 체크박스 오버레이 */
    .cell-check {
      position: absolute; top: 8px; left: 8px; z-index: 3;
      width: 20px; height: 20px; border-radius: 6px;
      background: var(--surface); border: 1.5px solid var(--border-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent; transition: background .1s, border-color .1s;
    }
    .img-cell.selected .cell-check {
      background: var(--indigo); border-color: var(--indigo); color: #fff;
    }

    .cell-thumb {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      padding: 14px;
      background: var(--surface-2);
      background-image:
        linear-gradient(45deg, var(--surface-3) 25%, transparent 25%),
        linear-gradient(-45deg, var(--surface-3) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--surface-3) 75%),
        linear-gradient(-45deg, transparent 75%, var(--surface-3) 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      position: relative; overflow: hidden;
    }
    .cell-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 1; }
    .cell-thumb-empty { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-tertiary); font-size: 11px; }
    .cell-thumb-empty i { font-size: 24px; }

    /* 상태 배지 (우상단) */
    .cell-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; z-index: 2;
    }
    .badge-wait { background: rgba(30,33,48,.85); color: var(--text-secondary); border: 1px solid var(--border-md); }
    .badge-proc { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,.3); }
    .badge-done { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
    .badge-err  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,113,113,.3); }

    /* 저장됨 표시 (좌하단) */
    .cell-saved-tag {
      position: absolute; bottom: 8px; left: 8px; z-index: 3;
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px;
      background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(45,212,191,.3);
    }

    .cell-info { padding: 9px 12px 10px; flex: 1; }
    .cell-name { font-size: 11px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .cell-meta { font-size: 10px; color: var(--text-secondary); line-height: 1.75; }
    .cell-meta .c-green { color: var(--teal); font-weight: 600; }
    .cell-meta .c-red   { color: var(--red); }
    .cell-meta .c-dpi   { color: var(--indigo); font-weight: 600; }

    /* 개별 다운로드 버튼 (셀 하단) */
    .cell-dl-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 7px; font-size: 11px; font-weight: 600;
      color: var(--text-tertiary); background: var(--surface-2);
      border: none; border-top: 1px solid var(--border);
      cursor: pointer; width: 100%; transition: background .1s, color .1s;
    }
    .cell-dl-btn:hover { background: var(--surface-3); color: var(--teal); }
    .cell-dl-btn i { font-size: 13px; }

    /* ── 스피너 ── */
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(251,191,36,.25); border-top-color: var(--amber);
      border-radius: 50%; animation: rot .6s linear infinite; vertical-align: middle;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── ZIP 진행 오버레이 ── */
    .zip-overlay {
      position: fixed; inset: 0; background: rgba(15,17,23,.82);
      display: flex; align-items: center; justify-content: center; z-index: 999;
      backdrop-filter: blur(4px);
    }
    .zip-box {
      background: var(--surface); border: 1px solid var(--border-md);
      border-radius: 16px; padding: 28px 36px; text-align: center; min-width: 260px;
    }
    .zip-box .zi { font-size: 32px; color: var(--teal); margin-bottom: 10px; }
    .zip-box .zt { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .zip-box .zs { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; }
    .zpw { height: 4px; background: var(--surface-3); border-radius: 99px; overflow: hidden; }
    .zpb { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--teal)); border-radius: 99px; transition: width .2s; }

    /* ── 하단 액션바 ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--bar-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 0 24px; z-index: 200;
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600; padding: 10px 20px;
      border-radius: 10px; border: 1px solid var(--border-md);
      background: var(--surface-2); color: var(--text-secondary);
      cursor: pointer; transition: background .12s, color .12s, transform .1s; white-space: nowrap;
    }
    .action-btn i { font-size: 16px; }
    .action-btn:hover { background: var(--surface-3); color: var(--text-primary); }
    .action-btn:active { transform: scale(0.97); }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .action-btn-run {
      background: var(--indigo); color: #fff; border-color: var(--indigo);
      font-size: 14px; padding: 10px 26px;
      transition: background .12s, box-shadow .2s, transform .1s;
    }
    .action-btn-run:hover { background: #5a52e0; color: #fff; box-shadow: 0 0 20px rgba(108,99,255,.35); }
    .action-btn-dl { color: var(--teal); border-color: rgba(45,212,191,.3); }
    .action-btn-dl:hover { background: var(--teal-dim); color: var(--teal); }
    .status-summary { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; margin-right: 4px; }

    canvas { display: none; }

    @media (max-width: 560px) {
      .img-grid { grid-template-columns: repeat(2, 1fr); }
      .action-btn span { display: none; }
      .action-btn-run span { display: inline; }
      .status-summary { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark"><i class="ti ti-scissors"></i></div>
    <div class="brand-name">Trim<span>Cut</span></div>
  </div>
  <div class="topbar-right"><i class="ti ti-lock"></i> 로컬에서만 처리 · 서버 전송 없음</div>
</div>

<!-- 저장 폴더 선택 배너 -->
<div id="folderBanner" style="display:none;"></div>

<div class="main">
  <div class="dropzone" id="dropZone">
    <input type="file" id="fileInput" accept="image/png" multiple>
    <div class="dz-icon-wrap"><i class="ti ti-upload"></i></div>
    <div class="dz-title">PNG 이미지를 끌어다 놓거나 클릭해서 선택</div>
    <div class="dz-sub">투명 픽셀(Alpha 0)을 자동 감지해 상하좌우 여백을 정확하게 잘라냅니다</div>
    <div class="dz-tags">
      <span class="dz-tag">PNG 전용</span>
      <span class="dz-tag">여러 장 동시 처리</span>
      <span class="dz-tag">원본 해상도 유지</span>
      <span class="dz-tag">투명도 보존</span>
      <span class="dz-tag">ZIP 일괄 저장</span>
    </div>
  </div>

  <div class="panel" id="panel" style="display:none;">
    <div class="panel-head">
      <div class="panel-head-left">
        <span class="label">이미지 목록</span>
        <span class="count-pill" id="countPill">0장</span>
      </div>
      <div class="panel-head-right">
        <button class="ghost-btn" onclick="toggleSelectMode()" id="selectModeBtn"><i class="ti ti-checkbox"></i> 선택</button>
        <button class="ghost-btn" onclick="triggerAdd()"><i class="ti ti-plus"></i> 추가</button>
        <button class="ghost-btn" onclick="clearAll()"><i class="ti ti-trash"></i> 전체 삭제</button>
      </div>
    </div>

    <!-- 선택 모드 컨트롤바 -->
    <div class="select-bar" id="selectBar" style="display:none;">
      <div class="select-bar-left">
        <span class="sel-count" id="selCount">0개</span> 선택됨
        <button class="ghost-btn" onclick="selectAll()"><i class="ti ti-select-all"></i> 전체</button>
        <button class="ghost-btn" onclick="selectNone()"><i class="ti ti-square"></i> 해제</button>
      </div>
      <div class="select-bar-right">
        <button class="ghost-btn" id="selDlBtn" onclick="downloadSelected()" disabled>
          <i class="ti ti-file-zip"></i> 선택 ZIP 저장
        </button>
        <button class="ghost-btn" onclick="toggleSelectMode()"><i class="ti ti-x"></i> 닫기</button>
      </div>
    </div>

    <div class="prog-wrap" id="progWrap" style="display:none;">
      <div class="prog-bar" id="progBar" style="width:0%"></div>
    </div>
    <div class="img-grid" id="imgGrid"></div>
  </div>
</div>

<div class="bottom-bar">
  <span class="status-summary" id="statusSummary"></span>
  <button class="action-btn action-btn-run" id="runBtn" onclick="startProcessing()" disabled>
    <i class="ti ti-player-play-filled"></i><span>처리 시작</span>
  </button>
  <button class="action-btn action-btn-dl" id="dlAllBtn" onclick="downloadZip(items.filter(i=>i.status==='done'),'trimcut_output')" disabled>
    <i class="ti ti-file-zip"></i><span>전체 ZIP</span>
  </button>
  <button class="action-btn" onclick="pickFolder()" id="folderPickBtn">
    <i class="ti ti-folder-open"></i><span>저장 폴더</span>
  </button>
  <button class="action-btn" onclick="clearAll()">
    <i class="ti ti-refresh"></i><span>초기화</span>
  </button>
</div>

<canvas id="workCanvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const panel      = document.getElementById('panel');
  const imgGrid    = document.getElementById('imgGrid');
  const countPill  = document.getElementById('countPill');
  const progWrap   = document.getElementById('progWrap');
  const progBar    = document.getElementById('progBar');
  const runBtn     = document.getElementById('runBtn');
  const dlAllBtn   = document.getElementById('dlAllBtn');
  const statusSummary = document.getElementById('statusSummary');
  const selectBar  = document.getElementById('selectBar');
  const selCount   = document.getElementById('selCount');
  const selDlBtn   = document.getElementById('selDlBtn');
  const folderBanner = document.getElementById('folderBanner');
  const canvas     = document.getElementById('workCanvas');
  const ctx        = canvas.getContext('2d');

  let items = [];
  let busy  = false;
  let selectMode = false;
  let selectedIds = new Set();
  let dirHandle  = null; // File System Access API

  const hasFSA = 'showDirectoryPicker' in window;

  /* ── 저장 폴더 배너 초기화 ── */
  function renderFolderBanner() {
    if (dirHandle) {
      folderBanner.style.display = 'flex';
      folderBanner.className = 'folder-banner';
      folderBanner.innerHTML = `
        <div class="folder-banner-left">
          <i class="ti ti-folder-filled"></i>
          저장 폴더:
          <span class="folder-path">${dirHandle.name}</span>
          <span style="color:var(--green);font-size:11px;font-weight:600;">· 처리 즉시 자동 저장</span>
        </div>
        <button class="folder-btn" onclick="pickFolder()"><i class="ti ti-refresh"></i> 폴더 변경</button>`;
    } else if (!hasFSA) {
      folderBanner.style.display = 'flex';
      folderBanner.className = 'folder-api-warn';
      folderBanner.innerHTML = `<i class="ti ti-alert-triangle"></i>이 브라우저는 폴더 자동 저장을 지원하지 않습니다. Chrome / Edge 사용을 권장합니다. ZIP 다운로드는 정상 작동합니다.`;
    } else {
      folderBanner.style.display = 'none';
    }
  }

  /* ── 폴더 선택 ── */
  async function pickFolder() {
    if (!hasFSA) { alert('이 브라우저는 폴더 선택 기능을 지원하지 않습니다.\nChrome 또는 Edge를 사용해 주세요.'); return; }
    try {
      dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      renderFolderBanner();
    } catch (e) { /* 취소 */ }
  }

  /* ── 파일을 폴더에 직접 저장 ── */
  async function saveToFolder(item) {
    if (!dirHandle || !item.blob) return false;
    try {
      const fname = item.name.replace(/\.png$/i, '') + '_trimmed.png';
      const fh = await dirHandle.getFileHandle(fname, { create: true });
      const w  = await fh.createWritable();
      await w.write(item.blob);
      await w.close();
      item.savedToFolder = true;
      return true;
    } catch (e) { console.warn('폴더 저장 실패:', e); return false; }
  }

  /* ── 이벤트 ── */
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('over'); });
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); addFiles(e.dataTransfer.files); });
  function triggerAdd() { fileInput.click(); }

  /* ── 선택 모드 ── */
  function toggleSelectMode() {
    selectMode = !selectMode;
    selectedIds.clear();
    selectBar.style.display = selectMode ? 'flex' : 'none';
    document.getElementById('selectModeBtn').style.background = selectMode ? 'var(--indigo-dim)' : '';
    document.getElementById('selectModeBtn').style.color      = selectMode ? 'var(--indigo)' : '';
    refreshAllCells();
    refreshSelCount();
  }
  function selectAll() {
    items.filter(i => i.status === 'done').forEach(i => selectedIds.add(i.id));
    refreshAllCells(); refreshSelCount();
  }
  function selectNone() {
    selectedIds.clear(); refreshAllCells(); refreshSelCount();
  }
  function refreshSelCount() {
    selCount.textContent = selectedIds.size + '개';
    selDlBtn.disabled = selectedIds.size === 0;
  }
  function refreshAllCells() { items.forEach(i => patchCell(i)); }

  function toggleSelect(id) {
    if (!selectMode) return;
    const item = items.find(i => i.id === id);
    if (!item || item.status !== 'done') return;
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    patchCell(item);
    refreshSelCount();
  }

  /* ── 파일 추가 ── */
  function addFiles(files) {
    const pngs = [...files].filter(f => f.type === 'image/png');
    if (!pngs.length) { alert('PNG 파일만 선택할 수 있습니다.'); return; }
    panel.style.display = 'block';
    pngs.forEach(file => {
      const id = Date.now() + '_' + Math.random().toString(36).slice(2);
      const item = { id, name: file.name, file, status: 'wait',
                     origSize: null, cropSize: null, dpi: null,
                     blob: null, previewUrl: null, errorMsg: null, savedToFolder: false };
      items.push(item);
      appendCell(item);
      loadPreview(item);
    });
    refreshUI();
  }

  /* ── PNG DPI (pHYs 청크) ── */
  function readPngDpi(file) {
    return new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => {
        try {
          const u8 = new Uint8Array(e.target.result);
          let pos = 8;
          while (pos < u8.length - 12) {
            const len  = (u8[pos]<<24|u8[pos+1]<<16|u8[pos+2]<<8|u8[pos+3]) >>> 0;
            const type = String.fromCharCode(u8[pos+4],u8[pos+5],u8[pos+6],u8[pos+7]);
            if (type === 'pHYs') {
              const ppuX = (u8[pos+8]<<24|u8[pos+9]<<16|u8[pos+10]<<8|u8[pos+11]) >>> 0;
              const unit = u8[pos+16];
              resolve(unit === 1 && ppuX > 0 ? Math.round(ppuX * 0.0254) : null);
              return;
            }
            if (type === 'IDAT' || type === 'IEND') break;
            pos += 12 + len;
          }
          resolve(null);
        } catch { resolve(null); }
      };
      r.readAsArrayBuffer(file.slice(0, 256));
    });
  }

  function loadPreview(item) {
    readPngDpi(item.file).then(dpi => { item.dpi = dpi; patchCell(item); });
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => { item.origSize = { w: img.width, h: img.height }; item.previewUrl = e.target.result; patchCell(item); };
      img.src = e.target.result;
    };
    r.readAsDataURL(item.file);
  }

  /* ── 처리 시작 ── */
  async function startProcessing() {
    if (busy) return;
    const queue = items.filter(i => i.status === 'wait');
    if (!queue.length) return;
    busy = true; runBtn.disabled = true;
    progWrap.style.display = 'block'; progBar.style.width = '0%';

    for (let i = 0; i < queue.length; i++) {
      const item = queue[i];
      item.status = 'proc'; patchCell(item);
      await cropItem(item);
      // 폴더 선택됐으면 즉시 저장
      if (dirHandle && item.status === 'done') {
        await saveToFolder(item);
      }
      patchCell(item);
      progBar.style.width = Math.round(((i+1)/queue.length)*100) + '%';
      refreshUI();
    }

    busy = false;
    setTimeout(() => { progWrap.style.display = 'none'; }, 800);
    refreshUI();
  }

  function cropItem(item) {
    return new Promise(resolve => {
      function go(src) {
        const img = new Image();
        img.onload = () => {
          item.origSize = { w: img.width, h: img.height };
          const b = trim(img);
          if (!b) { item.status = 'err'; item.errorMsg = '불투명 픽셀 없음'; resolve(); return; }
          canvas.width = b.w; canvas.height = b.h;
          ctx.clearRect(0, 0, b.w, b.h);
          ctx.drawImage(img, -b.x, -b.y);
          canvas.toBlob(blob => {
            item.blob = blob; item.cropSize = { w: b.w, h: b.h }; item.status = 'done';
            if (item.previewUrl && item.previewUrl.startsWith('blob:')) URL.revokeObjectURL(item.previewUrl);
            item.previewUrl = URL.createObjectURL(blob);
            resolve();
          }, 'image/png');
        };
        img.onerror = () => { item.status = 'err'; item.errorMsg = '로드 실패'; resolve(); };
        img.src = src;
      }
      if (item.previewUrl) go(item.previewUrl);
      else { const r = new FileReader(); r.onload = e => go(e.target.result); r.readAsDataURL(item.file); }
    });
  }

  function trim(img) {
    canvas.width = img.width; canvas.height = img.height;
    ctx.clearRect(0, 0, img.width, img.height); ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, img.width, img.height).data;
    const W = img.width, H = img.height;
    let x0 = W, y0 = H, x1 = -1, y1 = -1;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      if (d[(y*W+x)*4+3] > 0) {
        if (x<x0) x0=x; if (x>x1) x1=x; if (y<y0) y0=y; if (y>y1) y1=y;
      }
    }
    return x1 < 0 ? null : { x:x0, y:y0, w:x1-x0+1, h:y1-y0+1 };
  }

  /* ── 개별 다운로드 ── */
  function downloadOne(id, e) {
    e && e.stopPropagation();
    const item = items.find(i => i.id === id);
    if (!item || !item.blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(item.blob);
    a.download = item.name.replace(/\.png$/i,'') + '_trimmed.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  /* ── ZIP 다운로드 ── */
  async function downloadZip(targets, zipName) {
    if (!targets || !targets.length) return;
    const overlay = document.createElement('div');
    overlay.className = 'zip-overlay';
    overlay.innerHTML = `<div class="zip-box">
      <div class="zi"><i class="ti ti-file-zip"></i></div>
      <div class="zt">ZIP 파일 생성 중…</div>
      <div class="zs" id="zipSub">0 / ${targets.length} 파일 압축 중</div>
      <div class="zpw"><div class="zpb" id="zipPb" style="width:0%"></div></div>
    </div>`;
    document.body.appendChild(overlay);

    const zip = new JSZip();
    for (let i = 0; i < targets.length; i++) {
      const item = targets[i];
      zip.file(item.name.replace(/\.png$/i,'') + '_trimmed.png', await item.blob.arrayBuffer());
      document.getElementById('zipPb').style.width = Math.round(((i+1)/targets.length)*100) + '%';
      document.getElementById('zipSub').textContent = `${i+1} / ${targets.length} 파일 압축 중`;
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' }, m => {
      const pb = document.getElementById('zipPb');
      if (pb) pb.style.width = Math.round(m.percent) + '%';
    });
    document.body.removeChild(overlay);

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = (zipName || 'trimcut_output') + '.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  async function downloadSelected() {
    const targets = items.filter(i => selectedIds.has(i.id) && i.status === 'done');
    await downloadZip(targets, 'trimcut_selected');
  }

  /* ── 렌더 ── */
  function appendCell(item) {
    const div = document.createElement('div');
    div.className = 'img-cell';
    div.id = 'cell-' + item.id;
    div.onclick = () => toggleSelect(item.id);
    div.innerHTML = cellHTML(item);
    imgGrid.appendChild(div);
  }
  function patchCell(item) {
    const el = document.getElementById('cell-' + item.id);
    if (!el) return;
    el.innerHTML = cellHTML(item);
    el.classList.toggle('selected', selectMode && selectedIds.has(item.id));
  }

  function cellHTML(item) {
    const name = item.name.length > 18 ? item.name.slice(0,16)+'…' : item.name;
    const badgeMap = {
      wait: `<span class="cell-badge badge-wait">대기</span>`,
      proc: `<span class="cell-badge badge-proc"><span class="spin"></span></span>`,
      done: `<span class="cell-badge badge-done">✓ 완료</span>`,
      err:  `<span class="cell-badge badge-err">오류</span>`,
    };
    const checkBox = selectMode
      ? `<div class="cell-check">${selectedIds.has(item.id) ? '<i class="ti ti-check"></i>' : ''}</div>`
      : '';
    const savedTag = item.savedToFolder
      ? `<div class="cell-saved-tag"><i class="ti ti-folder-check"></i> 저장됨</div>`
      : '';
    const thumb = item.previewUrl
      ? `<img src="${item.previewUrl}" alt="${name}">`
      : `<div class="cell-thumb-empty"><i class="ti ti-photo"></i><span>로딩…</span></div>`;

    let meta = '';
    if (item.origSize) {
      const mb = (item.file.size/1048576).toFixed(1);
      const dpiStr = item.dpi ? ` · <span class="c-dpi">${item.dpi}DPI</span>` : '';
      meta = `${mb}MB · ${item.origSize.w}×${item.origSize.h}${dpiStr}`;
    }
    if (item.status === 'done' && item.cropSize && item.origSize) {
      const saved = Math.round((1-(item.cropSize.w*item.cropSize.h)/(item.origSize.w*item.origSize.h))*100);
      meta += `<br><span class="c-green">크롭: ${item.cropSize.w}×${item.cropSize.h} · ${saved}% 축소</span>`;
    }
    if (item.status === 'err') meta += `<br><span class="c-red">${item.errorMsg}</span>`;

    const dlBtn = item.status === 'done' && !selectMode
      ? `<button class="cell-dl-btn" onclick="downloadOne('${item.id}', event)">
           <i class="ti ti-download"></i> 개별 저장
         </button>`
      : '';

    return `
      <div class="cell-thumb">${checkBox}${badgeMap[item.status]||''}${thumb}${savedTag}</div>
      <div class="cell-info">
        <div class="cell-name" title="${item.name}">${name}</div>
        <div class="cell-meta">${meta || '분석 중…'}</div>
      </div>
      ${dlBtn}`;
  }

  function refreshUI() {
    countPill.textContent = items.length + '장';
    const wait = items.filter(i => i.status==='wait').length;
    const done = items.filter(i => i.status==='done').length;
    const proc = items.filter(i => i.status==='proc').length;
    runBtn.disabled  = busy || wait === 0;
    dlAllBtn.disabled = done === 0;
    const parts = [];
    if (wait) parts.push(`대기 ${wait}`);
    if (proc) parts.push(`처리 중 ${proc}`);
    if (done) parts.push(`완료 ${done}`);
    statusSummary.textContent = parts.join(' · ');
  }

  function clearAll() {
    items.forEach(i => { if (i.previewUrl && i.previewUrl.startsWith('blob:')) URL.revokeObjectURL(i.previewUrl); });
    items = []; busy = false; selectMode = false; selectedIds.clear();
    imgGrid.innerHTML = '';
    panel.style.display = 'none';
    selectBar.style.display = 'none';
    progWrap.style.display = 'none';
    progBar.style.width = '0%';
    runBtn.disabled = true; dlAllBtn.disabled = true;
    statusSummary.textContent = '';
  }

  // 초기 배너
  renderFolderBanner();
</script>
</body>
</html>
