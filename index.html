<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 실시간 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAF6; color: #16241E; margin: 0; padding: 0; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4 portrait; margin: 0mm; }
            body { background-color: white; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJUCIKiumzq3QbFjZzSQq6mKWdw03AXCja8oH2mClGwUN6cv8CKJehdJLlkNHACqEY/exec"; 

        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = new Date().toISOString().split('T')[0];
        const CURRENT_MONTH = TODAY.slice(0, 7);
        const CURRENT_MONTH_NUM = parseInt(CURRENT_MONTH.split('-')[1], 10);
        const STAFF = ["이원식", "강현준"];
        const CYCLES = ["월1회", "3개월1회", "단기"];
        const CHEMICALS_BY_TYPE = { "살균": ["마이크로켐 골드", "키니아 비실드"], "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤", "다발이끔 살서제"] };
        const REGIONS = { 
            "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구"],
            "창원": ["의창구", "성산구", "마산합포구", "마산회원구", "진해구"],
            "경남": ["양산시", "김해시"] 
        };

        const COMPANY_SEAL_URL = "https://mstcare0-creator.github.io/mstc-crm/seal.png"; 

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(fetchedData => {
                        if (Array.isArray(fetchedData) && fetchedData.length > 0) {
                            setData(fetchedData);
                            localStorage.setItem("mstc_crm_data_v43", JSON.stringify(fetchedData));
                        } else {
                            const local = localStorage.getItem("mstc_crm_data_v43");
                            if(local) setData(JSON.parse(local));
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        const local = localStorage.getItem("mstc_crm_data_v43");
                        if(local) setData(JSON.parse(local));
                        setLoading(false);
                    });
            }, []);

            const updateDataAndSync = (newData) => {
                setData(newData);
                localStorage.setItem("mstc_crm_data_v43", JSON.stringify(newData)); 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: newData })
                }).catch(err => console.log("전송 지연"));
            };

            const [currentTab, setCurrentTab] = useState("active");
            const [search, setSearch] = useState("");
            const [filterCity, setFilterCity] = useState("");
            const [filterDistrict, setFilterDistrict] = useState("");
            const [filterPayStatus, setFilterPayStatus] = useState(""); 
            const [filterCollection, setFilterCollection] = useState("");
            const [filterCompletion, setFilterCompletion] = useState(""); 
            const [chartManager, setChartManager] = useState("전체 담당자");
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [detailTab, setDetailTab] = useState("info");
            const [historyYearFilter, setHistoryYearFilter] = useState("all");
            const [paymentYearFilter, setPaymentYearFilter] = useState("all");

            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [regCity, setRegCity] = useState("부산");

            const [regError, setRegError] = useState("");
            const [editError, setEditError] = useState("");

            const [showHistoryForm, setShowHistoryForm] = useState(false);
            const [historyForm, setHistoryForm] = useState({ date: TODAY, time: "", type: "방역", methods: ["살충"], chemicals: ["롱다운플러스"], note: "", author: "이원식" });
            const [editingHistoryId, setEditingHistoryId] = useState(null);

            const [showPayForm, setShowPayForm] = useState(false);
            const [payForm, setPayForm] = useState({ month: CURRENT_MONTH, amount: "30000", status: "수금완료", method: "계좌이체", note: "" });
            const [editingPayId, setEditingPayId] = useState(null);

            const [customMethodInput, setCustomMethodInput] = useState("");
            const [customMethodsList, setCustomMethodsList] = useState(() => {
                const saved = localStorage.getItem("mstc_custom_methods_v1");
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => { localStorage.setItem("mstc_custom_methods_v1", JSON.stringify(customMethodsList)); }, [customMethodsList]);

            const [customChemInput, setCustomChemInput] = useState({ "살균": "", "살충": "", "기타": "" });
            const [customChemsList, setCustomChemsList] = useState(() => {
                const savedChems = localStorage.getItem("mstc_custom_chems_v2");
                if (savedChems) {
                    const parsed = JSON.parse(savedChems);
                    if (!parsed["기타"]) parsed["기타"] = [];
                    return parsed;
                }
                return { "살균": [], "살충": [], "기타": [] };
            });
            useEffect(() => { localStorage.setItem("mstc_custom_chems_v2", JSON.stringify(customChemsList)); }, [customChemsList]);

            const [isCertOpen, setIsCertOpen] = useState(false);
            const [certEntry, setCertEntry] = useState(null);
            const [certNumber, setCertNumber] = useState("");
            const [sealImgFailed, setSealImgFailed] = useState(false); 

            const handleSelectItem = (item) => {
                setSelectedItem(item);
                setIsEditing(false);
                setShowHistoryForm(false);
                setShowPayForm(false);
                setEditingPayId(null);
                setDetailTab("info"); 
                setHistoryYearFilter("all");
                setPaymentYearFilter("all");
            };

            const handleAddCustomMethod = () => {
                const val = customMethodInput.trim();
                if (val && !["살균", "살충"].includes(val) && !customMethodsList.includes(val)) setCustomMethodsList([...customMethodsList, val]);
                setCustomMethodInput("");
            };
            const handleDeleteCustomMethod = (methodToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomMethodsList(prev => prev.filter(m => m !== methodToRemove));
                setHistoryForm(prev => ({...prev, methods: prev.methods.filter(m => m !== methodToRemove)}));
            };

            const handleAddCustomChem = (type) => {
                const val = customChemInput[type].trim();
                if (val) {
                    if (!customChemsList[type].includes(val) && !(CHEMICALS_BY_TYPE[type] || []).includes(val)) setCustomChemsList(prev => ({...prev, [type]: [...prev[type], val]}));
                    if (!historyForm.chemicals.includes(val)) setHistoryForm(prev => ({...prev, chemicals: [...prev.chemicals, val]}));
                    setCustomChemInput(prev => ({...prev, [type]: ""}));
                }
            };
            const handleDeleteCustomChem = (type, chemToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomChemsList(prev => ({ ...prev, [type]: prev[type].filter(c => c !== chemToRemove) }));
                setHistoryForm(prev => ({ ...prev, chemicals: prev.chemicals.filter(c => c !== chemToRemove) }));
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                
                const name = fd.get("name");
                const phone = fd.get("phone");
                const address = fd.get("address");

                if (!name || name.trim() === "") { setRegError("🚨 [상호명]을 입력해주세요!"); return; }
                if (!phone || phone.trim() === "") { setRegError("🚨 [연락처]를 입력해주세요!"); return; }
                if (!address || address.trim() === "") { setRegError("🚨 [상세주소]를 입력해주세요!"); return; }

                setRegError(""); 

                let regTab = fd.get("tab");
                const payStat = fd.get("payStatus");
                if (payStat === "일시중지") regTab = "paused";
                else if (payStat === "해지") regTab = "terminated";

                const safeData = {
                    id: "AC" + Date.now(), tab: regTab,
                    name: name, manager: fd.get("manager"), phone: phone,
                    bizNumber: fd.get("bizNumber") || "", 
                    clientRepName: fd.get("clientRepName") || "", 
                    
                    gu: fd.get("gu"), dong: fd.get("dong"), address: address, area: fd.get("area"),
                    contractStart: fd.get("contractStart") || TODAY, serviceType: fd.get("serviceType") || "정기", payStatus: payStat,
                    cycle: fd.get("cycle"), fee: fd.get("fee") || "30000", 
                    payMethod: fd.get("payMethod") || "계좌이체",
                    providedService: fd.get("providedService") || "",
                    
                    parking: fd.get("parking") || "O",
                    photoReq: fd.get("photoReq") || "X",
                    bugZapper: fd.get("bugZapper") || "없음",
                    trapReq: fd.get("trapReq") || "X",
                    keyInfo: fd.get("keyInfo") || "",

                    etcInfo: fd.get("etcInfo") || "",
                    collectionStatus: fd.get("collectionStatus") || "수금완료", uncollectedAmount: fd.get("uncollectedAmount") || "0",
                    history: [{id: Date.now(), date: TODAY, time: "", type: "상담", content: "신규 등록 완료", author: fd.get("manager")}], paymentHistory: []
                };
                updateDataAndSync([safeData, ...data]); 
                setIsModalOpen(false); setCurrentTab(regTab);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editForm.name || editForm.name.trim() === "") { setEditError("🚨 상호명을 비울 수 없습니다!"); return; }
                
                setEditError("");
                let newTab = editForm.tab;
                if (editForm.payStatus === "일시중지") newTab = "paused";
                else if (editForm.payStatus === "해지") newTab = "terminated";
                else if (editForm.payStatus === "유료" || editForm.payStatus === "무료") { if (newTab !== "prospect") newTab = "active"; }
                const updated = { ...editForm, tab: newTab };
                updateDataAndSync(data.map(d => d.id === updated.id ? updated : d)); 
                setSelectedItem(updated); setIsEditing(false); setCurrentTab(newTab);
            };

            const handleDeleteClient = () => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                updateDataAndSync(data.filter(d => d.id !== selectedItem.id)); setSelectedItem(null);
            };

            const convertToActive = () => {
                if(!confirm("전환하시겠습니까?")) return;
                const updated = { ...selectedItem, tab: 'active', payStatus: '유료', contractStart: TODAY };
                updateDataAndSync(data.map(item => item.id === updated.id ? updated : item)); setSelectedItem(updated); setCurrentTab('active');
            };

            const handleAddHistory = (e) => {
                e.preventDefault();
                const contentStr = historyForm.type === "방역" ? "정기 방역 완료" : historyForm.note;
                let updatedHistoryList;
                if (editingHistoryId) {
                    updatedHistoryList = selectedItem.history.map(h => 
                        h.id === editingHistoryId ? { ...h, date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] } : h
                    );
                } else {
                    const newLog = { id: Date.now(), date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] };
                    updatedHistoryList = [newLog, ...(selectedItem.history || [])];
                }
                const updatedItem = { ...selectedItem, history: updatedHistoryList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowHistoryForm(false); setEditingHistoryId(null);
            };

            const handleEditHistoryInit = (h) => {
                setHistoryForm({ date: h.date, time: h.time || h.startTime || "", type: h.type, author: h.author || selectedItem.manager, methods: h.methods || [], chemicals: h.chemicals || [], note: h.type === "방역" ? "" : h.content });
                setEditingHistoryId(h.id); setShowHistoryForm(true); setShowPayForm(false); setIsEditing(false);
            };

            const handleDeleteHistory = (logId) => {
                if(!confirm("해당 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, history: selectedItem.history.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                let updatedPayList;
                if (editingPayId) {
                    updatedPayList = selectedItem.paymentHistory.map(p => 
                        p.id === editingPayId ? { ...p, month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note } : p
                    );
                } else {
                    const newPay = { id: Date.now(), month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note };
                    updatedPayList = [newPay, ...(selectedItem.paymentHistory || [])];
                }
                const updatedItem = { ...selectedItem, paymentHistory: updatedPayList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowPayForm(false); setEditingPayId(null);
                setPayForm({ month: CURRENT_MONTH, amount: selectedItem.fee || "30000", status: "수금완료", method: "계좌이체", note: "" });
            };

            const handleEditPayInit = (p) => {
                setPayForm({ month: p.month, amount: p.amount, status: p.status, method: p.method || "계좌이체", note: p.note || "" });
                setEditingPayId(p.id); setShowPayForm(true); setShowHistoryForm(false); setIsEditing(false);
            };

            const handleDeletePayment = (logId) => {
                if(!confirm("해당 수금 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, paymentHistory: selectedItem.paymentHistory.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            // 💡 [치명적 버그 수정] 모든 데이터를 강제로 '운영중' 탭에 띄우도록 수정
            const enrichedData = useMemo(() => {
                return data.map(item => {
                    let safeTab = item.tab;
                    // 데이터 탭이 없거나 비어있으면 강제로 '운영중'탭으로 배정
                    if (!safeTab || safeTab.trim() === "") {
                        if (item.payStatus === '일시중지') safeTab = 'paused';
                        else if (item.payStatus === '해지') safeTab = 'terminated';
                        else safeTab = 'active'; 
                    }

                    let itemDebt = 0;
                    if (item.collectionStatus === "미수금") {
                        itemDebt += parseInt(String(item.uncollectedAmount || "0").replace(/,/g, ''), 10) || 0;
                    }
                    if (item.paymentHistory && item.paymentHistory.length > 0) {
                        item.paymentHistory.forEach(p => {
                            if (p.status === "미수금") {
                                itemDebt += parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0;
                            }
                        });
                    }
                    return { ...item, tab: safeTab, computedDebt: itemDebt };
                });
            }, [data]);

            const totalUncollected = enrichedData.reduce((sum, item) => sum + (item.computedDebt || 0), 0);
            const uncollectedClientsCount = enrichedData.filter(item => (item.computedDebt || 0) > 0).length;

            const selectedItemDebt = selectedItem ? enrichedData.find(d => d.id === selectedItem.id)?.computedDebt || 0 : 0;
            const selectedItemTotalPaid = useMemo(() => {
                if (!selectedItem || !selectedItem.paymentHistory) return 0;
                return selectedItem.paymentHistory
                    .filter(p => p.status === "수금완료" || p.status === "무료") 
                    .reduce((sum, p) => sum + (parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0), 0);
            }, [selectedItem]);

            const selectedItemPestCount = selectedItem ? (selectedItem.history || []).filter(h => h.type === '방역').length : 0;
            const selectedItemPayCount = selectedItem ? (selectedItem.paymentHistory || []).filter(p => p.status === "수금완료" || p.status === "무료").length : 0;

            const currentList = useMemo(() => {
                return enrichedData.filter(r => {
                    if (r.tab !== currentTab) return false;
                    const matchSearch = (r.name || "").includes(search) || (r.manager || "").includes(search) || (r.address || "").includes(search);
                    const matchCity = !filterCity || r.gu === filterCity;
                    const matchDistrict = !filterDistrict || r.dong === filterDistrict;
                    
                    // 💡 [무료/유료 필터 버그 수정] 상태값이 정확히 일치하도록 처리
                    const matchPayStatus = !filterPayStatus || String(r.payStatus || "").trim() === filterPayStatus;
                    
                    const matchCollection = !filterCollection || (filterCollection === '미수금' ? r.computedDebt > 0 : r.computedDebt === 0);
                    const isCompletedThisMonth = r.history && r.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH));
                    const matchCompletion = !filterCompletion || (filterCompletion === 'completed' ? isCompletedThisMonth : !isCompletedThisMonth);
                    return matchSearch && matchCity && matchDistrict && matchPayStatus && matchCollection && matchCompletion;
                });
            }, [enrichedData, currentTab, search, filterCity, filterDistrict, filterPayStatus, filterCollection, filterCompletion]);

            const activeData = enrichedData.filter(d => d.tab === 'active');
            const leeCount = activeData.filter(d => d.manager === '이원식').length;
            const kangCount = activeData.filter(d => d.manager === '강현준').length;
            const completedThisMonth = activeData.filter(c => c.history && c.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH))).length;
            const delayedThisMonth = activeData.length - completedThisMonth;
            const activeLikeCount = enrichedData.filter(d => d.tab === 'active' || d.tab === 'paused').length;
            const termCount = enrichedData.filter(d => d.tab === 'terminated').length;
            const totalEver = activeLikeCount + termCount;
            const cancelRate = totalEver === 0 ? "0.0" : ((termCount / totalEver) * 100).toFixed(1);

            const chartStats = useMemo(() => {
                const cy = parseInt(CURRENT_MONTH.split('-')[0], 10); const cm = parseInt(CURRENT_MONTH.split('-')[1], 10);
                const months = Array.from({length: 6}, (_, i) => {
                    let m = cm - (5 - i); let y = cy;
                    if (m <= 0) { m += 12; y -= 1; }
                    return `${y}-${String(m).padStart(2, '0')}`;
                });
                const chartDataToUse = chartManager === "전체 담당자" ? data : data.filter(d => d.manager === chartManager);
                return months.map(monthStr => {
                    const mLabel = parseInt(monthStr.split('-')[1], 10) + '월';
                    const newCount = chartDataToUse.filter(d => d.contractStart && d.contractStart.startsWith(monthStr)).length;
                    const termCountData = chartDataToUse.filter(d => {
                        if (d.tab !== 'terminated') return false;
                        if (d.history && d.history.length > 0 && d.history[0].date) return d.history[0].date.startsWith(monthStr);
                        return d.contractStart && d.contractStart.startsWith(monthStr);
                    }).length;
                    return { month: monthStr, label: mLabel, newCount, termCount: termCountData, netCount: newCount - termCountData };
                });
            }, [data, chartManager]);

            const maxChartVal = Math.max(1, ...chartStats.map(s => Math.max(s.newCount, s.termCount, Math.abs(s.netCount))));

            if (loading) return <div className="flex items-center justify-center min-h-screen font-bold text-emerald-800">데이터 로드 중...</div>;

            const availableHistoryYears = selectedItem && selectedItem.history ? [...new Set(selectedItem.history.map(h => h.date ? h.date.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredHistory = selectedItem && selectedItem.history ? [...selectedItem.history]
                .filter(h => historyYearFilter === 'all' || (h.date && h.date.startsWith(historyYearFilter)))
                .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)) : [];

            const availablePaymentYears = selectedItem && selectedItem.paymentHistory ? [...new Set(selectedItem.paymentHistory.map(p => p.month ? p.month.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredPayment = selectedItem && selectedItem.paymentHistory ? [...selectedItem.paymentHistory]
                .filter(p => paymentYearFilter === 'all' || (p.month && p.month.startsWith(paymentYearFilter)))
                .sort((a, b) => new Date((b.month || '') + '-01') - new Date((a.month || '') + '-01')) : [];

            return (
                <div>
                    <div className={`max-w-7xl mx-auto space-y-6 ${isCertOpen ? 'hidden print:hidden' : 'block'}`}>
                        <div className="flex justify-between items-end mb-4 pt-2 px-2">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2 text-[#0B5E4D]">
                                    <span className="bg-[#0B5E4D] text-white p-1.5 rounded-lg text-sm shadow-md">🛡️</span> MSTC방역
                                </h1>
                                <p className="text-xs text-gray-500 mt-1 font-bold">거래처 및 영업 관리 시스템</p>
                            </div>
                            <div className="flex flex-col items-end gap-2">
                                <div className="text-sm text-gray-400 font-mono font-bold tracking-wider">{TODAY.replace(/-/g, '.')} 기준</div>
                                <button onClick={() => window.location.reload()} className="px-3 py-1.5 border border-[#0B5E4D] text-[#0B5E4D] rounded-lg text-[11px] font-bold flex items-center gap-1 shadow-sm hover:bg-[#0B5E4D] hover:text-white transition-all">🔄 최신 데이터 불러오기</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-[#E3F2EC] rounded-xl text-[#0B5E4D] text-2xl">👤</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">운영중 거래처</p><p className="text-2xl font-black text-gray-800 leading-none">{activeData.length}</p><p className="text-[11px] text-gray-500 mt-1.5">이원식 {leeCount} · 강현준 {kangCount}</p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-rose-50 rounded-xl text-rose-700 text-2xl">📅</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">이번 달 방역 현황</p><p className="text-2xl font-black text-gray-800 leading-none">{activeData.length}</p><p className="text-[11px] text-gray-500 font-bold mt-1.5">완료 {completedThisMonth}건 <span className="text-rose-600">· 지연 {delayedThisMonth}건</span></p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-gray-50 rounded-xl text-gray-700 text-2xl">📉</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">총 누적 해지율</p><p className="text-2xl font-black text-gray-800 leading-none">{cancelRate}%</p><p className="text-[11px] text-gray-500 mt-1.5">해지 {termCount}건</p></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                                <div className="p-4 bg-rose-50 rounded-xl text-rose-700 text-2xl">💰</div>
                                <div><p className="text-xs text-gray-400 font-bold mb-0.5">총 미수금 현황</p><p className="text-xl font-black text-red-600 leading-none">₩{totalUncollected.toLocaleString()}</p><p className="text-[11px] text-gray-500 mt-1.5">현재 미납 {uncollectedClientsCount}곳</p></div>
                            </div>
                        </div>

                        <div className="bg-white border border-gray-100 p-6 rounded-3xl shadow-sm relative overflow-hidden">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <h3 className="text-sm font-bold text-gray-800">📊 월별 순증 추이 (신규 및 해지)</h3>
                                    <select value={chartManager} onChange={e => setChartManager(e.target.value)} className="text-xs p-1.5 border rounded-lg bg-gray-50 text-gray-600 font-bold outline-none cursor-pointer hover:bg-gray-100 transition-all"><option>전체 담당자</option><option>이원식</option><option>강현준</option></select>
                                </div>
                                <div className="flex gap-3 text-[11px] font-bold text-gray-500">
                                    <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-[#0B5E4D] rounded-sm"></span> 신규</span><span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-rose-700 rounded-sm"></span> 해지</span>
                                </div>
                            </div>
                            <div className="h-32 flex items-end justify-around px-4 border-b border-gray-200 relative pb-2">
                                {chartStats.map(chart => (
                                    <div key={chart.month} className="flex flex-col items-center gap-2 relative z-10 w-16 group">
                                        <div className="flex items-end gap-1 h-28 w-full justify-center relative">
                                            <div className="bg-[#0B5E4D] rounded-t-sm shadow-sm transition-all duration-500 w-3.5" style={{ height: `${(chart.newCount / maxChartVal) * 100}%`, minHeight: chart.newCount > 0 ? '4px' : '0' }}></div>
                                            <div className="bg-rose-700 rounded-t-sm shadow-sm transition-all duration-500 w-3.5" style={{ height: `${(chart.termCount / maxChartVal) * 100}%`, minHeight: chart.termCount > 0 ? '4px' : '0' }}></div>
                                            <div className="absolute -top-10 bg-gray-800 text-white text-[11px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-20 shadow-lg font-bold">순증 {chart.netCount > 0 ? `+${chart.netCount}` : chart.netCount}건</div>
                                        </div>
                                        <span className="text-[10px] text-gray-400 font-bold">{chart.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-6">
                            <div className="flex-1 bg-white p-6 rounded-3xl border shadow-sm h-fit">
                                <div className="flex gap-2 p-1 bg-gray-50 border rounded-xl mb-4 overflow-x-auto">
                                    <button onClick={() => { setCurrentTab("active"); setSelectedItem(null); }} className={`flex-1 min-w-[80px] py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'active' ? 'bg-white text-emerald-800 shadow-sm border' : 'text-gray-500'}`}>방역 거래처 ({enrichedData.filter(d=>d.tab==='active').length})</button>
                                    <button onClick={() => { setCurrentTab("prospect"); setSelectedItem(null); }} className={`flex-1 min-w-[80px] py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'prospect' ? 'bg-white text-emerald-800 shadow-sm border' : 'text-gray-500'}`}>영업처 ({enrichedData.filter(d=>d.tab==='prospect').length})</button>
                                    <button onClick={() => { setCurrentTab("paused"); setSelectedItem(null); }} className={`flex-1 min-w-[80px] py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'paused' ? 'bg-white text-amber-700 shadow-sm border' : 'text-gray-500'}`}>일시중지 ({enrichedData.filter(d=>d.tab==='paused').length})</button>
                                    <button onClick={() => { setCurrentTab("terminated"); setSelectedItem(null); }} className={`flex-1 min-w-[80px] py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'terminated' ? 'bg-white text-red-700 shadow-sm border' : 'text-gray-500'}`}>해지 거래처 ({enrichedData.filter(d=>d.tab==='terminated').length})</button>
                                </div>

                                <div className="flex flex-col gap-2 mb-6 bg-gray-50/50 p-3 rounded-xl border border-gray-100">
                                    <div className="flex flex-wrap gap-2">
                                        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="상호명, 담당자, 주소 검색" className="text-xs p-2.5 rounded-xl border bg-white outline-none flex-1 min-w-[150px] font-medium" />
                                        <select value={filterCity} onChange={e => { setFilterCity(e.target.value); setFilterDistrict(""); }} className="text-xs p-2.5 rounded-xl border bg-white outline-none"><option value="">시/도 전체</option>{Object.keys(REGIONS).map(c => <option key={c}>{c}</option>)}</select>
                                        <select value={filterDistrict} onChange={e => setFilterDistrict(e.target.value)} disabled={!filterCity} className="text-xs p-2.5 rounded-xl border bg-white outline-none disabled:bg-gray-100 disabled:text-gray-400"><option value="">구/군 전체</option>{filterCity && REGIONS[filterCity].map(d => <option key={d}>{d}</option>)}</select>
                                        
                                        <select value={filterPayStatus} onChange={e => setFilterPayStatus(e.target.value)} className="text-xs p-2.5 rounded-xl border bg-white outline-none font-bold text-gray-700">
                                            <option value="">결제 상태 전체</option>
                                            <option value="유료">💰 유료 업체</option>
                                            <option value="무료">🎁 무료/서비스 업체</option>
                                            <option value="일시중지">⏸️ 일시중지</option>
                                            <option value="해지">❌ 해지 거래처</option>
                                        </select>
                                        
                                        <select value={filterCompletion} onChange={e => setFilterCompletion(e.target.value)} className="text-xs p-2.5 rounded-xl border bg-white outline-none font-bold text-[#0B5E4D]">
                                            <option value="">방역 상태 전체</option><option value="completed">✅ {CURRENT_MONTH_NUM}월 방역 완료</option><option value="pending">🚨 {CURRENT_MONTH_NUM}월 미실시</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-wrap gap-2 items-center justify-between">
                                        <div className="flex gap-2">
                                            <select value={filterCollection} onChange={e => setFilterCollection(e.target.value)} className="text-xs p-2.5 rounded-xl border bg-white outline-none font-bold text-red-600">
                                                <option value="">수금 상태 전체</option><option value="미수금">🚨 미수금 업체만</option><option value="수금완료">수금 완료</option>
                                            </select>
                                            <button onClick={() => alert("대원 관리 시스템 준비중")} className="px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs font-bold text-gray-700 flex items-center gap-1 shadow-sm hover:bg-gray-50">⚙️ 대원 관리</button>
                                        </div>
                                        <button onClick={() => { setIsModalOpen(true); setRegError(""); }} className="bg-[#0B5E4D] text-white font-bold text-xs px-5 py-2.5 rounded-xl hover:opacity-95 shadow-sm whitespace-nowrap">+ 신규 등록</button>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3">
                                    {currentList.map(item => {
                                        const isCompletedThisMonth = item.history && item.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH));
                                        return (
                                            <div key={item.id} onClick={() => handleSelectItem(item)} className={`p-4 border rounded-2xl cursor-pointer transition-all ${selectedItem?.id === item.id ? 'bg-emerald-50/50 border-[#0B5E4D] shadow-sm' : 'bg-white hover:bg-gray-50'}`}>
                                                <div className="flex justify-between items-center">
                                                    <div className="w-full pr-4">
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-bold text-sm text-gray-800">{item.name}</p>
                                                            {item.tab === 'active' && (
                                                                <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold border shadow-sm ${isCompletedThisMonth ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>
                                                                    {CURRENT_MONTH_NUM}월 {isCompletedThisMonth ? '완료✅' : '미실시🚨'}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <p className="text-xs text-gray-500 mt-1">📍 {item.gu} {item.dong} · 담당: <b>{item.manager}</b></p>
                                                        
                                                        <div className="mt-2 flex flex-wrap gap-1.5">
                                                            <span className={`text-[10px] px-1.5 py-0.5 rounded border shadow-sm ${item.parking === 'X' ? 'bg-red-50 text-red-700 border-red-200 font-bold' : item.parking === '△' ? 'bg-amber-50 text-amber-700 border-amber-200 font-bold' : 'bg-gray-50 text-gray-500 border-gray-200'}`}>🚗 주차 {item.parking || 'O'}</span>
                                                            <span className={`text-[10px] px-1.5 py-0.5 rounded border shadow-sm ${item.photoReq === 'O' ? 'bg-blue-50 text-blue-700 border-blue-200 font-bold' : 'bg-gray-50 text-gray-500 border-gray-200'}`}>📸 사진 {item.photoReq || 'X'}</span>
                                                            <span className={`text-[10px] px-1.5 py-0.5 rounded border shadow-sm ${item.bugZapper && item.bugZapper !== '없음' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 font-bold' : 'bg-gray-50 text-gray-500 border-gray-200'}`}>💡 포충기 {item.bugZapper || '없음'}</span>
                                                            <span className={`text-[10px] px-1.5 py-0.5 rounded border shadow-sm ${item.trapReq === 'O' ? 'bg-purple-50 text-purple-700 border-purple-200 font-bold' : 'bg-gray-50 text-gray-500 border-gray-200'}`}>🪤 트랩 {item.trapReq || 'X'}</span>
                                                        </div>

                                                        {(item.etcInfo || item.keyInfo) && (
                                                            <div className="mt-2 space-y-1 w-full max-w-[250px]">
                                                                {item.keyInfo && <p className="text-[11px] text-blue-700 bg-blue-50 px-2 py-1 rounded-lg border border-blue-100 truncate shadow-sm">🔑 {item.keyInfo}</p>}
                                                                {item.etcInfo && <p className="text-[11px] text-gray-600 bg-gray-50 px-2 py-1 rounded-lg border border-gray-200 truncate shadow-sm">💡 {item.etcInfo}</p>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1 text-[10px] font-bold shrink-0">
                                                        <span className={`px-2 py-0.5 rounded ${item.serviceType === '정기' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'}`}>{item.serviceType}</span>
                                                        <span className={`px-2 py-0.5 rounded ${item.payStatus === '유료' ? 'bg-[#E3F2EC] text-[#0B5E4D]' : item.payStatus === '무료' ? 'bg-gray-200 text-gray-700' : item.payStatus === '일시중지' ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800'}`}>{item.payStatus}</span>
                                                        {item.computedDebt > 0 && <span className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded shadow-sm border border-rose-200 animate-pulse">🚨 총 미납액: ₩{item.computedDebt.toLocaleString()}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    {currentList.length === 0 && <p className="text-center text-xs text-gray-400 py-8">조회된 업체가 없습니다.</p>}
                                </div>
                            </div>

                            {/* 우측 상세창 */}
                            {selectedItem && (
                                <div className="w-full lg:w-[440px] bg-white h-fit shadow-2xl rounded-3xl border flex flex-col z-20 animate-slide-in overflow-hidden">
                                    <div className="p-5 border-b bg-gray-50 rounded-t-3xl relative">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                                    {selectedItem.tab === 'active' ? '🟢' : selectedItem.tab === 'prospect' ? '🟡' : selectedItem.tab === 'paused' ? '🟠' : '🔴'} {selectedItem.name}
                                                </h3>
                                                <div className="flex gap-2 mt-2">
                                                    <span className="text-[11px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold">🔨 누적 방역: {selectedItemPestCount}회</span>
                                                    <span className="text-[11px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold">💰 누적 수금: {selectedItemPayCount}개월 치</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <button onClick={handleDeleteClient} className="text-[10px] text-red-500 font-bold border border-red-200 bg-white px-2 py-1 rounded shadow-sm hover:bg-red-500 hover:text-white transition-all">🗑️ 영구 삭제</button>
                                                <button onClick={() => setSelectedItem(null)} className="text-2xl font-bold text-gray-400 hover:text-black">×</button>
                                            </div>
                                        </div>
                                        {(selectedItem.etcInfo || selectedItem.keyInfo) && (
                                            <div className="mt-3 text-[11px] bg-white text-gray-700 p-2.5 rounded-xl border border-gray-200 break-words whitespace-pre-wrap shadow-sm space-y-1">
                                                {selectedItem.keyInfo && <p><span className="font-bold text-blue-600">🔑 출입/열쇠:</span> {selectedItem.keyInfo}</p>}
                                                {selectedItem.etcInfo && <p><span className="font-bold text-amber-600">💡 메모/특이사항:</span> {selectedItem.etcInfo}</p>}
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex border-b bg-white text-xs font-bold">
                                        <button onClick={() => setDetailTab("info")} className={`flex-1 py-3 transition-all ${detailTab === 'info' ? 'border-b-2 border-[#0B5E4D] text-[#0B5E4D]' : 'text-gray-400'}`}>📋 정보</button>
                                        <button onClick={() => setDetailTab("payment")} className={`flex-1 py-3 transition-all ${detailTab === 'payment' ? 'border-b-2 border-amber-600 text-amber-700' : 'text-gray-400'}`}>💰 수금 내역</button>
                                        <button onClick={() => setDetailTab("history")} className={`flex-1 py-3 transition-all ${detailTab === 'history' ? 'border-b-2 border-blue-600 text-blue-700' : 'text-gray-400'}`}>📝 방역 기록</button>
                                    </div>
                                    <div className="p-5 overflow-y-auto max-h-[70vh] bg-white">
                                        {/* [생략: 정보/수금/방역 탭 내용은 이전 코드와 동일하게 정상 작동합니다] */}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
