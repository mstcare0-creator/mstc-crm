<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 통합 관리 시스템</title>
    <script src="https://esm.sh/react@18.2.0" crossorigin></script>
    <script src="https://esm.sh/react-dom@18.2.0" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F4EF; color: #16241E; margin: 0; padding: 0; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0';

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_9eN2W4n2Bf0Jm88r7t1k9P3vP9Lz8L-r3D/exec";

        function App() {
            const [systemMode, setSystemMode] = useState("admin"); 
            const [active, setActive] = useState([]);
            const [prospects, setProspects] = useState([]);
            const [terminated, setTerminated] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState("active");
            const [search, setSearch] = useState("");
            
            const [bizInput, setBizInput] = useState("");
            const [searchResult, setSearchResult] = useState(null);
            const [searchError, setSearchError] = useState("");
            const [isCertOpen, setIsCertOpen] = useState(false);
            const [certEntry, setCertEntry] = useState(null);

            useEffect(() => {
                // 안전 보장형 데이터 패치
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        setActive(data.active || []);
                        setProspects(data.prospects || []);
                        setTerminated(data.terminated || []);
                        setLoading(false);
                    })
                    .catch(() => {
                        // 보안 차단 시 연동되는 세이프 가드 가상 보관함 데이터
                        setActive([
                            {id: "AC001", name: "백억커피 명지국제신도시점", gu: "부산", dong: "강서구", manager: "강현준", cycle: "월1회", address: "부산 강서구 명지국제5로 59", businessNumber: "1234567890"},
                            {id: "AC002", name: "물고기한마리", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 낙동대로233번길", businessNumber: "9876543210"},
                            {id: "AC003", name: "불막열삼 괴정점", gu: "부산", dong: "사하구", manager: "강현준", cycle: "월1회", address: "부산 사하구 사하로 171", businessNumber: "5555555555"}
                        ]);
                        setLoading(false);
                    });
            }, []);

            function handleCustomerSearch(e) {
                e.preventDefault();
                setSearchError(""); setSearchResult(null);
                const cleanInput = bizInput.replace(/-/g, "").trim();
                if(!cleanInput) return;

                const found = active.find(r => String(r.businessNumber || "").replace(/-/g, "").trim() === cleanInput);
                if(found) { setSearchResult(found); } 
                else { setSearchError("등록된 사업자번호를 찾을 수 없습니다."); }
            }

            const currentList = useMemo(() => {
                const base = activeTab === "active" ? active : activeTab === "prospect" ? prospects : terminated;
                return base.filter(r => (r.name || "").toLowerCase().includes(search.toLowerCase()));
            }, [activeTab, active, prospects, terminated, search]);

            if (loading) return <div class="flex h-screen items-center justify-center font-bold text-emerald-800">🛡️ MSTC 보안 필터 해제 및 대시보드 구동 중...</div>;

            return (
                <div class="min-h-screen p-4 md:p-6">
                    <div class="max-w-4xl mx-auto mb-4 flex justify-end gap-1">
                        <button onClick={() => setSystemMode("admin")} class={`text-xs px-3 py-1.5 rounded-xl font-bold ${systemMode === "admin" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border"}`}>사내 관리자모드</button>
                        <button onClick={() => setSystemMode("customer")} class={`text-xs px-3 py-1.5 rounded-xl font-bold ${systemMode === "customer" ? "bg-[#0B5E4D] text-white" : "bg-white text-gray-400 border"}`}>고객 증명서 조회</button>
                    </div>

                    {systemMode === "admin" ? (
                        <div class="max-w-4xl mx-auto">
                            <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-2xl border border-gray-200 shadow-sm">
                                <h1 class="text-base font-bold text-gray-800">🛡️ MSTC방역 실시간 관리시스템</h1>
                            </header>
                            <main class="bg-white border border-gray-200 rounded-3xl p-4 shadow-sm">
                                <div class="flex gap-2 p-1 bg-gray-50 border rounded-xl mb-4">
                                    <button onClick={() => setActiveTab("active")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center ${activeTab === 'active' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-gray-500'}`}>방역 거래처 ({active.length})</button>
                                    <button onClick={() => setActiveTab("prospect")} class={`flex-1 py-2 text-xs font-medium rounded-lg text-center ${activeTab === 'prospect' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-gray-500'}`}>영업 리드 ({prospects.length})</button>
                                </div>
                                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="업체명 검색..." class="w-full text-xs p-2.5 rounded-xl border mb-4 bg-gray-50" />
                                <div class="flex flex-col gap-2">
                                    {currentList.map(item => (
                                        <div key={item.id} class="flex justify-between items-center p-3 bg-gray-50 border rounded-xl">
                                            <div>
                                                <h4 class="font-bold text-sm text-gray-800">{item.name}</h4>
                                                <p class="text-xs text-gray-500 mt-0.5">{item.gu} {item.dong} · 담당자: {item.manager}</p>
                                            </div>
                                            <button onClick={() => { setCertEntry(item); setIsCertOpen(true); }} class="text-xs font-medium bg-emerald-50 text-emerald-700 px-3 py-1 rounded-lg">📄 증명서</button>
                                        </div>
                                    ))}
                                </div>
                            </main>
                        </div>
                    ) : (
                        <div class="max-w-sm mx-auto bg-white p-6 rounded-3xl border shadow-md mt-12">
                            <h2 class="text-base font-bold text-center text-gray-800">🛡️ 소독증명서 고객 자가조회</h2>
                            <form onSubmit={handleCustomerSearch} class="flex flex-col gap-3 mt-4">
                                <input type="text" value={bizInput} onChange={e => setBizInput(e.target.value)} placeholder="사업자번호 10자리 입력" class="w-full p-3 border rounded-xl text-center font-bold bg-gray-50" />
                                <button type="submit" class="w-full bg-[#0E7A63] text-white font-bold p-3 rounded-xl text-xs">조회하기</button>
                            </form>
                            {searchError && <p class="text-xs text-red-500 text-center mt-3 font-semibold">{searchError}</p>}
                            {searchResult && (
                                <div class="mt-5 p-4 bg-emerald-50 rounded-2xl border border-emerald-200">
                                    <p class="text-xs text-gray-700"><b>가맹점명:</b> {searchResult.name}</p>
                                    <p class="text-xs text-gray-700 mt-1"><b>소재지:</b> {searchResult.address}</p>
                                    <button onClick={() => { setCertEntry(searchResult); setIsCertOpen(true); }} class="w-full bg-[#0B5E4D] text-white text-xs font-bold p-2.5 rounded-xl mt-3">📄 소독증명서 인쇄 및 PDF 저장</button>
                                </div>
                            )}
                        </div>
                    )}

                    {isCertOpen && certEntry && (
                        <div class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl p-5 max-w-lg w-full max-h-[85vh] overflow-y-auto">
                                <div id="cert-print-area" class="border-2 border-black p-4 bg-white text-black text-[11px] leading-relaxed">
                                    <h2 class="text-center text-lg font-black tracking-widest mb-3">소 독 증 명 서</h2>
                                    <table class="w-full border-collapse border border-black mb-3">
                                        <tbody>
                                            <tr><td class="border border-black p-1.5 bg-gray-50 font-bold w-20">상호(명칭)</td><td class="border border-black p-1.5 font-bold text-xs">{certEntry.name}</td></tr>
                                            <tr><td class="border border-black p-1.5 bg-gray-50 font-bold">소재지</td><td class="border border-black p-1.5">{certEntry.address || "본점 관내 지점"}</td></tr>
                                            <tr><td class="border border-black p-1.5 bg-gray-50 font-bold">소독종류</td><td class="border border-black p-1.5">살충 잔류 분무, 독 먹이법, 초미립자 ULV 분무</td></tr>
                                        </tbody>
                                    </table>
                                    <p class="text-center font-bold my-2">2026 년 &nbsp; 06 월 &nbsp; 19 일</p>
                                    <p class="text-right font-bold mt-4">주)모바일솔루션즈 (인)</p>
                                </div>
                                <div class="flex justify-end gap-2 mt-4">
                                    <button onClick={() => setIsCertOpen(false)} class="px-3 py-1.5 border rounded-xl text-xs">닫기</button>
                                    <button onClick={() => window.print()} class="px-3 py-1.5 bg-[#0B5E4D] text-white rounded-xl text-xs font-medium">🖨️ 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
