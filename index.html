<body class="p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJUCIKiumzq3QbFjZzSQq6mKWdw03AXCja8oH2mClGwUN6cv8CKJehdJLlkNHACqEY/exec"; 

        const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
        const TODAY = new Date().toISOString().split('T')[0];
        const CURRENT_MONTH = TODAY.slice(0, 7);
        const CURRENT_MONTH_NUM = parseInt(CURRENT_MONTH.split('-')[1], 10);
        const DEFAULT_STAFF = ["이원식", "강현준"];
        const CYCLES = ["월1회", "3개월1회", "단기"];
        // 💡 다발이끔 살서제 삭제 완료
        const CHEMICALS_BY_TYPE = { "살균": ["마이크로켐 골드", "키니아 비실드"], "살충": ["롱다운플러스", "맥스포스 셀렉트 이지갤"] };
        const REGIONS = { 
            "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구", "해운대구"],
            "창원": ["의창구", "성산구", "마산합포구", "마산회원구", "진해구"],
            "경남": ["양산시", "김해시"] 
        };

        const COMPANY_SEAL_URL = "https://mstcare0-creator.github.io/mstc-crm/seal.png"; 

        // 📅 "26.01", "26-01", "2026/01/05" 등 뒤섞인 날짜 표기를 "YYYY-MM" / "YYYY-MM-DD" 로 통일
        function normalizeDateFull(str) {
            if (!str) return '';
            let clean = String(str).replace(/[\.\/]/g, '-').trim();
            let parts = clean.split('-').filter(Boolean);
            if (parts.length < 2) return String(str);
            let y = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10);
            let d = parts.length >= 3 ? parseInt(parts[2], 10) : null;
            if (isNaN(y) || isNaN(m) || m < 1 || m > 12) return String(str);
            if (y < 100) y += 2000;
            let out = `${y}-${String(m).padStart(2, '0')}`;
            if (d && !isNaN(d)) out += `-${String(d).padStart(2, '0')}`;
            return out;
        }
        function normalizeMonth(str) {
            const full = normalizeDateFull(str);
            return full && full.length >= 7 ? full.slice(0, 7) : null;
        }
        // ⏰ "8:30", "오전 11:00", "23:05:00" 등 뒤섞인 시간 표기를 분 단위 숫자로 변환 (정렬용)
        function timeToMinutes(str) {
            if (!str) return 99999;
            const s = String(str).trim();
            const match = s.match(/(\d{1,2}):(\d{2})/);
            if (!match) return 99999;
            let h = parseInt(match[1], 10);
            const m = parseInt(match[2], 10);
            if (isNaN(h) || isNaN(m)) return 99999;
            if (/오후|PM/i.test(s) && h < 12) h += 12;
            if (/오전|AM/i.test(s) && h === 12) h = 0;
            return h * 60 + m;
        }

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            // 중복 제거: 같은 ID나 이름+연락처가 겹치면 데이터가 더 많은 쪽을 보존
            const dedupeAndSort = (arr) => {
                const byId = new Map();
                const byNamePhone = new Map();

                arr.forEach(item => {
                    if (!item) return;
                    // 데이터 풍부도 점수 (채워진 필드 수)
                    const score = ['name','phone','address','keyInfo','etcInfo','trapReq','parking','contractStart','fee','cycle'].filter(k => item[k] && item[k] !== '' && item[k] !== 'X').length
                                + (item.history || []).length + (item.paymentHistory || []).length;

                    if (item.id) {
                        const key = String(item.id);
                        const prev = byId.get(key);
                        if (!prev || score > (prev._score || 0)) byId.set(key, { ...item, _score: score });
                    } else {
                        const key = `${item.name || ""}__${item.phone || ""}`;
                        const prev = byNamePhone.get(key);
                        if (!prev || score > (prev._score || 0)) byNamePhone.set(key, { ...item, _score: score });
                    }
                });

                // ID 있는 것들 먼저, 없는 것들 중 이름+연락처로 추가 (이미 ID로 처리된 것 제외)
                const idItems = [...byId.values()];
                const idNames = new Set(idItems.map(i => `${i.name || ""}__${i.phone || ""}`));
                const extraItems = [...byNamePhone.values()].filter(i => !idNames.has(`${i.name || ""}__${i.phone || ""}`));
                const result = [...idItems, ...extraItems];

                return result
                    .map(({ _score, ...item }) => item)
                    .sort((a, b) => (a.name || "").localeCompare(b.name || "", "ko"));
            };

            // fetch 중복 실행 방지 플래그
            let dataFetched = false;

            useEffect(() => {
                if (dataFetched) return;
                dataFetched = true;
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(fetchedData => {
                        if (Array.isArray(fetchedData) && fetchedData.length > 0) {
                            const clean = dedupeAndSort(fetchedData);
                            setData(clean);
                            localStorage.setItem("mstc_crm_data_v50", JSON.stringify(clean));
                        } else {
                            const local = localStorage.getItem("mstc_crm_data_v50");
                            if(local) setData(dedupeAndSort(JSON.parse(local)));
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        const local = localStorage.getItem("mstc_crm_data_v50");
                        if(local) setData(dedupeAndSort(JSON.parse(local)));
                        setLoading(false);
                    });
            }, []);

            const updateDataAndSync = (newData) => {
                const clean = dedupeAndSort(newData);
                setData(clean);
                localStorage.setItem("mstc_crm_data_v50", JSON.stringify(clean)); 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: clean })
                }).catch(err => console.log("전송 지연"));
            };

            const handleBatchInsert = () => {
                if(!confirm("⚠️ 현재 '운영중'인 거래처 전체에 대하여, [방역시작일] 기준으로 현재 달까지의 빈 기록을 시스템이 자동으로 꽉 채웁니다.\n진행하시겠습니까?")) return;

                const currentYM = CURRENT_MONTH; 
                let count = 0;

                const newData = data.map(item => {
                    let safePayStatus = item.payStatus;
                    if (!safePayStatus || String(safePayStatus).trim() === "") safePayStatus = "유료";

                    let safeServiceType = item.serviceType;
                    if (!safeServiceType || String(safeServiceType).trim() === "") safeServiceType = "정기";

                    let safeTab = item.tab;
                    if (!safeTab || safeTab.trim() === "") {
                        if (safePayStatus === '일시중지') safeTab = 'paused';
                        else if (safePayStatus === '해지') safeTab = 'terminated';
                        else safeTab = 'active'; 
                    }

                    if(safeTab !== "active") return { ...item, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType };
                    if(!item.contractStart) return { ...item, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType };

                    let cleanDate = String(item.contractStart).replace(/[\.\/]/g, '-').trim();
                    let parts = cleanDate.split('-');
                    
                    if (parts.length < 2) return { ...item, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType };

                    let sYear = parseInt(parts[0], 10);
                    let sMonth = parseInt(parts[1], 10);
                    let sDay = parts.length >= 3 ? parseInt(parts[2], 10) : 15; 

                    if (sYear < 100) sYear += 2000;

                    if (isNaN(sYear) || isNaN(sMonth) || sMonth < 1 || sMonth > 12) {
                        return { ...item, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType };
                    }

                    let safeDay = String(Math.min(sDay || 15, 28)).padStart(2, '0');

                    let targetMonths = [];
                    let [cYear, cMonth] = currentYM.split('-').map(Number);
                    
                    let tempY = sYear;
                    let tempM = sMonth;
                    
                    let loopGuard = 0;
                    while ((tempY < cYear || (tempY === cYear && tempM <= cMonth)) && loopGuard < 60) {
                        targetMonths.push(`${tempY}-${String(tempM).padStart(2, '0')}`);
                        tempM++;
                        if (tempM > 12) { tempM = 1; tempY++; }
                        loopGuard++;
                    }

                    let h = [...(item.history || [])];
                    let p = [...(item.paymentHistory || [])];
                    
                    const defaultPayStatus = safePayStatus === "무료" ? "무료" : "수금완료";
                    const defaultPayAmount = safePayStatus === "무료" ? "0" : (item.fee || "30000");

                    targetMonths.forEach(m => {
                        if(!h.find(x => x.date && x.date.startsWith(m))) {
                            h.push({
                                id: Date.now() + Math.random(), 
                                date: `${m}-${safeDay}`, 
                                time: "10:00", 
                                type: "방역", 
                                author: item.manager || "이원식", 
                                content: "정기 방역 완료", 
                                methods: ["살충"], 
                                chemicals: ["롱다운플러스"]
                            });
                            count++;
                        }
                        if(!p.find(x => x.month === m)) {
                            p.push({
                                id: Date.now() + Math.random(), 
                                month: m, 
                                amount: defaultPayAmount, 
                                status: defaultPayStatus, 
                                method: item.payMethod || "계좌이체", 
                                note: "시스템 일괄 셋팅"
                            });
                            count++;
                        }
                    });
                    return {...item, history: h, paymentHistory: p, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType};
                });

                updateDataAndSync(newData);
                alert(`🎉 일괄 기입 완료! 빈 공간에 총 ${count}개의 알맞은 기록이 자동 생성되었습니다.`);
            };

            const [currentTab, setCurrentTab] = useState("active");
            const [reportMonth, setReportMonth] = useState(CURRENT_MONTH);
            const [reportStaff, setReportStaff] = useState("");
            const [reportDate, setReportDate] = useState("");
            const [paysoftModal, setPaySoftModal] = useState(false);
            const [paysoftRows, setPaySoftRows] = useState([]);
            const [paysoftImporting, setPaySoftImporting] = useState(false);
            const [uncollectedModal, setUncollectedModal] = useState(false);
            const [uncollectedRows, setUncollectedRows] = useState([]);
            const [uncollectedMonth, setUncollectedMonth] = useState("");
            const [adminMode, setAdminMode] = useState(false);
            const [logoTapCount, setLogoTapCount] = useState(0);
            const [staffModal, setStaffModal] = useState(false);
            const [chartModal, setChartModal] = useState(false);
            const [manualChartData, setManualChartData] = useState(() => {
                try { const s = localStorage.getItem("mstc_chart_v1"); return s ? JSON.parse(s) : {}; } catch { return {}; }
            });
            const saveManualChart = (d) => { setManualChartData(d); localStorage.setItem("mstc_chart_v1", JSON.stringify(d)); };
            const [staffList, setStaffList] = useState(() => {
                try { const s = localStorage.getItem("mstc_staff_v1"); return s ? JSON.parse(s) : DEFAULT_STAFF; } catch { return DEFAULT_STAFF; }
            });
            const [newStaffName, setNewStaffName] = useState("");

            const saveStaff = (list) => {
                setStaffList(list);
                localStorage.setItem("mstc_staff_v1", JSON.stringify(list));
            };

            const handleLogoTap = () => {
                const next = logoTapCount + 1;
                if (next >= 5) {
                    setLogoTapCount(0);
                    if (adminMode) {
                        setAdminMode(false);
                        alert("관리자 모드가 해제됐습니다.");
                        return;
                    }
                    const pwd = prompt("🔒 관리자 비밀번호를 입력하세요.");
                    if (pwd === "7903") {
                        setAdminMode(true);
                        alert("✅ 관리자 모드 활성화됐습니다.");
                    } else if (pwd !== null) {
                        alert("🚨 비밀번호가 틀렸습니다.");
                    }
                } else {
                    setLogoTapCount(next);
                    setTimeout(() => setLogoTapCount(0), 3000);
                }
            };
            const [search, setSearch] = useState("");
            const [filterCity, setFilterCity] = useState("");
            const [filterDistrict, setFilterDistrict] = useState("");
            const [filterPayStatus, setFilterPayStatus] = useState(""); 
            const [filterCollection, setFilterCollection] = useState("");
            const [filterCompletion, setFilterCompletion] = useState(""); 
            const [chartManager, setChartManager] = useState("전체 담당자");
            const [filterRegMonth, setFilterRegMonth] = useState("");
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [detailTab, setDetailTab] = useState("info");
            const [historyYearFilter, setHistoryYearFilter] = useState("all");
            const [paymentYearFilter, setPaymentYearFilter] = useState("all");

            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [regCity, setRegCity] = useState("부산");
            const [regKind, setRegKind] = useState("active");

            const [regError, setRegError] = useState("");
            const [editError, setEditError] = useState("");

            const [showHistoryForm, setShowHistoryForm] = useState(false);
            const [historyForm, setHistoryForm] = useState({ date: TODAY, time: "", type: "방역", methods: ["살충"], chemicals: ["롱다운플러스"], note: "", issue: "", author: "이원식" });
            const [editingHistoryId, setEditingHistoryId] = useState(null);

            const [showPayForm, setShowPayForm] = useState(false);
            const [payForm, setPayForm] = useState({ month: CURRENT_MONTH, amount: "30000", status: "수금완료", method: "계좌이체", note: "" });
            const [editingPayId, setEditingPayId] = useState(null);

            const [customMethodInput, setCustomMethodInput] = useState("");
            const [customMethodsList, setCustomMethodsList] = useState(() => {
                const saved = localStorage.getItem("mstc_custom_methods_v1");
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => { localStorage.setItem("mstc_custom_methods_v1", JSON.stringify(customMethodsList)); }, [customMethodsList]);

            const [customChemInput, setCustomChemInput] = useState({ "살균": "", "살충": "", "기타": "" });
            const [customChemsList, setCustomChemsList] = useState(() => {
                const savedChems = localStorage.getItem("mstc_custom_chems_v2");
                if (savedChems) {
                    const parsed = JSON.parse(savedChems);
                    if (!parsed["기타"]) parsed["기타"] = [];
                    return parsed;
                }
                return { "살균": [], "살충": [], "기타": [] };
            });
            useEffect(() => { localStorage.setItem("mstc_custom_chems_v2", JSON.stringify(customChemsList)); }, [customChemsList]);

            const [isCertOpen, setIsCertOpen] = useState(false);
            const [certEntry, setCertEntry] = useState(null);
            const [certNumber, setCertNumber] = useState("");
            const [sealImgFailed, setSealImgFailed] = useState(false); 

            const handleSelectItem = (item) => {
                setSelectedItem(item);
                setIsEditing(false);
                setShowHistoryForm(false);
                setShowPayForm(false);
                setEditingPayId(null);
                setDetailTab("info"); 
                setHistoryYearFilter("all");
                setPaymentYearFilter("all");
            };

            const handleAddCustomMethod = () => {
                const val = customMethodInput.trim();
                if (val && !["살균", "살충"].includes(val) && !customMethodsList.includes(val)) setCustomMethodsList([...customMethodsList, val]);
                setCustomMethodInput("");
            };
            const handleDeleteCustomMethod = (methodToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomMethodsList(prev => prev.filter(m => m !== methodToRemove));
                setHistoryForm(prev => ({...prev, methods: prev.methods.filter(m => m !== methodToRemove)}));
            };

            const handleAddCustomChem = (type) => {
                const val = customChemInput[type].trim();
                if (val) {
                    if (!customChemsList[type].includes(val) && !(CHEMICALS_BY_TYPE[type] || []).includes(val)) setCustomChemsList(prev => ({...prev, [type]: [...prev[type], val]}));
                    if (!historyForm.chemicals.includes(val)) setHistoryForm(prev => ({...prev, chemicals: [...prev.chemicals, val]}));
                    setCustomChemInput(prev => ({...prev, [type]: ""}));
                }
            };
            const handleDeleteCustomChem = (type, chemToRemove) => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                setCustomChemsList(prev => ({ ...prev, [type]: prev[type].filter(c => c !== chemToRemove) }));
                setHistoryForm(prev => ({ ...prev, chemicals: prev.chemicals.filter(c => c !== chemToRemove) }));
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                
                const name = fd.get("name");
                const phone = fd.get("phone");
                const address = fd.get("address");

                if (!name || name.trim() === "") { setRegError("🚨 [상호명]을 입력해주세요!"); return; }
                if (!phone || phone.trim() === "") { setRegError("🚨 [연락처]를 입력해주세요!"); return; }
                if (!address || address.trim() === "") { setRegError("🚨 [상세주소]를 입력해주세요!"); return; }

                setRegError(""); 

                let regTab = fd.get("tab");
                const payStat = fd.get("payStatus");
                if (payStat === "일시중지") regTab = "paused";
                else if (payStat === "해지") regTab = "terminated";

                const salesDate = fd.get("salesDate") || TODAY;

                const safeData = {
                    id: "AC" + Date.now(), tab: regTab,
                    name: name, manager: fd.get("manager") || "", phone: phone,
                    bizNumber: fd.get("bizNumber") || "", 
                    clientRepName: fd.get("clientRepName") || "", 
                    salesDate: regTab === "prospect" ? salesDate : "",
                    
                    gu: fd.get("gu"), dong: fd.get("dong"), address: address, area: fd.get("area") || "",
                    contractStart: fd.get("contractStart") || TODAY, serviceType: fd.get("serviceType") || "정기", payStatus: payStat || "유료",
                    cycle: fd.get("cycle") || "", fee: fd.get("fee") || "30000", 
                    payMethod: fd.get("payMethod") || "계좌이체",
                    providedService: fd.get("providedService") || "",
                    
                    parking: fd.get("parking") || "O",
                    photoReq: fd.get("photoReq") || "X",
                    bugZapper: fd.get("bugZapper") || "없음",
                    trapReq: fd.get("trapReq") || "X",
                    keyInfo: fd.get("keyInfo") || "",

                    etcInfo: fd.get("etcInfo") || "",
                    collectionStatus: fd.get("collectionStatus") || "수금완료", uncollectedAmount: fd.get("uncollectedAmount") || "0",
                    history: regTab === "prospect" 
                        ? [{id: Date.now(), date: salesDate, time: "", type: "상담", content: "신규 영업 활동", author: fd.get("manager") || "-"}]
                        : [{id: Date.now(), date: TODAY, time: "", type: "상담", content: "신규 등록 완료", author: fd.get("manager") || "-"}],
                    paymentHistory: []
                };
                updateDataAndSync([safeData, ...data]); 
                setIsModalOpen(false); setCurrentTab(regTab);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editForm.name || editForm.name.trim() === "") { setEditError("🚨 상호명을 비울 수 없습니다!"); return; }
                
                setEditError("");
                let newTab = editForm.tab;
                if (editForm.payStatus === "일시중지") newTab = "paused";
                else if (editForm.payStatus === "해지") newTab = "terminated";
                else if (editForm.payStatus === "유료" || editForm.payStatus === "무료") { if (newTab !== "prospect") newTab = "active"; }
                // 해지로 바뀌는 시점에 terminatedDate 기록
                const wasNotTerminated = selectedItem?.tab !== 'terminated';
                const terminatedDate = (newTab === 'terminated' && wasNotTerminated) ? TODAY : (editForm.terminatedDate || "");
                const updated = { ...editForm, tab: newTab, terminatedDate };
                updateDataAndSync(data.map(d => d.id === updated.id ? updated : d)); 
                setSelectedItem(updated); setIsEditing(false); setCurrentTab(newTab);
            };

            const handleDeleteClient = () => {
                if(!confirm(`삭제하시겠습니까?`)) return;
                updateDataAndSync(data.filter(d => d.id !== selectedItem.id)); setSelectedItem(null);
            };

            // ── 페이소프트 엑셀 가져오기 ──────────────────────────────
            const normalizeName = (s) => (s || "").replace(/\s+/g, "").replace(/\(.*?\)/g, "").toLowerCase();

            const handlePaysoftFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const wb = XLSX.read(ev.target.result, { type: "array" });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    const rows = raw.slice(1).filter(r => r[0]);
                    const parsed = rows.map(r => {
                        const bizName = String(r[0] || "").replace(/\s*\([^)]*\)\s*$/, "").trim();
                        const payDate = r[2] ? String(r[2]).substring(0, 10) : "";
                        const payMonth = payDate ? payDate.substring(0, 7) : "";
                        const amount = String(r[4] || "0").replace(/,/g, "");
                        const code = String(r[13] || "");
                        const rawMethod = String(r[7] || "");
                        const method = rawMethod.includes("카드") ? "카드결제" : "계좌이체";
                        const status = (code === "0000" || code === "Q000") ? "수금완료" : "미수금";
                        const billingMonth = String(r[8] || "");
                        const orderNo = String(r[10] || "");
                        const normBiz = normalizeName(bizName);
                        let matched = data.find(d => normalizeName(d.name) === normBiz);
                        if (!matched) matched = data.find(d => normalizeName(d.name).includes(normBiz) || normBiz.includes(normalizeName(d.name)));
                        if (!matched && normBiz.length >= 4) matched = data.find(d => normalizeName(d.name).substring(0, 5) === normBiz.substring(0, 5));
                        return { bizName, payDate, payMonth, amount, method, status, billingMonth, orderNo, matched, selected: !!matched };
                    });
                    setPaySoftRows(parsed);
                    setPaySoftModal(true);
                };
                reader.readAsArrayBuffer(file);
                e.target.value = "";
            };

            const handlePaysoftImport = () => {
                const toImport = paysoftRows.filter(r => r.selected && r.matched);
                if (!toImport.length) { alert("반영할 항목이 없습니다."); return; }
                if (!confirm(`${toImport.length}건을 수금 내역으로 반영하시겠습니까?`)) return;
                let newData = [...data];
                toImport.forEach(r => {
                    const idx = newData.findIndex(d => d.id === r.matched.id);
                    if (idx < 0) return;
                    const existing = newData[idx].paymentHistory || [];
                    const isDup = r.orderNo && existing.some(p => p.orderNo === r.orderNo);
                    if (isDup) return;
                    const newPay = { id: Date.now() + Math.random(), month: r.payMonth, payDate: r.payDate, orderNo: r.orderNo, amount: r.amount, status: r.status, method: r.method, note: `페이소프트 자동반영 (${r.billingMonth} 청구 / ${r.payDate} 결제)`, serviceItem: "정기방역" };
                    newData[idx] = { ...newData[idx], paymentHistory: [newPay, ...(newData[idx].paymentHistory || [])] };
                });
                updateDataAndSync(newData);
                setPaySoftModal(false); setPaySoftRows([]);

                // 수금 반영 후 → 해당 월 수금 기록 없는 업체 자동 감지
                const importedMonth = toImport[0]?.payMonth || CURRENT_MONTH;
                const missingPayment = newData.filter(item => {
                    if (item.tab !== 'active') return false;
                    if (item.payStatus === '무료') return false; // 배민 제외
                    const hasPayment = (item.paymentHistory || []).some(p => p.month === importedMonth);
                    return !hasPayment;
                }).map(item => ({ item, selected: true, amount: item.fee || "0", month: importedMonth }));

                if (missingPayment.length > 0) {
                    setUncollectedRows(missingPayment);
                    setUncollectedMonth(importedMonth);
                    setUncollectedModal(true);
                } else {
                    alert("✅ 수금 내역 반영 완료!");
                }
            };

            const handleUncollectedImport = () => {
                const toMark = uncollectedRows.filter(r => r.selected);
                if (!toMark.length) { setUncollectedModal(false); return; }
                if (!confirm(`${toMark.length}개 업체를 ${uncollectedMonth} 미수금으로 처리하시겠습니까?`)) return;
                let newData = [...data];
                toMark.forEach(r => {
                    const idx = newData.findIndex(d => d.id === r.item.id);
                    if (idx < 0) return;
                    const existing = newData[idx].paymentHistory || [];
                    const isDup = existing.some(p => p.month === r.month && p.status === '미수금');
                    if (isDup) return;
                    const newPay = { id: Date.now() + Math.random(), month: r.month, amount: r.amount, status: '미수금', method: r.item.payMethod || '계좌이체', note: '자동 미수금 처리', serviceItem: '정기방역' };
                    newData[idx] = { ...newData[idx], paymentHistory: [newPay, ...existing] };
                });
                updateDataAndSync(newData);
                setUncollectedModal(false); setUncollectedRows([]);
                alert(`✅ ${toMark.length}개 업체 미수금 처리 완료!`);
            };

            const convertToActive = () => {
                if(!confirm("전환하시겠습니까?")) return;
                const updated = { ...selectedItem, tab: 'active', payStatus: '유료', contractStart: TODAY };
                updateDataAndSync(data.map(item => item.id === updated.id ? updated : item)); setSelectedItem(updated); setCurrentTab('active');
            };

            const convertToFailed = () => {
                if(!confirm("영업 실패 처리하시겠습니까? (해지 거래처 탭으로 이동합니다)")) return;
                const updated = { ...selectedItem, tab: 'terminated', payStatus: '영업실패', terminatedDate: TODAY };
                updateDataAndSync(data.map(item => item.id === updated.id ? updated : item)); setSelectedItem(updated); setCurrentTab('terminated');
            };

            const handleAddHistory = (e) => {
                e.preventDefault();
                const contentStr = historyForm.type === "방역" ? "정기 방역 완료" : historyForm.note;
                let updatedHistoryList;
                if (editingHistoryId) {
                    updatedHistoryList = selectedItem.history.map(h => 
                        h.id === editingHistoryId ? { ...h, date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, issue: historyForm.issue || "", methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] } : h
                    );
                } else {
                    const newLog = { id: Date.now(), date: historyForm.date, time: historyForm.time, type: historyForm.type, author: historyForm.author, content: contentStr, issue: historyForm.issue || "", methods: historyForm.type === "방역" ? historyForm.methods : [], chemicals: historyForm.type === "방역" ? historyForm.chemicals : [] };
                    updatedHistoryList = [newLog, ...(selectedItem.history || [])];
                }
                const updatedItem = { ...selectedItem, history: updatedHistoryList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowHistoryForm(false); setEditingHistoryId(null);
            };

            const handleEditHistoryInit = (h) => {
                setHistoryForm({ date: h.date, time: h.time || h.startTime || "", type: h.type, author: h.author || selectedItem.manager, methods: h.methods || [], chemicals: h.chemicals || [], note: h.type === "방역" ? "" : h.content, issue: h.issue || "" });
                setEditingHistoryId(h.id); setShowHistoryForm(true); setShowPayForm(false); setIsEditing(false);
            };

            const handleDeleteHistory = (logId) => {
                if(!confirm("해당 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, history: selectedItem.history.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                let updatedPayList;
                if (editingPayId) {
                    updatedPayList = selectedItem.paymentHistory.map(p => 
                        p.id === editingPayId ? { ...p, month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note } : p
                    );
                } else {
                    const newPay = { id: Date.now(), month: payForm.month, amount: payForm.amount, status: payForm.status, method: payForm.method, note: payForm.note };
                    updatedPayList = [newPay, ...(selectedItem.paymentHistory || [])];
                }
                const updatedItem = { ...selectedItem, paymentHistory: updatedPayList };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item));
                setSelectedItem(updatedItem); setShowPayForm(false); setEditingPayId(null);
                setPayForm({ month: CURRENT_MONTH, amount: selectedItem.fee || "30000", status: "수금완료", method: "계좌이체", note: "" });
            };

            const handleEditPayInit = (p) => {
                setPayForm({ month: p.month, amount: p.amount, status: p.status, method: p.method || "계좌이체", note: p.note || "" });
                setEditingPayId(p.id); setShowPayForm(true); setShowHistoryForm(false); setIsEditing(false);
            };

            const handleDeletePayment = (logId) => {
                if(!confirm("해당 수금 기록을 삭제하시겠습니까?")) return;
                const updatedItem = { ...selectedItem, paymentHistory: selectedItem.paymentHistory.filter(h => h.id !== logId) };
                updateDataAndSync(data.map(item => item.id === selectedItem.id ? updatedItem : item)); setSelectedItem(updatedItem);
            };

            const enrichedData = useMemo(() => {
                return data.map(item => {
                    let safePayStatus = item.payStatus;
                    if (!safePayStatus || String(safePayStatus).trim() === "") safePayStatus = "유료";
                    
                    let safeServiceType = item.serviceType;
                    if (!safeServiceType || String(safeServiceType).trim() === "") safeServiceType = "정기";

                    let safeTab = item.tab;
                    if (!safeTab || String(safeTab).trim() === "") {
                        if (safePayStatus === '일시중지') safeTab = 'paused';
                        else if (safePayStatus === '해지') safeTab = 'terminated';
                        else safeTab = 'active'; 
                    }

                    let itemDebt = 0;
                    if (item.collectionStatus === "미수금") {
                        itemDebt += parseInt(String(item.uncollectedAmount || "0").replace(/,/g, ''), 10) || 0;
                    }
                    if (item.paymentHistory && item.paymentHistory.length > 0) {
                        item.paymentHistory.forEach(p => {
                            if (p.status === "미수금") {
                                itemDebt += parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0;
                            }
                        });
                    }
                    return { ...item, tab: safeTab, payStatus: safePayStatus, serviceType: safeServiceType, computedDebt: itemDebt };
                });
            }, [data]);

            const totalUncollected = enrichedData.reduce((sum, item) => sum + (item.computedDebt || 0), 0);
            const uncollectedClientsCount = enrichedData.filter(item => (item.computedDebt || 0) > 0).length;

            const selectedItemDebt = selectedItem ? enrichedData.find(d => d.id === selectedItem.id)?.computedDebt || 0 : 0;
            const selectedItemTotalPaid = useMemo(() => {
                if (!selectedItem || !selectedItem.paymentHistory) return 0;
                return selectedItem.paymentHistory
                    .filter(p => p.status === "수금완료" || p.status === "무료") 
                    .reduce((sum, p) => sum + (parseInt(String(p.amount || "0").replace(/,/g, ''), 10) || 0), 0);
            }, [selectedItem]);

            const selectedItemPestCount = selectedItem ? (selectedItem.history || []).filter(h => h.type === '방역').length : 0;
            const selectedItemPayCount = selectedItem ? (selectedItem.paymentHistory || []).filter(p => p.status === "수금완료" || p.status === "무료").length : 0;

            const currentList = useMemo(() => {
                const filtered = enrichedData.filter(r => {
                    if (r.tab !== currentTab) return false;
                    const matchSearch = (r.name || "").includes(search) || (r.manager || "").includes(search) || (r.address || "").includes(search);
                    const matchCity = !filterCity || r.gu === filterCity;
                    const matchDistrict = !filterDistrict || r.dong === filterDistrict;
                    const matchPayStatus = !filterPayStatus || String(r.payStatus || "").trim() === filterPayStatus;
                    const matchCollection = !filterCollection || (filterCollection === '미수금' ? r.computedDebt > 0 : r.computedDebt === 0);
                    const matchRegMonth = !filterRegMonth || normalizeMonth(r.contractStart) === filterRegMonth;
                    const isCompletedThisMonth = r.history && r.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH));
                    const matchCompletion = !filterCompletion || (filterCompletion === 'completed' ? isCompletedThisMonth : !isCompletedThisMonth);
                    return matchSearch && matchCity && matchDistrict && matchPayStatus && matchCollection && matchRegMonth && matchCompletion;
                });

                if (search) {
                    // 검색 시: 상호명 일치 > 담당대원 일치 > 주소 일치 순 관련도 정렬
                    return filtered.sort((a, b) => {
                        const ra = (a.name || "").includes(search) ? 0 : (a.manager || "").includes(search) ? 1 : 2;
                        const rb = (b.name || "").includes(search) ? 0 : (b.manager || "").includes(search) ? 1 : 2;
                        if (ra !== rb) return ra - rb;
                        return (a.name || "").localeCompare(b.name || "", "ko");
                    });
                }

                // 기본: 상호명 가나다 순 고정 정렬 (구글 시트 반환 순서와 무관)
                return [...filtered].sort((a, b) => (a.name || "").localeCompare(b.name || "", "ko"));
            }, [enrichedData, currentTab, search, filterCity, filterDistrict, filterPayStatus, filterCollection, filterRegMonth, filterCompletion]);

            const TAB_LABELS = { active: "방역거래처", prospect: "영업처", paused: "일시중지", terminated: "해지거래처" };

            const exportToExcel = () => {
                if (!currentList || currentList.length === 0) { alert("⚠️ 다운로드할 데이터가 없습니다. (현재 필터에 해당하는 업체가 없습니다)"); return; }

                const rows = currentList.map(r => ({
                    "상호명": r.name || "",
                    "담당 대원": r.manager || "",
                    "연락처": r.phone || "",
                    "시/도": r.gu || "",
                    "구/군": r.dong || "",
                    "상세주소": r.address || "",
                    "평수(면적)": r.area || "",
                    "방역시작일": r.contractStart || "",
                    "방역주기": r.cycle || "",
                    "방역구분": r.serviceType === "무료" ? "배민" : (r.serviceType || ""),
                    "결제방식": r.payMethod || "",
                    "결제상태": r.payStatus === "무료" ? "배민" : (r.payStatus || ""),
                    "계약금액": r.fee || "",
                    "제공 서비스": r.providedService || "",
                    "영업일자": r.salesDate || "",
                    "사업자번호": r.bizNumber || "",
                    "대표자명": r.clientRepName || ""
                }));

                const ws = XLSX.utils.json_to_sheet(rows);
                ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: Math.max(10, k.length + 4) }));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "업체목록");

                const tabLabel = TAB_LABELS[currentTab] || currentTab;
                const regionLabel = filterCity ? `_${filterCity}${filterDistrict ? '_' + filterDistrict : ''}` : "";
                const fileName = `${tabLabel}${regionLabel}_${TODAY}.xlsx`;

                XLSX.writeFile(wb, fileName);
            };

            const activeData = enrichedData.filter(d => d.tab === 'active');
            const leeCount = activeData.filter(d => d.manager === '이원식').length;
            const kangCount = activeData.filter(d => d.manager === '강현준').length;
            const completedThisMonth = activeData.filter(c => c.history && c.history.some(h => h.type === '방역' && h.date && h.date.startsWith(CURRENT_MONTH))).length;
            const delayedThisMonth = activeData.length - completedThisMonth;
            const activeLikeCount = enrichedData.filter(d => d.tab === 'active' || d.tab === 'paused').length;
            const termCount = enrichedData.filter(d => d.tab === 'terminated').length;
            const totalEver = activeLikeCount + termCount;
            const cancelRate = totalEver === 0 ? "0.0" : ((termCount / totalEver) * 100).toFixed(1);

            const chartStats = useMemo(() => {
                const cy = parseInt(CURRENT_MONTH.split('-')[0], 10); const cm = parseInt(CURRENT_MONTH.split('-')[1], 10);
                const months = Array.from({length: 6}, (_, i) => {
                    let m = cm - (5 - i); let y = cy;
                    if (m <= 0) { m += 12; y -= 1; }
                    return `${y}-${String(m).padStart(2, '0')}`;
                });
                const chartDataToUse = (chartManager === "전체 담당자" ? data : data.filter(d => d.manager === chartManager))
                    .filter(d => d.payStatus !== '무료');

                return months.map(monthStr => {
                    const mLabel = parseInt(monthStr.split('-')[1], 10) + '월';
                    // 수동 입력값 우선 사용
                    const manualKey = `${chartManager}__${monthStr}`;
                    if (manualChartData[manualKey] !== undefined) {
                        const { newCount = 0, termCount = 0 } = manualChartData[manualKey];
                        return { month: monthStr, label: mLabel, newCount, termCount, netCount: newCount - termCount };
                    }
                    // 2026-05 이전은 0
                    if (monthStr < '2026-05') return { month: monthStr, label: mLabel, newCount: 0, termCount: 0, netCount: 0 };
                    // 자동 계산 (수동 입력 없을 때만)
                    const newCount = chartDataToUse.filter(d => normalizeMonth(d.contractStart) === monthStr).length;
                    // 해지: terminatedDate 우선, 없으면 history에서 상담/방역 제외 후 최신 날짜
                    const termCountData = chartDataToUse.filter(d => {
                        if (d.tab !== 'terminated') return false;
                        // terminatedDate 필드가 있으면 그것 사용
                        if (d.terminatedDate) return d.terminatedDate.startsWith(monthStr);
                        // 없으면 history에서 방역 기록 제외, 상담 기록만 찾기
                        if (d.history && d.history.length > 0) {
                            const nonPestDates = d.history.filter(h => h.type !== '방역').map(h => h.date || '').filter(Boolean).sort().reverse();
                            if (nonPestDates[0]) return nonPestDates[0].startsWith(monthStr);
                            // 상담 기록도 없으면 전체 history 최신 날짜
                            const allDates = d.history.map(h => h.date || '').filter(Boolean).sort().reverse();
                            if (allDates[0]) return allDates[0].startsWith(monthStr);
                        }
                        return normalizeMonth(d.contractStart) === monthStr;
                    }).length;
                    return { month: monthStr, label: mLabel, newCount, termCount: termCountData, netCount: newCount - termCountData };
                });
            }, [data, chartManager, manualChartData]);

            const maxChartVal = Math.max(1, ...chartStats.map(s => Math.max(s.newCount, s.termCount, Math.abs(s.netCount))));

            // 🔍 등록월 필터 드롭다운 옵션 (방역시작일 기준)
            const regMonthOptions = useMemo(() => {
                const set = new Set();
                data.forEach(d => { const m = normalizeMonth(d.contractStart); if (m) set.add(m); });
                return [...set].sort().reverse();
            }, [data]);

            if (loading) return <div className="flex items-center justify-center min-h-screen font-bold text-emerald-800">데이터 로드 중... 잠시만 기다려주세요!</div>;

            const availableHistoryYears = selectedItem && selectedItem.history ? [...new Set(selectedItem.history.map(h => h.date ? h.date.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredHistory = selectedItem && selectedItem.history ? [...selectedItem.history]
                .filter(h => historyYearFilter === 'all' || (h.date && h.date.startsWith(historyYearFilter)))
                .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)) : [];

            const availablePaymentYears = selectedItem && selectedItem.paymentHistory ? [...new Set(selectedItem.paymentHistory.map(p => p.month ? p.month.split('-')[0] : ''))].filter(Boolean).sort().reverse() : [];
            const filteredPayment = selectedItem && selectedItem.paymentHistory ? [...selectedItem.paymentHistory]
                .filter(p => paymentYearFilter === 'all' || (p.month && p.month.startsWith(paymentYearFilter)))
                .sort((a, b) => new Date((b.month || '') + '-01') - new Date((a.month || '') + '-01')) : [];

            return (
                <div>
                    <div className={`max-w-7xl mx-auto space-y-6 ${isCertOpen ? 'hidden print:hidden' : 'block'}`}>
                        
                        <div className="flex justify-between items-end mb-4 pt-2 px-2">
                            <div>
                                <h1 onClick={handleLogoTap} className="text-2xl font-bold flex items-center gap-2 text-[#0B5E4D] cursor-pointer select-none">
                                    <span className="bg-[#0B5E4D] text-white p-1.5 rounded-lg text-sm shadow-md">🛡️</span> MSTC방역
                                    {adminMode && <span className="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-bold ml-1 animate-pulse">관리자</span>}
                                </h1>
                                <p className="text-xs text-gray-500 mt-1 font-bold">거래처 및 영업 관리 시스템</p>
                            </div>
                            <div className="flex flex-col items-end gap-2">
                                <div className="text-sm text-gray-400 font-mono font-bold tracking-wider">{TODAY.replace(/-/g, '.')} 기준</div>
                                <div className="flex gap-2">
                                    {adminMode && <button onClick={handleBatchInsert} className="px-3 py-1.5 border border-blue-600 text-blue-700 bg-blue-50 rounded-lg text-[11px] font-bold flex items-center gap-1 shadow-sm hover:bg-blue-600 hover:text-white transition-all">🪄 과거기록 일괄 자동채우기</button>}
                                    <button onClick={() => window.location.reload()} className="px-3 py-1.5 border border-[#0B5E4D] text-[#0B5E4D] rounded-lg text-[11px] font-bold flex items-center gap-1 shadow-sm hover:bg-[#0B5E4D] hover:text-white transition-all">🔄 최신 데이터 불러오기</button>
                                </div>
                            </div>
                        </div>

                                    <label><b>결제 상태 *</b><select name="payStatus" className="w-full p-2 border rounded-lg mt-1"><option>유료</option><option value="무료">🛵 배민</option><option>일시중지</option><option>해지</option></select></label>
                                    
                                    <label className="col-span-2"><b>제공 서비스</b><input name="providedService" className="w-full p-2 border rounded-lg mt-1" placeholder="예: 포충기 대여, 쥐트랩 등" /></label>
                                    <label className="col-span-2 mt-2"><b>기타 (추가 정보)</b><textarea name="etcInfo" className="w-full p-2 border rounded-lg mt-1 h-16" placeholder="특이사항 등 자유롭게 입력"></textarea></label>
                                    </>)}
                                </div>
                                <div className="flex justify-between items-center mt-6 border-t pt-4">
                                    <span className="text-red-500 font-bold text-xs">{regError}</span>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => { setIsModalOpen(false); setRegError(""); }} className="px-5 py-2 border rounded-xl bg-gray-100 font-bold text-xs">취소</button>
                                        <button type="submit" className="px-6 py-2 bg-[#0B5E4D] text-white rounded-xl font-bold text-xs">등록 완료</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* 소독증명서 출력 (100% 교정 적용) */}
                    {isCertOpen && selectedItem && certEntry && (
                        <div id="cert-modal-outer" className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 overflow-y-auto print:absolute print:inset-0 print:bg-white print:p-0">
                            <div id="cert-modal-inner" className="bg-white rounded-3xl p-8 max-w-3xl w-full max-h-[96vh] overflow-y-auto my-auto shadow-2xl print:shadow-none print:w-full print:h-auto print:max-h-none print:overflow-visible">
                                <div id="cert-print-area" className="border border-black p-8 md:p-12 bg-white text-black text-[13px] leading-relaxed mx-auto w-full max-w-[210mm] shadow-sm print:shadow-none print:border-0" style={{ boxSizing: "border-box" }}>
                                    <div className="flex justify-between items-start mb-2">
                                        <p className="text-[10px] text-gray-500 font-medium">■ 감염병의 예방 및 관리에 관한 법률 시행규칙 [별지 제28호서식]</p>
                                        <p className="font-bold text-[13px]">{certNumber}</p>
                                    </div>
                                    <h2 className="text-center text-3xl font-black tracking-[0.6em] my-10 pt-4 print:my-5 print:pt-2">소 독 증 명 서</h2>
                                    <table className="w-full border-collapse border border-black text-left my-10 print:my-5">
                                        <tbody>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center w-28 text-[14px]" rowSpan="2">대상 시설</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold w-28 text-[14px]">상호(명칭)</td>
                                                <td className="border border-black p-5 font-bold text-[15px]">{selectedItem.name}</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold w-36 text-[14px]">실시 면적(용적)</td>
                                                
                                                {/* 💡 [출력 교정] 면적의 ㎡² ➡️ 평 / ㎡ 로 교정 */}
                                                <td className="border border-black p-5 font-mono text-[14px]">({selectedItem.area || "30"} 평 / ㎡)</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">소재지</td>
                                                <td className="border border-black p-5 text-[14px]" colSpan="3">{selectedItem.gu} {selectedItem.dong} {selectedItem.address}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">관리(운영)자 확인</td>
                                                <td className="border border-black p-4 text-[14px]" colSpan="3">
                                                    <div className="flex justify-between pr-8">
                                                        <span>직위 : 매니저</span>
                                                        <span>성명 : {certEntry.author}</span>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">소독기간</td>
                                                <td className="border border-black p-5 text-center font-mono text-[14px]" colSpan="3">{certEntry.date || TODAY} ~ {certEntry.date || TODAY}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-center text-[14px]" rowSpan="2">소독 내용</td>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">종류</td>
                                                
                                                {/* 💡 [출력 교정] 잔류 분무 꼬리표 삭제 완료 */}
                                                <td className="border border-black p-5 text-[14px]" colSpan="3">{(certEntry.methods && certEntry.methods.length > 0) ? certEntry.methods.join(", ") : "살충"}</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-black p-5 bg-gray-50 font-bold text-[14px]">약품 사용 내용</td>
                                                <td className="border border-black p-5 font-medium text-[14px]" colSpan="3">{(certEntry.chemicals && certEntry.chemicals.length > 0) ? certEntry.chemicals.join(", ") : "롱다운플러스"}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <p className="my-20 text-[14px] text-justify leading-loose text-gray-900 px-3 print:my-8">&nbsp;&nbsp;&nbsp;「감염병의 예방 및 관리에 관한 법률」 제54조제1항 및 같은 법 시행규칙 제40조제2항에 따라 위와 같이 소독을 실시하였음을 증명합니다.</p>
                                    <h3 className="text-center font-bold text-[15px] my-16 tracking-widest print:my-8">{certEntry.date ? certEntry.date.split('-')[0] : '2026'} 년 &nbsp;&nbsp;&nbsp;&nbsp; {certEntry.date ? certEntry.date.split('-')[1] : '06'} 월 &nbsp;&nbsp;&nbsp;&nbsp; {certEntry.date ? certEntry.date.split('-')[2] : '01'} 일</h3>
                                    <div className="mt-28 pt-10 border-t border-black text-[13px] space-y-3 relative print:mt-10 print:pt-6">
                                        <p className="flex justify-between"><span><b>소독 실시자 상호(명칭)</b></span> <span className="font-bold text-right text-[14px]">{CERT_ISSUER.name}</span></p>
                                        <p className="flex justify-between"><span><b>소재지</b></span> <span className="text-right text-gray-700 text-[13px]">{CERT_ISSUER.address}</span></p>
                                        <p className="flex justify-between relative">
                                            <span><b>성명(대표자)</b></span> <span className="font-bold text-right mr-24 text-[14px]">{CERT_ISSUER.reps}</span>
                                            <span className="absolute right-12 top-[-15px]">
                                                {COMPANY_SEAL_URL && !sealImgFailed ? (
                                                    <img src={COMPANY_SEAL_URL} alt="직인" className="w-[65px] h-[65px] object-contain" onError={() => setSealImgFailed(true)} />
                                                ) : (
                                                    <span className="text-red-600 font-bold border-2 border-red-600 rounded-full w-[65px] h-[65px] flex items-center justify-center text-[11px] transform rotate-[-6deg] bg-white/40">법인인장</span>
                                                )}
                                            </span>
                                        </p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6 border-t pt-4 print:hidden">
                                    <button onClick={() => setIsCertOpen(false)} className="px-5 py-3 border rounded-xl text-xs bg-gray-100 font-bold">창 닫기</button>
                                    <button onClick={() => window.print()} className="px-8 py-3 bg-[#0B5E4D] text-white rounded-xl text-xs font-bold shadow-md hover:opacity-90">🖨️ 정식 A4 서식 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
