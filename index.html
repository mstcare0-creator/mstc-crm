<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MSTC방역 통합 운영관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const STAFF = ["이원식", "강현준"];
        
        function App() {
            // [복구] 기존 스크린샷 6697fb 데이터 및 상세 이력 포함 초기 데이터
            const [data, setData] = useState([
                {id: 1, name: "춘향이보쌈왕족발(민 푸드)", manager: "강현준", gu: "부산", dong: "동래구", status: "정상", area: "15", phone: "010.4812.9805", address: "부산 동래구 명륜로 112", history: [{id: 1, date: "2026-06-19", type: "방역", content: "정기 방역 완료", author: "강현준"}]},
                {id: 2, name: "삼성횟집", manager: "이원식", gu: "부산", dong: "부산진구", status: "정상", area: "30", phone: "010.2674.3095", address: "부산 부산진구 신천대로 65번길 29", history: [{id: 2, date: "2026-06-19", type: "방역", content: "정기 방역 완료", author: "이원식"}]}
            ]);
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState("");

            // [복구] 검색 필터 (담당자명 검색 포함)
            const filtered = data.filter(i => 
                i.name.includes(search) || i.manager.includes(search) || (i.address && i.address.includes(search))
            );

            // [기능복구] 방역 기록 삭제
            const deleteLog = (logId) => {
                if(!confirm("기록을 삭제할까요?")) return;
                const updated = {...selected, history: selected.history.filter(h => h.id !== logId)};
                setData(data.map(d => d.id === updated.id ? updated : d));
                setSelected(updated);
            };

            return (
                <div class="max-w-6xl mx-auto flex gap-6">
                    {/* 좌측 리스트 (상단 카드 포함 구조) */}
                    <div class="flex-1 space-y-4">
                        <div class="grid grid-cols-4 gap-4">
                            <div class="bg-white p-4 rounded-2xl border shadow-sm">전체 거래처 <p class="text-xl font-bold">{data.length}</p></div>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border shadow-sm">
                            <input onChange={(e) => setSearch(e.target.value)} placeholder="검색" class="w-full p-2 border rounded-xl mb-4 text-xs" />
                            {filtered.map(item => (
                                <div key={item.id} onClick={() => setSelected(item)} class="p-4 border-b cursor-pointer hover:bg-gray-50 flex justify-between">
                                    <div><p class="font-bold text-sm">{item.name}</p><p class="text-xs text-gray-500">담당: {item.manager}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 우측 상세 창 (모든 버튼 활성화) */}
                    {selected && (
                        <div class="w-96 bg-white p-6 rounded-3xl border shadow-xl h-fit">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="font-bold text-lg">{selected.name}</h2>
                                <button onClick={() => setSelected(null)} class="text-xs">닫기</button>
                            </div>
                            <h3 class="font-bold text-sm mb-3">📋 방역 이력</h3>
                            {selected.history.map(h => (
                                <div key={h.id} class="bg-gray-50 p-3 rounded-xl mb-2 flex justify-between items-center text-xs">
                                    <div><p class="font-bold">{h.content}</p><p class="text-[10px] text-gray-500">{h.date} · {h.author}</p></div>
                                    <button onClick={() => deleteLog(h.id)} class="text-[10px] text-red-500 font-bold">🗑️ 삭제</button>
                                </div>
                            ))}
                            <div class="flex gap-2 mt-4">
                                <button class="flex-1 bg-green-800 text-white py-2 rounded-xl text-xs font-bold">+ 기록 추가</button>
                                <button class="flex-1 bg-gray-200 py-2 rounded-xl text-xs font-bold">✏️ 수정</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
