<div style="width: 100%; display: flex; justify-content: center; padding: 20px 0;">
    <iframe 
        srcdoc='<!DOCTYPE html>
        <html lang="ko">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
            <script src="https://cdn.tailwindcss.com"></script>
            <style>
                body { font-family: sans-serif; background-color: #f9fafb; margin:0; }
                @media print {
                    body * { visibility: hidden; }
                    #print-area, #print-area * { visibility: visible; }
                    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
                }
            </style>
        </head>
        <body class="p-4">
            <div id="root"></div>
            <script type="text/babel">
                const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJUCIKiumzq3QbFjZzSQq6mKWdw03AXCja8oH2mClGwUN6cv8CKJehdJLlkNHACqEY/exec";
                const CERT_ISSUER = { name: "주)모바일솔루션즈", address: "부산 강서구 명지국제2로28번길 24, 620호", reps: "구승재, 구태원" };
                
                function App() {
                    const [bizNum, setBizNum] = useState("");
                    const [clientData, setClientData] = useState(null);
                    const [error, setError] = useState("");
                    const [loading, setLoading] = useState(false);
                    const [sealImage, setSealImage] = useState(null);

                    const searchCert = (e) => {
                        e.preventDefault();
                        if(!bizNum) return;
                        setLoading(true); setError(""); setClientData(null);
                        
                        fetch(GOOGLE_SCRIPT_URL)
                            .then(res => res.json())
                            .then(data => {
                                const found = data.find(d => d.bizNumber && d.bizNumber.replace(/-/g,"") === bizNum.replace(/-/g,""));
                                if(found) {
                                    // 최신 방역 기록 찾기
                                    const latestHistory = (found.history || []).filter(h => h.type === "방역").sort((a,b) => new Date(b.date) - new Date(a.date))[0];
                                    if(latestHistory) {
                                        setClientData({ ...found, latestHistory });
                                    } else {
                                        setError("진행된 방역 내역이 없습니다.");
                                    }
                                } else {
                                    setError("등록된 사업자번호가 아닙니다. 띄어쓰기 없이 다시 입력해주세요.");
                                }
                                setLoading(false);
                            })
                            .catch(err => { setError("서버 통신 오류가 발생했습니다."); setLoading(false); });
                    };

                    const handleSealUpload = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => { setSealImage(ev.target.result); };
                        reader.readAsDataURL(file);
                    };

                    return (
                        <div className="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                            <div className="text-center mb-8">
                                <h1 className="text-2xl font-bold text-[#0B5E4D] mb-2">📄 소독증명서 온라인 발급</h1>
                                <p className="text-sm text-gray-500">MSTC방역 고객사 전용 발급 포털</p>
                            </div>

                            {!clientData && (
                                <form onSubmit={searchCert} className="max-w-md mx-auto flex flex-col gap-4">
                                    <input 
                                        type="text" 
                                        value={bizNum} 
                                        onChange={e => setBizNum(e.target.value)} 
                                        placeholder="사업자등록번호 입력 (- 제외)" 
                                        className="w-full p-4 border rounded-xl text-center font-bold tracking-widest outline-none bg-gray-50 focus:border-[#0B5E4D]" 
                                    />
                                    <button type="submit" disabled={loading} className="w-full bg-[#0B5E4D] text-white py-4 rounded-xl font-bold hover:bg-[#084b3e] disabled:opacity-50">
                                        {loading ? "조회 중..." : "증명서 조회하기"}
                                    </button>
                                    {error && <p className="text-red-500 text-sm font-bold text-center">{error}</p>}
                                </form>
                            )}

                            {clientData && (
                                <div className="animate-fade-in mt-6">
                                    <div className="flex justify-between items-end mb-4 print:hidden">
                                        <div>
                                            <p className="text-sm text-emerald-700 font-bold mb-1">인감 도장 선택 (옵션)</p>
                                            <input type="file" accept="image/*" onChange={handleSealUpload} className="text-xs" />
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setClientData(null)} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-bold">다시 조회</button>
                                            <button onClick={() => window.print()} className="px-4 py-2 bg-[#0B5E4D] text-white rounded-lg text-sm font-bold shadow-md">🖨️ 인쇄 / PDF 저장</button>
                                        </div>
                                    </div>

                                    <div id="print-area" className="border border-black p-10 bg-white text-black text-[13px] leading-relaxed mx-auto w-full max-w-[210mm]">
                                        <p className="text-[10px] text-gray-500 font-medium mb-2">■ 감염병의 예방 및 관리에 관한 법률 시행규칙 [별지 제28호서식]</p>
                                        <h2 className="text-center text-3xl font-black tracking-[0.6em] my-10 pt-4">소 독 증 명 서</h2>
                                        <table className="w-full border-collapse border border-black text-left my-8">
                                            <tbody>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-center w-28 text-[14px]" rowSpan="2">대상 시설</td>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold w-24 text-[14px]">상호(명칭)</td>
                                                    <td className="border border-black p-4 font-bold text-[15px]">{clientData.name}</td>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold w-32 text-[14px]">실시 면적(용적)</td>
                                                    <td className="border border-black p-4 font-mono text-[14px]">({clientData.area || "30"}평 ㎡²)</td>
                                                </tr>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-[14px]">소재지</td>
                                                    <td className="border border-black p-4 text-[14px]" colSpan="3">{clientData.gu} {clientData.dong} {clientData.address}</td>
                                                </tr>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">관리(운영)자 확인</td>
                                                    <td className="border border-black p-4 text-[14px]" colSpan="3">직위 : 대표자 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 성명 : {clientData.latestHistory.author || "이원식"}</td>
                                                </tr>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-center text-[14px]" colSpan="2">소독기간</td>
                                                    <td className="border border-black p-4 text-center font-mono text-[14px]" colSpan="3">{clientData.latestHistory.date} ~ {clientData.latestHistory.date}</td>
                                                </tr>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-center text-[14px]" rowSpan="2">소독 내용</td>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-[14px]">종류</td>
                                                    <td className="border border-black p-4 text-[14px]" colSpan="3">{(clientData.latestHistory.methods && clientData.latestHistory.methods.length > 0) ? clientData.latestHistory.methods.map(m=>m+" 잔류 분무").join(", ") : "살충 잔류 분무"}</td>
                                                </tr>
                                                <tr>
                                                    <td className="border border-black p-4 bg-gray-50 font-bold text-[14px]">약품 사용 내용</td>
                                                    <td className="border border-black p-4 font-medium text-[14px]" colSpan="3">{(clientData.latestHistory.chemicals && clientData.latestHistory.chemicals.length > 0) ? clientData.latestHistory.chemicals.join(", ") : "롱다운플러스"}</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                        <p className="my-12 text-[14px] text-justify leading-loose text-gray-900 px-2">&nbsp;&nbsp;&nbsp;「감염병의 예방 및 관리에 관한 법률」 제54조제1항 및 같은 법 시행규칙 제40조제2항에 따라 위와 같이 소독을 실시하였음을 증명합니다.</p>
                                        <h3 className="text-center font-bold text-[15px] my-10 tracking-widest">
                                            {clientData.latestHistory.date.split("-")[0]} 년 &nbsp;&nbsp;&nbsp;&nbsp; {clientData.latestHistory.date.split("-")[1]} 월 &nbsp;&nbsp;&nbsp;&nbsp; {clientData.latestHistory.date.split("-")[2]} 일
                                        </h3>
                                        <div className="mt-20 pt-8 border-t border-black text-[13px] space-y-3 relative">
                                            <p className="flex justify-between"><span><b>소독 실시자 상호(명칭)</b></span> <span className="font-bold text-right text-[14px]">{CERT_ISSUER.name}</span></p>
                                            <p className="flex justify-between"><span><b>소재지</b></span> <span className="text-right text-gray-700 text-[13px]">{CERT_ISSUER.address}</span></p>
                                            <p className="flex justify-between relative">
                                                <span><b>성명(대표자)</b></span> <span className="font-bold text-right mr-16 text-[14px]">{CERT_ISSUER.reps}</span>
                                                <span className="absolute right-0 top-[-10px]">
                                                    {sealImage ? <img src={sealImage} alt="직인" className="w-14 h-14 object-contain rounded-full" /> : <span className="text-red-600 font-bold border-2 border-red-600 rounded-full w-10 h-10 flex items-center justify-center text-[8px] transform rotate-[-6deg] bg-white/40">법인인장</span>}
                                                </span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
                ReactDOM.createRoot(document.getElementById("root")).render(<App />);
            </script>
        </body>
        </html>' 
        style="width: 100%; max-width: 800px; height: 900px; border: none; background: transparent;">
    </iframe>
</div>
