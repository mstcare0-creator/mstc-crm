<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTC방역 운영 및 영업 관리 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F4EF; color: #16241E; margin: 0; padding: 0; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        @media print {
            body * { visibility: hidden !important; }
            #cert-print-area, #cert-print-area * { visibility: visible !important; }
            #cert-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            @page { size: A4; margin: 14mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 폰트 및 컬러 상수 지정
        const T = { bg: "#F1F4EF", surface: "#FFFFFF", surfaceAlt: "#F8FAF6", ink: "#16241E", inkSoft: "#5B6B64", inkFaint: "#8B9A92", line: "#DEE5DC", lineSoft: "#E9EEE6", teal: "#0E7A63", tealDeep: "#0B5E4D", tealTint: "#E3F2EC", amber: "#B5740A", amberTint: "#FBF1DD", danger: "#A23B3B", dangerTint: "#F6E8E7", seal: "#B33B2B" };
        const TODAY = "2026-06-18";
        const CYCLES = ["주1회", "2주1회", "월1회", "2개월1회", "분기1회", "반기1회", "연1회"];
        const CATEGORIES = ["음식점", "카페", "편의점", "마트", "병원", "학원", "사무실", "공장", "어린이집", "헬스장", "학교", "숙박업", "기타"];
        const STAGES = ["신규발굴", "1차상담", "견적제출", "협상중", "계약완료", "보류", "실패"];
        const REASONS = ["폐업", "비용절감", "서비스불만", "타업체변경", "기타"];
        const RECONTRACT_LEVELS = ["낮음", "중간", "높음"];
        const STAFF = ["이원식", "강현준"];
        const TECHS = ["이원식", "강현준"];
        const PAY_STATUS = ["유료", "무료", "일시중단", "해지"];
        const SERVICE_TYPES = ["정기", "분기"];
        const DISINFECT_METHODS = ["살충 잔류 분무", "독 먹이법", "훈증 소독", "ULV 미스트 분무", "기피제 처리"];
        const CERT_CHEMICALS_LIST = ["롱다운플러스", "맥스포스 셀렉트 이지갤", "마이크로켐 골드", "키니아 비실드", "다발이끔 살서제"];
        
        const GU_DONG = {
            "부산": ["남구", "부산진구", "사상구", "동래구", "금정구", "강서구", "사하구", "수영구", "연제구", "중구", "동구", "해운대구", "북구", "서구", "영도구"],
            "경남": ["창원시", "양산시", "김해시", "창원", "김해"],
            "창원": ["성산구", "진해구", "의창구"]
        };

        // 🔗 [구글 스프레드시트 배포 주소 연동]
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-eZkiauwAtjbd0_c8H64Dt31d6CTnLajFQJv0YuEqWjFJ0BjufQ0Z0viTlbC0KSc5/exec";

        function App() {
            const [active, setActive] = React.useState([]);
            const [prospects, setProspects] = React.useState([]);
            const [terminated, setTerminated] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState("active");
            const [search, setSearch] = React.useState("");
            const [filterGu, setFilterGu] = React.useState("");
            const [filterDong, setFilterDong] = React.useState("");
            const [filterCycle, setFilterCycle] = React.useState("");
            const [selectedRecord, setSelectedRecord] = React.useState(null);
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [isCertOpen, setIsCertOpen] = React.useState(false);
            const [certEntry, setCertEntry] = React.useState(null);

            // 실시간 데이터 로드
            React.useEffect(() => {
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        setActive(data.active || []);
                        setProspects(data.prospects || []);
                        setTerminated(data.terminated || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        alert("구글 시트 연동 중 오류가 발생했습니다. 주소를 다시 확인해 주세요.");
                        setLoading(false);
                    });
            }, []);

            // 신규 추가 기능 (구글 DB 실시간 전송)
            function handleRegister(formData, kind) {
                setLoading(true);
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ kind: kind, data: formData })
                }).then(() => {
                    alert("성공적으로 등록되었습니다! (구글 시트 반영을 위해 잠시 후 새로고침해 주세요)");
                    window.location.reload();
                });
            }

            const currentList = React.useMemo(() => {
                const base = activeTab === "active" ? active : activeTab === "prospect" ? prospects : terminated;
                return base.filter(r => {
                    const matchSearch = r.name?.toLowerCase().includes(search.toLowerCase());
                    const matchGu = !filterGu || r.gu === filterGu;
                    const matchDong = !filterDong || r.dong === filterDong;
                    const matchCycle = !filterCycle || r.cycle === filterCycle;
                    return matchSearch && matchGu && matchDong && matchCycle;
                });
            }, [activeTab, active, prospects, terminated, search, filterGu, filterDong, filterCycle]);

            if (loading) return <div class="flex h-screen items-center justify-center font-bold text-lg text-[#0B5E4D]">🚚 구글 보관함에서 방역 데이터를 실시간으로 가져오는 중...</div>;

            return (
                <div class="min-h-screen p-4 md:p-6">
                    {/* 상단 헤더 */}
                    <header class="max-w-5xl mx-auto mb-6 flex items-center justify-between bg-white p-4 rounded-2xl border border-[#DEE5DC]">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-[#0B5E4D] text-white rounded-xl font-bold">🛡️</div>
                            <div>
                                <h1 class="text-xl font-bold">MSTC방역 통합 운영시스템</h1>
                                <p class="text-xs text-[#5B6B64]">실시간 전직원 공유형 웹 대시보드</p>
                            </div>
                        </div>
                        <button onClick={() => setIsModalOpen(true)} class="bg-[#0E7A63] text-white font-medium text-sm px-4 py-2 rounded-xl hover:opacity-90 transition-all">+ 신규 등록 팝업</button>
                    </header>

                    {/* 메인 리스트 보드 */}
                    <main class="max-w-5xl mx-auto bg-white border border-[#DEE5DC] rounded-3xl p-4 shadow-sm">
                        {/* 탭 인터페이스 */}
                        <div class="flex gap-2 p-1 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl mb-4">
                            <button onClick={() => setActiveTab("active")} class={`flex-1 py-2.5 text-sm font-medium rounded-lg text-center transition-all ${activeTab === 'active' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>방역 거래처 ({active.length})</button>
                            <button onClick={() => setActiveTab("prospect")} class={`flex-1 py-2.5 text-sm font-medium rounded-lg text-center transition-all ${activeTab === 'prospect' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>영업 리드 ({prospects.length})</button>
                            <button onClick={() => setActiveTab("terminated")} class={`flex-1 py-2.5 text-sm font-medium rounded-lg text-center transition-all ${activeTab === 'terminated' ? 'bg-white text-[#0B5E4D] shadow-sm font-bold' : 'text-[#5B6B64]'}`}>해지 거래처 ({terminated.length})</button>
                        </div>

                        {/* 필터 툴바 */}
                        <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 mb-4">
                            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="업체명 검색..." class="w-full text-sm p-2 rounded-xl border border-[#DEE5DC] bg-[#F8FAF6]" />
                            <select value={filterGu} onChange={e => setFilterGu(e.target.value)} class="text-sm p-2 rounded-xl border border-[#DEE5DC] bg-white">
                                <option value="">전체 구 선택</option>
                                {Object.keys(GU_DONG).map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                            <select value={filterCycle} onChange={e => setFilterCycle(e.target.value)} class="text-sm p-2 rounded-xl border border-[#DEE5DC] bg-white">
                                <option value="">전체 주기 선택</option>
                                {CYCLES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>

                        {/* 리스트 본문 */}
                        <div class="flex flex-col gap-2">
                            {currentList.map(item => (
                                <div key={item.id} onClick={() => { setSelectedRecord(item); }} class="flex justify-between items-center p-3.5 bg-[#F8FAF6] border border-[#DEE5DC] rounded-xl cursor-pointer hover:bg-white hover:shadow-sm transition-all">
                                    <div>
                                        <h4 class="font-bold text-sm text-[#16241E]">{item.name}</h4>
                                        <p class="text-xs text-[#5B6B64] mt-0.5">{item.gu} {item.dong} · 담당: {item.manager} · {item.cycle || "기록없음"}</p>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        {activeTab === 'active' && <span class="text-xs font-mono bg-[#E3F2EC] text-[#0E7A63] px-2 py-0.5 rounded-full">정상 작동중</span>}
                                        {activeTab === 'prospect' && <span class="text-xs bg-[#FBF1DD] text-[#B5740A] px-2 py-0.5 rounded-full font-medium">{item.stage || "상담중"}</span>}
                                        {activeTab === 'terminated' && <span class="text-xs bg-[#F6E8E7] text-[#A23B3B] px-2 py-0.5 rounded-full font-medium">해지처</span>}
                                        <button onClick={(e) => { e.stopPropagation(); setCertEntry(item); setIsCertOpen(true); }} class="text-xs font-medium bg-[#E3F2EC] text-[#0B5E4D] px-2 py-1 rounded-lg hover:opacity-80">📄 증명서</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 팝업 모달: 신규 등록창 */}
                    {isModalOpen && (
                        <div class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl max-w-md w-full p-5 max-h-[85vh] overflow-y-auto">
                                <div class="flex justify-between items-center pb-3 border-b border-[#DEE5DC] mb-4">
                                    <h3 class="text-lg font-bold">신규 업체 등록 팝업창</h3>
                                    <button onClick={() => setIsModalOpen(false)} class="text-xl font-bold">×</button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const record = Object.fromEntries(fd.entries());
                                    record.id = "AC" + Date.now();
                                    record.history = JSON.stringify([{date: TODAY, type: "상담", content: "신규 등록 완료"}]);
                                    handleRegister(record, activeTab === "prospect" ? "prospects" : "active");
                                    setIsModalOpen(false);
                                }}>
                                    <div class="flex flex-col gap-3 text-sm">
                                        <label class="block"><b>업체명 *</b><input name="name" required class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl" /></label>
                                        <label class="block"><b>업종</b>
                                            <select name="category" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl">
                                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </label>
                                        <label class="block"><b>담당자명 *</b><input name="contactName" required class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl" /></label>
                                        <label class="block"><b>연락처 *</b><input name="phone" placeholder="010-0000-0000" required class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl" /></label>
                                        <label class="block"><b>지역구</b>
                                            <select name="gu" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl">
                                                {Object.keys(GU_DONG).map(g => <option key={g} value={g}>{g}</option>)}
                                            </select>
                                        </label>
                                        <label class="block"><b>상세주소</b><input name="address" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl" /></label>
                                        <label class="block"><b>영업/관리 담당</b>
                                            <select name="manager" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl">
                                                {STAFF.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </label>
                                        <label class="block"><b>방역 주기</b>
                                            <select name="cycle" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl">
                                                {CYCLES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </label>
                                        {activeTab === 'prospect' && <label class="block"><b>진행 단계</b>
                                            <select name="stage" class="w-full mt-1 p-2 border border-[#DEE5DC] rounded-xl">
                                                {STAGES.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </label>}
                                        <div class="flex gap-2 justify-end mt-4">
                                            <button type="button" onClick={() => setIsModalOpen(false)} class="px-4 py-2 border rounded-xl">취소</button>
                                            <button type="submit" class="px-4 py-2 bg-[#0E7A63] text-white rounded-xl">DB 저장하기</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 소독증명서 인쇄 및 PDF 저장 모달 */}
                    {isCertOpen && certEntry && (
                        <div class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl p-5 max-w-xl w-full max-h-[90vh] overflow-y-auto">
                                <div class="flex justify-between items-center pb-2 border-b mb-4">
                                    <h3 class="font-bold text-lg">별지 제28호서식 소독증명서 출력</h3>
                                    <button onClick={() => setIsCertOpen(false)} class="text-xl font-bold">×</button>
                                </div>
                                <div id="cert-print-area" class="border-2 border-black p-4 bg-white text-black text-xs leading-relaxed">
                                    <h2 class="text-center text-xl font-black tracking-widest mb-4">소 독 증 명 서</h2>
                                    <p class="text-right mb-2">제 26-06-호</p>
                                    <table class="w-full border-collapse border border-black mb-4">
                                        <tbody>
                                            <tr><td class="border border-black p-2 bg-gray-100 font-bold w-24">상호명</td><td class="border border-black p-2">{certEntry.name}</td></tr>
                                            <tr><td class="border border-black p-2 bg-gray-100 font-bold">소재지</td><td class="border border-black p-2">{certEntry.address || "부산 강서구/사하구 일대"}</td></tr>
                                            <tr><td class="border border-black p-2 bg-gray-100 font-bold">소독종류</td><td class="border border-black p-2">살충 잔류 분무, 독 먹이법, ULV 미스트 소독</td></tr>
                                            <tr><td class="border border-black p-2 bg-gray-100 font-bold">소독기간</td><td class="border border-black p-2">2026년 06월 18일 ~ 2026년 06월 18일</td></tr>
                                        </tbody>
                                    </table>
                                    <p class="text-center my-6">「감염병의 예방 및 관리에 관한 법률 시행규칙」 제40조제2항에 따라 소독을 실시하였음을 증명합니다.</p>
                                    <p class="text-center font-bold my-4">2026 년 &nbsp; 06 월 &nbsp; 18 일</p>
                                    <div class="text-right font-bold mt-6">
                                        <p>주)모바일솔루션즈 (대표: 구승재, 구태원) (인)</p>
                                    </div>
                                </div>
                                <div class="flex justify-end gap-2 mt-4">
                                    <button onClick={() => setIsCertOpen(false)} class="px-4 py-2 border rounded-xl">닫기</button>
                                    <button onClick={() => window.print()} class="px-4 py-2 bg-[#0B5E4D] text-white rounded-xl">🖨️ 인쇄 / PDF 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = RoyalReactDOM = injustices = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
